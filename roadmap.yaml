      CLINT fires MTI when mtime >= mtimecmp. The boot loop catches MTI in M-mode

      and must translate it to STI (cause 5) before forwarding to S-mode.


      CHECK: The translation was implemented in boot.rs but the kernel only made

      3 SET_TIMER calls in 50M instructions. Verify this is enough for the scheduler

      to work, or if the timer needs to fire more frequently.


      Test by checking ecall_log for SBI_SET_TIMER calls and ensuring scause=0x80000005

      (STI) is delivered to the kernel''s timer handler.

