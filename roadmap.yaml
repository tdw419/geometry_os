- id: phase-137
  title: Daily Driver -- Host Filesystem Bridge
  status: done
  goal: Let GeOS programs read and write files on the host Linux filesystem, not just
    the VFS pixel surface
  description: 'The VFS pixel surface is clever but isolated. Programs can''t read
    /etc/hostname or write to ~/documents. For GeOS to be a daily driver, it needs
    to access host files. Two approaches: (1) Add FSREAD/FSWRITE opcodes that delegate
    to the host OS, (2) Mount a host directory into VFS. Approach 1 is simpler and
    more practical. Programs read/write through opcodes, the host Rust code handles
    actual filesystem I/O. This is the single most important feature for daily driver
    use.'
  deliverables:
  - name: FSOPEN/FSCLOSE opcodes for host file access
    description: 'FSOPEN path_reg, mode_reg, fd_reg -- opens a host file. path_reg
      points to null-terminated string in RAM. mode_reg: 0=read, 1=write, 2=append.
      fd_reg gets file descriptor (0-7). FSCLOSE fd_reg -- closes file. r0 = 0 on
      success, error code on failure. Up to 8 simultaneous host files.'
    status: done
    tasks:
    - id: p137.d1.t1
      title: Implement FSOPEN opcode (host file open)
      status: done
      description: Read path from RAM, std::fs::File::open, store in host_files slot
    - id: p137.d1.t2
      title: Implement FSCLOSE opcode (host file close)
      status: done
      description: Close file, free slot
    - id: p137.d1.t3
      title: 'Test: FSOPEN /etc/hostname, read contents'
      status: done
      description: Open a real host file through the VM opcode
    scope_lines: 80
  - name: FSREAD/FSWRITE opcodes for file I/O
    description: FSREAD fd_reg, buf_reg, len_reg -- reads up to len bytes into RAM
      buffer. r0 = bytes read. FSWRITE fd_reg, buf_reg, len_reg -- writes len bytes
      from RAM buffer. r0 = bytes written. Bytes are one-per-u32-cell (same as PTYREAD/PTYWRITE
      convention).
    status: done
    tasks:
    - id: p137.d2.t1
      title: Implement FSREAD (read host file into RAM)
      status: done
      description: Read from host_files[fd], write bytes to RAM[buf..buf+len]
    - id: p137.d2.t2
      title: Implement FSWRITE (write RAM to host file)
      status: done
      description: Read bytes from RAM, write to host_files[fd]
    - id: p137.d2.t3
      title: 'Test: write and read back a file through opcodes'
      status: done
      description: FSOPEN write -> FSWRITE 'hello' -> FSCLOSE -> FSOPEN read -> FSREAD
        -> assert 'hello'
    scope_lines: 80
  - name: FSLS opcode for directory listing
    description: FSLS path_reg, buf_reg, max_len_reg -- lists directory contents.
      Writes null-separated filenames to RAM buffer. r0 = total bytes written. This
      lets the file browser and shell list real host directories.
    status: done
    tasks:
    - id: p137.d3.t1
      title: Implement FSLS (list directory)
      status: done
      description: std::fs::read_dir, write null-separated filenames to RAM
    - id: p137.d3.t2
      title: Update file_browser.asm to use FSLS for host dirs
      status: done
      description: Add option to browse host filesystem via FSLS/FSREAD
    - id: p137.d3.t3
      title: Add 'host' command to shell.asm
      status: done
      description: '''host ls ~/documents'' lists real host directory'
    scope_lines: 80
  - name: 'Security: sandbox to home directory'
    description: FSOPEN/FSREAD/FSWRITE/FSLS should be restricted to the user's home
      directory by default. No access to /etc, /root, /var, etc. Configurable via
      settings. Prevents GeOS programs from accidentally or maliciously modifying
