- id: phase-201
  title: Hilbert RAM Mirror Opcode (HMIRROR)
  status: planned
  goal: Make memory layout visible via space-filling curves so anomalies are seen,
    not parsed
  description: 'The research doc''s strongest concrete claim: project a contiguous
    RAM range onto a canvas region using a Hilbert order-8 curve, one byte per pixel.
    This gives VLM agents spatial locality -- adjacent bytes map to adjacent pixels.
    A memory leak becomes a visibly expanding bright band. A repeating pattern becomes
    visible stripes. This is the cheapest feature in the pixel-system plan and produces
    the most striking demo.'
