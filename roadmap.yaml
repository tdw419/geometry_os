  description: 'The canvas buffer (128 rows x 32 cols = 4096 cells) currently lives
    in a separate Vec<u32> outside VM RAM. Map it into the VM address space at 0x8000-0x8FFF
    so that existing STORE and LOAD opcodes can read and write grid cells directly.
    No new opcodes needed -- just intercept the address range in the VM''s memory
    access path.

    '
  goal: Make the canvas grid addressable from VM RAM via STORE/LOAD
  id: phase-45
  risks:
  - Page translation might block canvas access for user-mode processes
  - Canvas buffer ownership between main.rs and vm.rs needs careful handling
  - STORE handler's user-mode protection (addr >= 0xFF00 check) must not block canvas
    writes
  scope_lines_total: 370
  status: done
  technical_notes: 'The VM''s RAM is 0x10000 (65536 cells). The canvas buffer is 4096
    cells. Mapping at 0x8000 leaves plenty of headroom (0x9000-0xFFFF still available).
    The screen buffer (256x256 = 65536 pixels) is too large for a contiguous RAM mapping
    -- that''s addressed in phase 46.

    Canvas buffer sync strategy: copy main''s canvas_buffer into VM before execution,
    copy VM''s canvas writes back after execution. 4096 * 4 bytes = 16KB per frame,
    negligible cost.

    The page translation layer (translate_va_or_fault) must be considered. For kernel-mode
    processes (the default for canvas-assembled programs), virtual address == physical
    address. For user-mode child processes, the page table may remap things. The canvas
    range should work through the normal translation path.

    '
  test_target: 10
  title: RAM-Mapped Canvas Buffer
