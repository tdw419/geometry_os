- id: phase-204
  title: Fix WVIEWPORT Dead Code (unreachable match arm after wildcard)
  status: planned
  goal: The WVIEWPORT window operation (op=10) actually works instead of silently returning error
  description: 'In src/vm/mod.rs around line 1709, the match arm for window operations has `_ =>` (unknown op, returns r0=0) placed BEFORE `10 =>` (WVIEWPORT). Since `_` matches everything, the WVIEWPORT arm at line 1713 is dead code — unreachable. Any program calling WVIEWPORT gets r0=0 (error) instead of setting the viewport offset. This was introduced when the wildcard was added without considering existing numbered arms below it. The fix is to move `10 => { ... }` above the `_ => { ... }` arm.'
  deliverables:
  - name: Move WVIEWPORT arm above wildcard in window op match
    status: todo
    tasks:
    - id: p204.d1.t1
      title: Move the 10 => WVIEWPORT block above the _ => wildcard arm
      description: In src/vm/mod.rs, the match on window sub-operations (around line 1700-1730) has `_ =>` at ~line 1709 followed by `10 =>` at ~line 1713. Move the entire `10 => { ... WVIEWPORT ... }` block to just before the `_ =>` block. Verify no other numbered arms are similarly trapped after the wildcard.
      scope_files:
      - src/vm/mod.rs
      scope_lines: 5
    scope_lines: 5
  scope_lines_total: 86380
