  description: The VFS Pixel Surface is a 256x256 RGBA framebuffer at MMIO 0x7000_0000.
    Files are encoded as colored pixels -- Row 0 is a directory index, subsequent
    rows contain file headers and data. Guest reads files with a single lw instruction
    (no ecall, no trap). Guest writes files by painting pixels and setting dirty bits.
    The host flushes changes back to the real filesystem. "Pixels move pixels" --
    storage and display are the same thing.
  goal: Replace ecall-based VFS with MMIO pixel surface at 0x7000_0000
  id: phase-119
  risks:
  - 16-bit hash collisions possible with many files
  - No append/resize support yet
  scope_lines_total: 70000
  status: done
  technical_notes: The VFS Surface uses FNV-1a hashing for filename lookup. 16-bit
    hash in directory index with full 32-bit hash available. File data stored in little-endian
    byte order within pixels. Max file size ~64KB (65535 bytes). Surface auto-loads
    on init, auto-flushes on Drop. Guest C API defined in design doc for vfs_pixel.h
    pattern.
  test_target: 2026
  title: VFS Pixel Surface -- Pixels Move Pixels
