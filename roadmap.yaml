  status: done
  technical_notes: 'The screen buffer (self.screen) is already a field on the VM struct,
    unlike canvas_buffer which lives in main.rs. This makes interception simpler --
    no sync step needed.

    RAM_SIZE expansion from 0x10000 to 0x20000 adds 256KB of memory (64K u32 cells).
    At current RAM usage this is fine. The screen mapping at 0x10000 means screen
    pixels are at screen[y * 256 + x], accessed as RAM[0x10000 + y * 256 + x].

    Alternative: don''t expand RAM, instead use a separate mapping that redirects
    LOAD/STORE at 0x9000-0xFFFF to the screen buffer. But this creates an address
    collision with I/O ports (0xFFB-0xFFF). Expanding RAM is cleaner.

    '
