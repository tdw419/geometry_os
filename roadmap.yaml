      description: 'Precompute a [(u8,u8); 65536] table mapping linear index to (x,y)
        via Hilbert curve. Order 8 = 256x256 covers full 64K RAM at 1px/byte. Also
        provide xy2d for reverse lookup. Include unit tests: known points (0,0), (65535,255,255),
        symmetry checks.'
