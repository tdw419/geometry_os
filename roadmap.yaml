- id: phase-160
  title: Native RISC-V Linux Boot to Userspace
  status: research
  priority: 10
  goal: 'RESEARCH-ONLY: Boot Linux 6.14 natively in the RISC-V interpreter. Demoted
    from priority 99 per SPEC.md — Geometry OS is pixel-native on bare-metal RISC-V,
    not a Linux distribution. This phase stays as a research artifact. New work targets
    the bare-metal mini-shell and Layer 3 tools.'
  description: 'Phase-40 ''Boot Linux'' is marked done but that was the QEMU bridge
    approach.

    The native interpreter now boots Linux to idle loop (April 2026 breakthrough).

    Three bugs were fixed: DTB reserved-memory format, timer interrupt MTI->STI

    translation, and WFI instruction decoding. The kernel successfully initializes:

    reserved memory, zone ranges, SLUB, interrupt controller, clocksource, scheduler,

    console, mount caches -- then sits in WFI idle.


    The remaining gap is getting from idle to userspace. The kernel needs to:

    1. Complete scheduler init and fork the init task

    2. Exec /init from the initramfs

    3. Drop to user mode (U-mode)

    4. Run busybox shell


    Key files: src/riscv/boot.rs (boot loop), src/riscv/dtb.rs (device tree),

    src/riscv/sbi.rs (SBI handler), src/riscv/clint.rs (timer), src/riscv/cpu/

    (interpreter), src/riscv/tests.rs (test harness).


    Test: cargo test --lib test_linux_kernel_early_boot --release -- --nocapture

    The test currently runs 50M instructions at ~16.8 MIPS.

