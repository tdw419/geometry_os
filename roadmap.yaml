  dependencies:
  - reason: RUNNEXT is meaningless without ASMSELF to produce the bytecode
    source: phase-47
    target: phase-48
    type: hard
  description: 'Add the RUNNEXT opcode that sets PC to 0x1000 (the canvas bytecode
    region) and continues execution. Combined with ASMSELF, a program can write new
    code onto the canvas, compile it, and run it -- all from within the VM. This closes
    the loop: pixels write pixels, pixels assemble pixels, pixels execute pixels.

    '
  goal: Add an opcode that starts executing the newly assembled bytecode
  id: phase-48
  risks:
  - Infinite self-modification loops (program rewrites itself forever)
  - Assembler errors in a running context could leave the VM in a bad state
  scope_lines_total: 140
  status: done
  technical_notes: 'RUNNEXT is intentionally simple: it just sets PC = 0x1000. The
    complexity is in ASMSELF (phase 47). RUNNEXT could alternatively be implemented
    as a JMP to a label at 0x1000, but having a dedicated opcode makes the intent
    clear and enables future extensions (e.g., RUNNEXT with a timeout, RUNNEXT in
    a sandboxed context).

    Register preservation: RUNNEXT does NOT reset registers. The new program inherits
    all register state. This is by design -- it allows data passing between program
    generations. If a clean slate is needed, the new program can zero registers itself.

    Stack preservation: the return stack is NOT reset. This means the new program
    can RET back to the caller if the caller used CALL before RUNNEXT. This is a feature,
    not a bug -- it enables coroutines.

    '
  test_target: 5
  title: Self-Execution Opcode (RUNNEXT)
