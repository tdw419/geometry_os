[pytest]
# Register custom markers to avoid warnings
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    asyncio: marks tests as async tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum pytest version
minversion = 7.0

# Addopts: Use -v and --tb=short for normal test runs
# Note: -q can be used to override -v for collection-only runs
# Also ignore duplicate test files in worktrees and conductor directories
addopts = -v --tb=short --ignore=.worktrees --ignore=conductor --ignore=systems/prts_toolchain/tests --ignore=systems/prts_toolchain
