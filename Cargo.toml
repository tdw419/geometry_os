[package]
name = "pixels-move-pixels"
version = "0.1.0"
edition = "2021"
description = "The GPU is the computer. Pixels are instructions. Programs write programs."

[[bin]]
name = "pmp"
path = "src/main.rs"

[[bin]]
name = "pmp-eval"
path = "src/bin/pmp-eval.rs"

[[bin]]
name = "pmp-repl"
path = "src/bin/pmp-repl.rs"

[[bin]]
name = "pmp-trace"
path = "src/bin/pmp-trace.rs"

[[bin]]
name = "pmp-windowed"
path = "src/bin/daemon_windowed.rs"

[[test]]
name = "self_replication"
path = "tests/self_replication.rs"

[[test]]
name = "copy_executes"
path = "tests/copy_executes.rs"

[[test]]
name = "hello_pixels"
path = "tests/hello_pixels.rs"

[[test]]
name = "opcode_tests"
path = "tests/opcode_tests.rs"

[[test]]
name = "opcode_full_suite"
path = "tests/opcode_full_suite.rs"

[[test]]
name = "bold_atlas"
path = "tests/bold_atlas.rs"

[dependencies]
wgpu = "0.19"
pollster = "0.3"
bytemuck = { version = "1.25", features = ["derive"] }
image = "0.25"
env_logger = "0.11"
log = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rand = { version = "0.8", features = ["small_rng"] }
winit = "0.29"
serde_yaml = "0.9.34"
rusqlite = { version = "0.39.0", features = ["bundled"] }
ureq = { version = "3.3.0", features = ["json"] }
