              self.pc = CANVAS_BYTECODE_ADDR (0x1000). No operands needed (1-byte
              instruction). Register file is preserved. The VM continues fetching
              from the new PC on the next cycle.
            dependencies: ["p47.d1.t1"]
            acceptance_criteria:
