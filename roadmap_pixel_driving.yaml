title: "Pixel Driving Pixels: Self-Modifying Canvas Programs"
version: "1.0.0"
description: >
  Make the Geometry OS canvas programmable from within the VM. Programs read and
  write the grid they live on, assemble new programs onto the grid, and execute
  their own replacements. Pixels drive pixels.
project_url: "https://github.com/timothywhittaker/geometry_os"

phases:
  - id: "phase-45"
    title: "RAM-Mapped Canvas Buffer"
    status: "todo"
    goal: "Make the canvas grid addressable from VM RAM via STORE/LOAD"
    description: >
      The canvas buffer (128 rows x 32 cols = 4096 cells) currently lives in a
      separate Vec<u32> outside VM RAM. Map it into the VM address space at
      0x8000-0x8FFF so that existing STORE and LOAD opcodes can read and write
      grid cells directly. No new opcodes needed -- just intercept the address
      range in the VM's memory access path.
    deliverables:
      - name: "Canvas memory region constant and address mapping"
        description: >
          Define CANVAS_RAM_BASE = 0x8000, CANVAS_RAM_SIZE = 4096 (128*32).
          Document the mapping: address 0x8000 + row*32 + col corresponds to
          canvas_buffer[row * 32 + col]. Add to memory map docs.
        status: "todo"
        acceptance_criteria:
          - description: "CANVAS_RAM_BASE constant defined in vm.rs or main.rs"
            validation: "grep CANVAS_RAM_BASE src/vm.rs src/main.rs"
            met: false
          - description: "Memory map documentation updated in CANVAS_TEXT_SURFACE.md"
            validation: "grep 0x8000 docs/CANVAS_TEXT_SURFACE.md"
            met: false
        tasks:
          - id: "p45.d1.t1"
            title: "Define CANVAS_RAM_BASE and CANVAS_RAM_SIZE constants"
            status: "todo"
            description: >
              Add `pub const CANVAS_RAM_BASE: usize = 0x8000;` and
              `pub const CANVAS_RAM_SIZE: usize = 4096;` to vm.rs (or main.rs
              if canvas_buffer ownership stays there). These are the address
              range [0x8000, 0x8FFF] that maps to the canvas grid.
            dependencies: []
            acceptance_criteria:
              - "Constants defined and visible to both vm.rs and main.rs"
            files: ["src/vm.rs"]
          - id: "p45.d1.t2"
            title: "Update CANVAS_TEXT_SURFACE.md memory map with 0x8000 range"
            status: "todo"
            description: >
              Add a row to the memory map table in CANVAS_TEXT_SURFACE.md:
              0x8000-0x8FFF | 4096 | Canvas grid (RAM-mapped mirror of canvas_buffer)
            dependencies: ["p45.d1.t1"]
            acceptance_criteria:
              - "Memory map shows 0x8000-0x8FFF as canvas region"
            files: ["docs/CANVAS_TEXT_SURFACE.md"]
        scope_lines: 20
        scope_files: ["src/vm.rs", "docs/CANVAS_TEXT_SURFACE.md"]

      - name: "Intercept LOAD for canvas address range"
        description: >
          In the LOAD opcode handler (0x11 in vm.rs), when the translated
          physical address falls in [CANVAS_RAM_BASE, CANVAS_RAM_BASE + 4095],
          read from canvas_buffer instead of self.ram. The VM needs a reference
          or copy of the canvas buffer. Easiest approach: the canvas_buffer is
          passed to the VM (or VM holds a reference) so LOAD can index into it.
        status: "todo"
        acceptance_criteria:
          - description: "LOAD from 0x8000+row*32+col returns canvas_buffer value"
            validation: "Write test program: STORE to canvas addr, LOAD back, verify"
            met: false
          - description: "LOAD from addresses outside 0x8000-0x8FFF still works normally"
            validation: "Existing tests pass without modification"
            met: false
        tasks:
          - id: "p45.d2.t1"
            title: "Add canvas_buffer reference to VM struct"
            status: "todo"
            description: >
              The VM struct needs access to the canvas buffer for both LOAD and
              STORE interception. Add a field like `pub canvas_buffer: Vec<u32>`
              to the VM struct (a copy that gets synced back to main.rs canvas_buffer
              each frame) OR pass it as a mutable reference through the execute
              method. The copy approach is simpler and avoids lifetime issues.
            dependencies: ["p45.d1.t1"]
            acceptance_criteria:
              - "VM struct has access to canvas buffer data"
              - "cargo build succeeds"
            files: ["src/vm.rs", "src/main.rs"]
          - id: "p45.d2.t2"
            title: "Intercept LOAD opcode for canvas range"
            status: "todo"
            description: >
              In the LOAD handler (opcode 0x11), after page translation produces
              a physical address, check if it falls in [CANVAS_RAM_BASE,
              CANVAS_RAM_BASE + CANVAS_RAM_SIZE). If so, read from the canvas
              buffer at (addr - CANVAS_RAM_BASE) instead of self.ram[addr].
              The canvas buffer index maps directly: canvas_buffer[addr - 0x8000].
            dependencies: ["p45.d2.t1"]
            acceptance_criteria:
              - "LOAD from canvas addr returns the glyph value stored there"
              - "LOAD from normal RAM addr is unchanged"
            files: ["src/vm.rs"]
          - id: "p45.d2.t3"
            title: "Sync canvas_buffer to VM before execution"
            status: "todo"
            description: >
              Before each frame's VM execution, copy the current canvas_buffer
              contents into the VM's canvas mirror (or set up the reference).
              This ensures the VM sees the latest grid state including human-typed
              text.
            dependencies: ["p45.d2.t1"]
            acceptance_criteria:
              - "VM canvas mirror matches main.rs canvas_buffer at start of each frame"
            files: ["src/main.rs"]
        scope_lines: 80
        scope_files: ["src/vm.rs", "src/main.rs"]

      - name: "Intercept STORE for canvas address range"
        description: >
          In the STORE opcode handler (0x12 in vm.rs), when the translated
          physical address falls in [CANVAS_RAM_BASE, CANVAS_RAM_BASE + 4095],
          write to canvas_buffer instead of self.ram. After the store, mark
          the canvas as dirty so the renderer picks up the change on the next
          frame.
        status: "todo"
        acceptance_criteria:
          - description: "STORE to 0x8000+row*32+col writes value to canvas_buffer"
            validation: "Write test: STORE 0x8000 with 'H', see 'H' appear on grid"
            met: false
          - description: "Stored values appear as glyphs on the canvas grid"
            validation: "Visual test: program writes ASCII chars, grid shows them"
            met: false
          - description: "STORE to addresses outside canvas range still works"
            validation: "Existing tests pass"
            met: false
        tasks:
          - id: "p45.d3.t1"
            title: "Intercept STORE opcode for canvas range"
            status: "todo"
            description: >
              In the STORE handler (opcode 0x12), after page translation, check
              if the address is in the canvas range. If so, write to the canvas
              buffer at (addr - CANVAS_RAM_BASE) instead of self.ram[addr].
              Bypass the user-mode protection for this range (canvas is not I/O).
            dependencies: ["p45.d2.t1"]
            acceptance_criteria:
              - "STORE to canvas addr writes to canvas buffer"
              - "User-mode programs can write to canvas (no segfault)"
            files: ["src/vm.rs"]
          - id: "p45.d3.t2"
            title: "Sync VM canvas mutations back to main canvas_buffer"
            status: "todo"
            description: >
              After each frame's VM execution, copy any changed canvas cells from
              the VM's mirror back to main.rs's canvas_buffer. This ensures the
              renderer displays the VM's writes. A simple full-copy each frame is
              fine (4096 u32 values = 16KB).
            dependencies: ["p45.d3.t1"]
            acceptance_criteria:
              - "Changes made by VM via STORE appear on the visible canvas grid"
            files: ["src/main.rs"]
          - id: "p45.d3.t3"
            title: "Handle User-mode access to canvas region"
            status: "todo"
            description: >
              The STORE handler currently blocks User-mode writes to addr >= 0xFF00.
              The canvas range (0x8000) is below this threshold, so User-mode should
              work by default. But verify and add a comment clarifying that canvas
              writes are permitted in User mode. If any page translation or
              protection logic would block it, add an explicit exception.
            dependencies: ["p45.d3.t1"]
            acceptance_criteria:
              - "User-mode programs can STORE to canvas range without segfault"
            files: ["src/vm.rs"]
        scope_lines: 60
        scope_files: ["src/vm.rs", "src/main.rs"]

      - name: "Test suite for RAM-mapped canvas"
        description: >
          Write tests that verify STORE/LOAD to canvas addresses work correctly.
          Test read-after-write, boundary conditions, interaction with normal RAM,
          and multi-process canvas access.
        status: "todo"
        acceptance_criteria:
          - description: "At least 5 tests covering canvas LOAD/STORE behavior"
            validation: "cargo test passes with new tests"
            met: false
          - description: "All existing tests still pass"
            validation: "cargo test --no-fail-fast 2>&1 | tail -5"
            met: false
        tasks:
          - id: "p45.d4.t1"
            title: "Test: LOAD reads canvas buffer values"
            status: "todo"
            description: >
              Write a test that pre-fills canvas_buffer cells with known values,
              runs a program that LOADs from 0x8000+offset, and checks the
              register contains the expected value.
            dependencies: ["p45.d2.t2", "p45.d3.t1"]
            acceptance_criteria:
              - "Test asserts register value matches canvas cell content"
            files: ["src/vm.rs"]
          - id: "p45.d4.t2"
            title: "Test: STORE writes appear in canvas buffer"
            status: "todo"
            description: >
              Write a test that runs a program storing values to canvas addresses,
              then checks the canvas buffer contains those values.
            dependencies: ["p45.d3.t1"]
            acceptance_criteria:
              - "Test asserts canvas_buffer has stored values after execution"
            files: ["src/vm.rs"]
          - id: "p45.d4.t3"
            title: "Test: boundary conditions (first/last cell, row boundaries)"
            status: "todo"
            description: >
              Test STORE/LOAD at 0x8000 (first cell), 0x8FFF (last cell), and
              at row boundaries (e.g. end of row 0, start of row 1). Verify no
              off-by-one errors.
            dependencies: ["p45.d3.t1"]
            acceptance_criteria:
              - "All boundary addresses read/write correctly"
            files: ["src/vm.rs"]
          - id: "p45.d4.t4"
            title: "Test: canvas access does not corrupt normal RAM"
            status: "todo"
            description: >
              Write a test that stores to both normal RAM and canvas addresses,
              then verifies the normal RAM values are unchanged and the canvas
              values are correct. Ensures the two memory spaces don't overlap.
            dependencies: ["p45.d3.t1"]
            acceptance_criteria:
              - "RAM values unchanged after canvas writes"
              - "Canvas values unchanged after RAM writes"
            files: ["src/vm.rs"]
          - id: "p45.d4.t5"
            title: "Test: page translation works with canvas addresses"
            status: "todo"
            description: >
              Verify that LOAD/STORE to canvas addresses still go through the
              page translation mechanism. A process with a page table that maps
              0x8000 to a different physical address should see the translated
              result. Or if canvas is identity-mapped, verify that works.
            dependencies: ["p45.d2.t2", "p45.d3.t1"]
            acceptance_criteria:
              - "Canvas LOAD/STORE respects page translation"
            files: ["src/vm.rs"]
        scope_lines: 150
        scope_files: ["src/vm.rs"]

      - name: "Demo program: canvas grid writer"
        description: >
          Write an assembly program that writes ASCII characters to the canvas
          grid using STORE. The program fills the grid with a visible pattern --
          for example, writing "HELLO WORLD" across the top row, or filling the
          grid with sequential ASCII values. The human sees the text appear on
          the grid while the program runs.
        status: "todo"
        acceptance_criteria:
          - description: "Program writes visible text to canvas grid via STORE"
            validation: "Load program, F8 assemble, F5 run, see text on grid"
            met: false
          - description: "Demo program added to programs/ directory"
            validation: "ls programs/canvas_*.asm"
            met: false
        tasks:
          - id: "p45.d5.t1"
            title: "Write canvas_grid_writer.asm demo"
            status: "todo"
            description: >
              Create programs/canvas_grid_writer.asm. The program uses LDI to
              load ASCII values and STORE to write them to 0x8000+ addresses.
              Writes "PIXELS DRIVE PIXELS" across the first visible row. Uses a
              loop with an index register incrementing through the string.
            dependencies: ["p45.d3.t1"]
            acceptance_criteria:
              - "Program assembles without errors"
              - "Running the program shows text on the canvas grid"
            files: ["programs/canvas_grid_writer.asm"]
          - id: "p45.d5.t2"
            title: "Write canvas_counter.asm demo"
            status: "todo"
            description: >
              Create programs/canvas_counter.asm. A loop that increments a counter
              and writes the digit (as ASCII) to a specific canvas cell each
              iteration. The human sees a digit ticking up on the grid in real time.
            dependencies: ["p45.d3.t1"]
            acceptance_criteria:
              - "Counter digit visibly changes on the grid each frame"
            files: ["programs/canvas_counter.asm"]
        scope_lines: 60
        scope_files: ["programs/canvas_grid_writer.asm", "programs/canvas_counter.asm"]

    dependencies: []
    technical_notes: >
      The VM's RAM is 0x10000 (65536 cells). The canvas buffer is 4096 cells.
      Mapping at 0x8000 leaves plenty of headroom (0x9000-0xFFFF still available).
      The screen buffer (256x256 = 65536 pixels) is too large for a contiguous
      RAM mapping -- that's addressed in phase 46.

      Canvas buffer sync strategy: copy main's canvas_buffer into VM before
      execution, copy VM's canvas writes back after execution. 4096 * 4 bytes =
      16KB per frame, negligible cost.

      The page translation layer (translate_va_or_fault) must be considered.
      For kernel-mode processes (the default for canvas-assembled programs),
      virtual address == physical address. For user-mode child processes,
      the page table may remap things. The canvas range should work through
      the normal translation path.
    risks:
      - "Page translation might block canvas access for user-mode processes"
      - "Canvas buffer ownership between main.rs and vm.rs needs careful handling"
      - "STORE handler's user-mode protection (addr >= 0xFF00 check) must not block canvas writes"
    scope_lines_total: 370
    test_target: 10

  - id: "phase-46"
    title: "RAM-Mapped Screen Buffer"
    status: "todo"
    goal: "Make the 256x256 screen buffer addressable from VM RAM"
    description: >
      The screen buffer (256x256 = 65536 pixels) is currently only accessible
      via PIXEL (write) and PEEK (read) opcodes. Map it into the VM address
      space at 0x9000-0x13FFF (a 64K region) so that normal LOAD/STORE can
      read and write screen pixels. This unifies all three memory spaces
      (RAM, canvas, screen) under one addressing scheme.
    deliverables:
      - name: "Screen memory region mapping"
        description: >
          Define SCREEN_RAM_BASE = 0x9000. The screen is 256x256 = 65536 cells,
          so it spans 0x9000-0x18FFF. However, VM RAM is only 0x10000 total.
          Options: (a) expand RAM_SIZE to 0x20000, (b) use a sparse/aliased
          mapping where only low-res access works, (c) map screen at a higher
          address with extended RAM. Simplest: expand RAM to 0x20000 (128K)
          and map screen at 0x10000.
        status: "todo"
        acceptance_criteria:
          - description: "Screen buffer is LOAD/STORE accessible at a defined address range"
            validation: "LOAD from screen addr returns same value as PEEK"
            met: false
          - description: "Existing PIXEL and PEEK opcodes still work"
            validation: "cargo test passes"
            met: false
        tasks:
          - id: "p46.d1.t1"
            title: "Determine screen mapping strategy and expand RAM if needed"
            status: "todo"
            description: >
              Evaluate options for mapping the 64K screen buffer. The simplest
              approach: expand RAM_SIZE from 0x10000 to 0x20000 (128K) and map
              the screen buffer at 0x10000. This keeps everything in one flat
              address space. Alternative: use a windowed mapping at 0x9000 where
              only a 4K window is visible at a time (controlled by a register).
              Recommend the flat mapping for simplicity.
            dependencies: ["p45.d3.t1"]
            acceptance_criteria:
              - "Decision documented with address range and RAM size"
            files: ["src/vm.rs"]
          - id: "p46.d1.t2"
            title: "Implement screen buffer LOAD interception"
            status: "todo"
            description: >
              In the LOAD handler, check if the translated address falls in the
              screen buffer range. If so, read from self.screen[addr - SCREEN_RAM_BASE]
              instead of self.ram[addr]. The screen buffer already exists on the
              VM struct as `pub screen: Vec<u32>`.
            dependencies: ["p46.d1.t1"]
            acceptance_criteria:
              - "LOAD from screen addr returns pixel color value"
            files: ["src/vm.rs"]
          - id: "p46.d1.t3"
            title: "Implement screen buffer STORE interception"
            status: "todo"
            description: >
              In the STORE handler, check if the translated address falls in the
              screen buffer range. If so, write to self.screen[addr - SCREEN_RAM_BASE].
              The renderer will pick up the change on the next frame automatically
              since it reads from self.screen.
            dependencies: ["p46.d1.t1"]
            acceptance_criteria:
              - "STORE to screen addr changes the visible pixel"
            files: ["src/vm.rs"]
        scope_lines: 100
        scope_files: ["src/vm.rs"]

      - name: "Tests for screen buffer mapping"
        description: >
          Verify that LOAD/STORE to screen addresses correctly read and write
          pixels. Cross-validate against PEEK and PIXEL opcodes.
        status: "todo"
        acceptance_criteria:
          - description: "LOAD from screen address matches PEEK result"
            validation: "Test program: PEEK and LOAD same pixel, compare registers"
            met: false
          - description: "STORE to screen address matches PIXEL result"
            validation: "Test program: STORE and PIXEL write same location, compare"
            met: false
        tasks:
          - id: "p46.d2.t1"
            title: "Test: LOAD from screen matches PEEK"
            status: "todo"
            description: >
              Write a test that draws a pixel with PIXEL opcode, then reads it
              with both PEEK and LOAD (via screen-mapped address). Verify both
              return the same color value.
            dependencies: ["p46.d1.t2"]
            acceptance_criteria:
              - "PEEK and LOAD return identical values"
            files: ["src/vm.rs"]
          - id: "p46.d2.t2"
            title: "Test: STORE to screen matches PIXEL"
            status: "todo"
            description: >
              Write a test that writes a pixel via both PIXEL opcode and STORE
              to screen-mapped address. Read back with PEEK and verify both
              wrote the same value.
            dependencies: ["p46.d1.t3"]
            acceptance_criteria:
              - "Both methods produce identical pixel values on screen"
            files: ["src/vm.rs"]
        scope_lines: 80
        scope_files: ["src/vm.rs"]

      - name: "Unified memory map documentation"
        description: >
          Update all memory map documentation to show the complete unified
          address space: RAM (0x0000-0x7FFF), canvas (0x8000-0x8FFF), screen
          (0x10000+). Add a new doc section showing the full map.
        status: "todo"
        acceptance_criteria:
          - description: "All three regions documented in one place"
            validation: "grep 'canvas\\|screen\\|RAM' docs/CANVAS_TEXT_SURFACE.md shows unified map"
            met: false
        tasks:
          - id: "p46.d3.t1"
            title: "Write UNIFIED_MEMORY_MAP section in docs"
            status: "todo"
            description: >
              Add a section to CANVAS_TEXT_SURFACE.md (or create
              UNIFIED_MEMORY_MAP.md) showing the complete address space:
              0x0000-0x0FFF: bytecode/data, 0x1000-0x1FFF: canvas bytecode,
              0x8000-0x8FFF: canvas grid (mirror), 0x10000-0x1FFFF: screen
              buffer. Explain the design: one address space, three backing
              stores, LOAD/STORE as the universal access method.
            dependencies: ["p46.d1.t3"]
            acceptance_criteria:
              - "Document shows all regions with address ranges and purposes"
            files: ["docs/CANVAS_TEXT_SURFACE.md"]
        scope_lines: 40
        scope_files: ["docs/CANVAS_TEXT_SURFACE.md"]

    dependencies:
      - source: "phase-45"
        target: "phase-46"
        type: "hard"
        reason: "Screen mapping follows the same interception pattern as canvas mapping"
    technical_notes: >
      The screen buffer (self.screen) is already a field on the VM struct, unlike
      canvas_buffer which lives in main.rs. This makes interception simpler -- no
      sync step needed.

      RAM_SIZE expansion from 0x10000 to 0x20000 adds 256KB of memory (64K u32
      cells). At current RAM usage this is fine. The screen mapping at 0x10000
      means screen pixels are at screen[y * 256 + x], accessed as
      RAM[0x10000 + y * 256 + x].

      Alternative: don't expand RAM, instead use a separate mapping that redirects
      LOAD/STORE at 0x9000-0xFFFF to the screen buffer. But this creates an
      address collision with I/O ports (0xFFB-0xFFF). Expanding RAM is cleaner.
    risks:
      - "RAM_SIZE expansion may affect fuzzer or existing test assumptions about address space"
      - "Screen buffer is 256x256=64K which exactly fills the expansion -- no room for growth"
      - "Page translation for screen addresses may need special handling"
    scope_lines_total: 220
    test_target: 8

  - id: "phase-47"
    title: "Self-Assembly Opcode (ASMSELF)"
    status: "todo"
    goal: "Add an opcode that lets a running program assemble canvas text into bytecode"
    description: >
      Add the ASMSELF opcode (or RECOMPILE) that reads the current canvas text,
      runs it through the preprocessor and assembler, and stores the resulting
      bytecode at 0x1000. This lets a program write new assembly onto the canvas
      grid (using STORE to the canvas range from phase 45) and then compile it
      without human intervention. Combined, a program can generate its own
      replacement.
    deliverables:
      - name: "ASMSELF opcode implementation"
        description: >
          New opcode (suggest 0x52 or next available). When executed:
          1. Read the canvas buffer as a text string (same logic as F8 handler)
          2. Run through preprocessor::preprocess()
          3. Run through assembler::assemble()
          4. If success: write bytecode to 0x1000, set a flag
          5. If failure: set an error register/port with the error info
          The VM needs access to the preprocessor and assembler modules.
        status: "todo"
        acceptance_criteria:
          - description: "ASMSELF assembles canvas text into bytecode at 0x1000"
            validation: "Program writes text to canvas, calls ASMSELF, then LOADs from 0x1000 to verify bytecode"
            met: false
          - description: "Assembly errors are reported without crashing the VM"
            validation: "Write invalid text to canvas, call ASMSELF, VM continues running"
            met: false
        tasks:
          - id: "p47.d1.t1"
            title: "Add ASMSELF opcode constant and handler skeleton"
            status: "todo"
            description: >
              Reserve the next available opcode number for ASMSELF. Add a stub
              handler in the VM's execute loop that reads the canvas buffer,
              converts to text string, and logs "ASMSELF called" for now.
            dependencies: ["p45.d3.t1"]
            acceptance_criteria:
              - "Opcode constant defined in vm.rs"
              - "Handler appears in execute match arm"
            files: ["src/vm.rs"]
          - id: "p47.d1.t2"
            title: "Implement canvas-to-text conversion in VM context"
            status: "todo"
            description: >
              Extract the canvas-to-text conversion logic from the F8 handler
              in main.rs into a reusable function. This function takes a
              &[u32] (canvas buffer slice) and returns a String. The F8 handler
              and the ASMSELF opcode both call this function. Place it in a
              shared module (e.g., preprocessor.rs or a new canvas.rs).
            dependencies: ["p47.d1.t1"]
            acceptance_criteria:
              - "Function exists and is callable from both vm.rs and main.rs"
              - "F8 handler refactored to use the shared function"
            files: ["src/vm.rs", "src/main.rs"]
          - id: "p47.d1.t3"
            title: "Wire preprocessor and assembler into ASMSELF handler"
            status: "todo"
            description: >
              In the ASMSELF handler, after getting the text string from the
              canvas: call preprocessor::preprocess(), then
              assembler::assemble(). On success, write bytecode bytes to
              self.ram starting at CANVAS_BYTECODE_ADDR (0x1000). On failure,
              write the error string to a memory-mapped error port or a
              designated RAM region. The VM will need to import/use the
              preprocessor and assembler modules.
            dependencies: ["p47.d1.t2"]
            acceptance_criteria:
              - "ASMSELF produces valid bytecode at 0x1000"
              - "Invalid assembly writes error info without crashing"
            files: ["src/vm.rs"]
          - id: "p47.d1.t4"
            title: "Add ASMSELF to disassembler"
            status: "todo"
            description: >
              Add the ASMSELF opcode to the disassemble() method in vm.rs so it
              appears correctly in trace output and disassembly views.
            dependencies: ["p47.d1.t1"]
            acceptance_criteria:
              - "Disassembler shows ASMSELF with correct operand count"
            files: ["src/vm.rs"]
          - id: "p47.d1.t5"
            title: "Add ASMSELF to assembler mnemonic list"
            status: "todo"
            description: >
              Add "ASMSELF" to the OPCODES list in preprocessor.rs and the
              assembler in assembler.rs. It takes no operands (just the opcode
              byte). Update the opcode count in docs and meta.
            dependencies: ["p47.d1.t1"]
            acceptance_criteria:
              - "Can type ASMSELF in assembly source and it assembles"
              - "Opcode count incremented in documentation"
            files: ["src/assembler.rs", "src/preprocessor.rs"]
        scope_lines: 200
