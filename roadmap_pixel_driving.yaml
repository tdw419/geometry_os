    status: "future"
    goal: "Make canvas cells react to changes in other cells automatically"
    description: >
      Extend the canvas with an optional formula layer. A cell can have a
      formula instead of a static value. When a referenced cell changes, the
      formula cell recalculates. This is the spreadsheet model applied to the
      pixel grid. It makes the canvas reactive without explicit STORE/LOAD loops.

      This is a future phase -- it depends on phases 45-48 being stable and is
      a natural evolution of the pixel-driving-pixels concept. Not required for
      the initial self-modifying capability.
    deliverables:
      - name: "Formula cell type and evaluation engine"
        description: >
          Add a parallel buffer (formula_buffer, same size as canvas_buffer) where
          each cell can optionally hold a formula instead of a value. Formulas
          reference other cells by address. When a STORE writes to a cell, the
          engine checks if any formula depends on that cell and recalculates.
        status: "todo"
        tasks: []
      - name: "Formula syntax in preprocessor"
        description: >
          Extend the preprocessor to recognize formula syntax in canvas text.
          A line like `= r0 + r1` means "this cell displays the value of r0 + r1".
