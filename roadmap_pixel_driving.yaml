        reason: "Reactive canvas builds on proven self-modifying patterns"
    technical_notes: >
      This phase explores the spreadsheet model. Each cell can be:
      - A literal value (current behavior)
      - A formula that references other cells or registers
      - A formula that references screen pixels (PEEK-equivalent)

      The dependency graph needs cycle detection to prevent infinite recalculation.
      Simple approach: single-pass topological sort of formula dependencies,
      recalculate in order after any STORE to the canvas.

      This is marked "future" because it's a significant new feature. The core
      pixel-driving-pixels capability (phases 45-48) does not require this.
