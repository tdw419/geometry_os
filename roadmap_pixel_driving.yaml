  - id: "phase-48"
    title: "Self-Execution Opcode (RUNNEXT)"
    status: "todo"
    goal: "Add an opcode that starts executing the newly assembled bytecode"
    description: >
      Add the RUNNEXT opcode that sets PC to 0x1000 (the canvas bytecode region)
      and continues execution. Combined with ASMSELF, a program can write new
      code onto the canvas, compile it, and run it -- all from within the VM.
      This closes the loop: pixels write pixels, pixels assemble pixels, pixels
      execute pixels.
    deliverables:
      - name: "RUNNEXT opcode implementation"
        description: >
          New opcode (next available after ASMSELF). When executed:
          1. Set PC = CANVAS_BYTECODE_ADDR (0x1000)
          2. Reset halted flag
          3. Clear any error state
          4. Execution continues from the new bytecode on the next fetch cycle

          This is essentially JMP 0x1000 but with awareness that the bytecode
          at 0x1000 was just assembled from canvas text. Could be implemented
          as a simple PC set, or as JMP with an implicit operand.
        status: "todo"
        acceptance_criteria:
