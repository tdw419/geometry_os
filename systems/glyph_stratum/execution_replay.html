<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlyphStratum Execution Replay</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'SF Mono', 'Monaco', monospace;
            background: #0d1117;
            color: #c9d1d9;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 350px;
            background: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #30363d;
        }

        .sidebar-header h1 {
            font-size: 16px;
            color: #58a6ff;
        }

        .sidebar-header .subtitle {
            font-size: 11px;
            color: #8b949e;
        }

        /* Execution controls */
        .controls {
            padding: 15px 20px;
            border-bottom: 1px solid #30363d;
        }

        .control-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #c9d1d9;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
        }

        .btn:hover { background: #30363d; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn.primary { background: #238636; border-color: #238636; }
        .btn.primary:hover { background: #2ea043; }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .speed-control label {
            font-size: 11px;
            color: #8b949e;
        }

        .speed-control input {
            flex: 1;
        }

        /* Progress bar */
        .progress-container {
            padding: 15px 20px;
            border-bottom: 1px solid #30363d;
        }

        .progress-label {
            font-size: 11px;
            color: #8b949e;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            height: 6px;
            background: #21262d;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #238636;
            transition: width 0.3s;
        }

        /* Trace log */
        .trace-log {
            flex: 1;
            overflow-y: auto;
            padding: 15px 20px;
        }

        .trace-log h3 {
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 10px;
        }

        .trace-entry {
            font-size: 11px;
            padding: 8px 10px;
            margin-bottom: 4px;
            background: #21262d;
            border-radius: 4px;
            border-left: 3px solid #30363d;
        }

        .trace-entry.current {
            border-left-color: #ffd700;
            background: #2d2a1a;
        }

        .trace-entry.completed {
            border-left-color: #238636;
            opacity: 0.7;
        }

        .trace-entry .step {
            color: #8b949e;
            font-size: 10px;
        }

        .trace-entry .opcode {
            color: #58a6ff;
            font-weight: bold;
        }

        .trace-entry .rationale {
            color: #c9d1d9;
        }

        .trace-entry .result {
            color: #7ee787;
            font-size: 10px;
            margin-top: 4px;
        }

        /* Graph area */
        .graph-area {
            flex: 1;
            position: relative;
        }

        #graph {
            width: 100%;
            height: 100%;
        }

        /* Node states */
        .node circle { transition: all 0.3s; }
        .node.pending circle { opacity: 0.3; }
        .node.running circle {
            stroke: #ffd700;
            stroke-width: 4px;
            filter: drop-shadow(0 0 10px #ffd700);
        }
        .node.completed circle {
            stroke: #238636;
            stroke-width: 3px;
        }
        .node.error circle {
            stroke: #f85149;
            stroke-width: 3px;
        }

        .node text { pointer-events: none; }

        /* Links */
        .link {
            fill: none;
            stroke: #30363d;
            stroke-width: 1.5px;
            opacity: 0.3;
            transition: all 0.3s;
        }

        .link.active {
            stroke: #58a6ff;
            opacity: 1;
            stroke-width: 2px;
        }

        .link.completed {
            stroke: #238636;
            opacity: 0.6;
        }

        /* Current step info */
        .step-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
        }

        .step-info h4 {
            color: #ffd700;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .step-info .fields {
            display: grid;
            grid-template-columns: 80px 1fr;
            gap: 6px;
            font-size: 11px;
        }

        .step-info .label {
            color: #8b949e;
        }

        .step-info .value {
            color: #c9d1d9;
        }

        /* Load section */
        .load-section {
            padding: 15px 20px;
            border-bottom: 1px solid #30363d;
        }

        .load-section h3 {
            font-size: 11px;
            color: #8b949e;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            height: 60px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 4px;
            color: #c9d1d9;
            font-family: inherit;
            font-size: 10px;
            padding: 6px;
            resize: none;
        }

        /* Stratum colors */
        .stratum-INTENT { fill: #ffd700; stroke: #ffd700; }
        .stratum-SPEC { fill: #58a6ff; stroke: #58a6ff; }
        .stratum-LOGIC { fill: #7ee787; stroke: #7ee787; }
        .stratum-MEMORY { fill: #a371f7; stroke: #a371f7; }
        .stratum-SUBSTRATE { fill: #6e7681; stroke: #6e7681; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h1>Execution Replay</h1>
                <div class="subtitle">Step through glyph execution</div>
            </div>

            <div class="load-section">
                <h3>Load Program</h3>
                <textarea id="json-input" placeholder="Paste glyph JSON..."></textarea>
                <div class="control-row" style="margin-top: 8px;">
                    <button class="btn" onclick="loadFromTextarea()">Load</button>
                    <button class="btn" onclick="loadSample()">Sample</button>
                </div>
            </div>

            <div class="controls">
                <div class="control-row">
                    <button class="btn primary" id="btn-play" onclick="play()">▶ Play</button>
                    <button class="btn" id="btn-pause" onclick="pause()" disabled>⏸ Pause</button>
                    <button class="btn" id="btn-reset" onclick="reset()">↺ Reset</button>
                </div>
                <div class="control-row">
                    <button class="btn" id="btn-step" onclick="step()">→ Step</button>
                    <button class="btn" id="btn-step-back" onclick="stepBack()">← Back</button>
                    <button class="btn" onclick="runToEnd()">⏭ End</button>
                </div>
                <div class="speed-control">
                    <label>Speed:</label>
                    <input type="range" id="speed" min="100" max="2000" value="500">
                    <span id="speed-label">500ms</span>
                </div>
            </div>

            <div class="progress-container">
                <div class="progress-label">
                    <span>Progress</span>
                    <span id="progress-text">0 / 0</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
                </div>
            </div>

            <div class="trace-log">
                <h3>Execution Trace</h3>
                <div id="trace-entries"></div>
            </div>
        </div>

        <div class="graph-area">
            <svg id="graph"></svg>
            <div class="step-info" id="step-info" style="display: none;">
                <h4 id="step-title">Current Step</h4>
                <div class="fields">
                    <span class="label">Glyph:</span>
                    <span class="value" id="info-glyph">-</span>
                    <span class="label">Stratum:</span>
                    <span class="value" id="info-stratum">-</span>
                    <span class="label">Opcode:</span>
                    <span class="value" id="info-opcode">-</span>
                    <span class="label">Action:</span>
                    <span class="value" id="info-action">-</span>
                    <span class="label">Result:</span>
                    <span class="value" id="info-result">-</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Sample data
        const sampleData = {
            name: "add_two_numbers",
            glyphs: {
                "0": {stratum: "SUBSTRATE", opcode: "DATA", rationale: "value 5", dependencies: [], invariants: {value: 5}},
                "1": {stratum: "SUBSTRATE", opcode: "DATA", rationale: "value 3", dependencies: [], invariants: {value: 3}},
                "2": {stratum: "MEMORY", opcode: "LOAD", rationale: "load operand a", dependencies: [0], invariants: {}},
                "3": {stratum: "MEMORY", opcode: "LOAD", rationale: "load operand b", dependencies: [1], invariants: {}},
                "4": {stratum: "LOGIC", opcode: "CALL", rationale: "+", dependencies: [2, 3], invariants: {}},
                "5": {stratum: "SPEC", opcode: "EXPORT", rationale: "add(a,b) interface", dependencies: [4], invariants: {}},
                "6": {stratum: "INTENT", opcode: "MODULE", rationale: "add two numbers", dependencies: [5], invariants: {}}
            }
        };

        // State
        let currentData = null;
        let executionOrder = [];
        let currentStep = -1;
        let isPlaying = false;
        let playInterval = null;
        let nodeStates = {};

        const stratumColors = {
            INTENT: "#ffd700",
            SPEC: "#58a6ff",
            LOGIC: "#7ee787",
            MEMORY: "#a371f7",
            SUBSTRATE: "#6e7681"
        };

        // Initialize SVG
        const svg = d3.select("#graph");
        const width = svg.node().getBoundingClientRect().width;
        const height = svg.node().getBoundingClientRect().height;
        const g = svg.append("g");

        // Zoom
        const zoom = d3.zoom().scaleExtent([0.1, 4]).on("zoom", e => g.attr("transform", e.transform));
        svg.call(zoom);

        // Speed control
        document.getElementById("speed").addEventListener("input", e => {
            document.getElementById("speed-label").textContent = e.target.value + "ms";
            if (isPlaying) {
                clearInterval(playInterval);
                playInterval = setInterval(step, parseInt(e.target.value));
            }
        });

        // Load sample
        loadSample();

        function loadSample() {
            currentData = sampleData;
            initializeExecution();
        }

        function loadFromTextarea() {
            try {
                currentData = JSON.parse(document.getElementById("json-input").value);
                initializeExecution();
            } catch (e) {
                alert("Invalid JSON: " + e.message);
            }
        }

        function initializeExecution() {
            // Calculate execution order (topological sort by stratum, then dependencies)
            const glyphs = currentData.glyphs || {};
            const nodes = Object.entries(glyphs).map(([idx, g]) => ({
                id: parseInt(idx),
                ...g
            }));

            // Topological sort
            executionOrder = topologicalSort(nodes);

            // Reset state
            currentStep = -1;
            nodeStates = {};
            for (const node of nodes) {
                nodeStates[node.id] = "pending";
            }

            render();
            updateTraceLog();
            updateProgress();
        }

        function topologicalSort(nodes) {
            const result = [];
            const visited = new Set();
            const visiting = new Set();

            function visit(node) {
                if (visited.has(node.id)) return;
                if (visiting.has(node.id)) return; // Cycle

                visiting.add(node.id);

                // Visit dependencies first
                for (const depId of (node.dependencies || [])) {
                    const depNode = nodes.find(n => n.id === depId);
                    if (depNode) visit(depNode);
                }

                visiting.delete(node.id);
                visited.add(node.id);
                result.push(node);
            }

            // Sort by stratum first, then visit
            const stratumOrder = {SUBSTRATE: 0, MEMORY: 1, LOGIC: 2, SPEC: 3, INTENT: 4};
            const sorted = [...nodes].sort((a, b) => stratumOrder[a.stratum] - stratumOrder[b.stratum]);

            for (const node of sorted) {
                visit(node);
            }

            return result;
        }

        function render() {
            g.selectAll("*").remove();

            if (!currentData) return;

            const glyphs = currentData.glyphs || {};
            const nodes = Object.entries(glyphs).map(([idx, g]) => ({
                id: parseInt(idx),
                ...g,
                state: nodeStates[idx] || "pending"
            }));

            // Layout
            const stratumOrder = {SUBSTRATE: 0, MEMORY: 1, LOGIC: 2, SPEC: 3, INTENT: 4};
            const byStratum = {};
            for (const node of nodes) {
                const level = stratumOrder[node.stratum];
                if (!byStratum[level]) byStratum[level] = [];
                byStratum[level].push(node);
            }

            const levelHeight = 120;
            const nodeWidth = 90;
            const centerX = width / 2;
            const startY = 80;

            for (const [level, levelNodes] of Object.entries(byStratum)) {
                const totalWidth = levelNodes.length * nodeWidth;
                const startX = centerX - totalWidth / 2;
                levelNodes.forEach((node, i) => {
                    node.x = startX + i * nodeWidth + nodeWidth / 2;
                    node.y = startY + parseInt(level) * levelHeight;
                });
            }

            // Build links
            const links = [];
            for (const node of nodes) {
                for (const depId of (node.dependencies || [])) {
                    const source = nodes.find(n => n.id === depId);
                    if (source) {
                        links.push({
                            source,
                            target: node,
                            state: nodeStates[node.id] === "completed" && nodeStates[depId] === "completed" ? "completed" : "pending"
                        });
                    }
                }
            }

            // Draw links
            g.append("g")
                .selectAll("path")
                .data(links)
                .enter().append("path")
                .attr("class", d => "link " + d.state)
                .attr("d", d => `M${d.source.x},${d.source.y}L${d.target.x},${d.target.y}`);

            // Draw nodes
            const nodeGs = g.append("g")
                .selectAll("g")
                .data(nodes)
                .enter().append("g")
                .attr("class", d => "node " + d.state)
                .attr("transform", d => `translate(${d.x},${d.y})`);

            nodeGs.append("circle")
                .attr("r", 25)
                .attr("class", d => "stratum-" + d.stratum);

            nodeGs.append("text")
                .attr("dy", 4)
                .attr("text-anchor", "middle")
                .attr("fill", "#c9d1d9")
                .text(d => d.id);

            // Fit
            fitToScreen(nodes);
        }

        function fitToScreen(nodes) {
            if (nodes.length === 0) return;

            const xs = nodes.map(n => n.x);
            const ys = nodes.map(n => n.y);
            const minX = Math.min(...xs) - 60;
            const maxX = Math.max(...xs) + 60;
            const minY = Math.min(...ys) - 60;
            const maxY = Math.max(...ys) + 60;

            const dx = maxX - minX;
            const dy = maxY - minY;
            const scale = Math.min(width / dx, height / dy, 1.2);
            const centerX = (minX + maxX) / 2;
            const centerY = (minY + maxY) / 2;

            svg.transition().duration(300).call(
                zoom.transform,
                d3.zoomIdentity
                    .translate(width / 2, height / 2)
                    .scale(scale)
                    .translate(-centerX, -centerY)
            );
        }

        function step() {
            if (currentStep >= executionOrder.length - 1) {
                pause();
                return;
            }

            currentStep++;
            const node = executionOrder[currentStep];
            nodeStates[node.id] = "running";

            render();
            updateTraceLog();
            updateProgress();
            updateStepInfo(node);

            // Simulate execution
            setTimeout(() => {
                nodeStates[node.id] = "completed";
                render();
                updateTraceLog();
            }, 100);
        }

        function stepBack() {
            if (currentStep < 0) return;

            const node = executionOrder[currentStep];
            nodeStates[node.id] = "pending";
            currentStep--;

            render();
            updateTraceLog();
            updateProgress();

            if (currentStep >= 0) {
                updateStepInfo(executionOrder[currentStep]);
            } else {
                document.getElementById("step-info").style.display = "none";
            }
        }

        function play() {
            if (isPlaying) return;
            if (currentStep >= executionOrder.length - 1) {
                reset();
            }

            isPlaying = true;
            document.getElementById("btn-play").disabled = true;
            document.getElementById("btn-pause").disabled = false;

            const speed = parseInt(document.getElementById("speed").value);
            playInterval = setInterval(() => {
                if (currentStep >= executionOrder.length - 1) {
                    pause();
                } else {
                    step();
                }
            }, speed);
        }

        function pause() {
            isPlaying = false;
            document.getElementById("btn-play").disabled = false;
            document.getElementById("btn-pause").disabled = true;

            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
            }
        }

        function reset() {
            pause();
            currentStep = -1;

            for (const node of executionOrder) {
                nodeStates[node.id] = "pending";
            }

            render();
            updateTraceLog();
            updateProgress();
            document.getElementById("step-info").style.display = "none";
        }

        function runToEnd() {
            while (currentStep < executionOrder.length - 1) {
                currentStep++;
                const node = executionOrder[currentStep];
                nodeStates[node.id] = "completed";
            }

            render();
            updateTraceLog();
            updateProgress();

            if (executionOrder.length > 0) {
                updateStepInfo(executionOrder[executionOrder.length - 1]);
            }
        }

        function updateTraceLog() {
            const container = document.getElementById("trace-entries");
            container.innerHTML = "";

            for (let i = 0; i <= currentStep && i < executionOrder.length; i++) {
                const node = executionOrder[i];
                const state = nodeStates[node.id];
                const isCurrent = i === currentStep;

                const entry = document.createElement("div");
                entry.className = `trace-entry ${isCurrent ? 'current' : 'completed'}`;
                entry.innerHTML = `
                    <span class="step">Step ${i + 1}</span>
                    <span class="opcode">[${node.id}] ${node.opcode}</span>
                    <span class="rationale">${node.rationale}</span>
                    ${state === "completed" ? '<div class="result">✓ Completed</div>' : ''}
                `;
                container.appendChild(entry);
            }

            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }

        function updateProgress() {
            const total = executionOrder.length;
            const completed = Object.values(nodeStates).filter(s => s === "completed").length;

            document.getElementById("progress-text").textContent = `${completed} / ${total}`;
            document.getElementById("progress-fill").style.width = total > 0 ? `${(completed / total) * 100}%` : "0%";
        }

        function updateStepInfo(node) {
            document.getElementById("step-info").style.display = "block";
            document.getElementById("step-title").textContent = `Executing Glyph #${node.id}`;
            document.getElementById("info-glyph").textContent = `#${node.id}`;
            document.getElementById("info-stratum").textContent = node.stratum;
            document.getElementById("info-opcode").textContent = node.opcode;
            document.getElementById("info-action").textContent = getActionDescription(node);
            document.getElementById("info-result").textContent = getSimulatedResult(node);
        }

        function getActionDescription(node) {
            const descriptions = {
                DATA: "Loading literal data",
                LOAD: "Reading from memory",
                STORE: "Writing to memory",
                CALL: "Executing operation",
                BRANCH: "Evaluating condition",
                LOOP: "Starting iteration",
                RETURN: "Returning value",
                EXPORT: "Exporting interface",
                MODULE: "Defining module goal"
            };
            return descriptions[node.opcode] || "Processing";
        }

        function getSimulatedResult(node) {
            if (node.opcode === "DATA") {
                return `value = ${node.invariants?.value ?? "?"}`;
            }
            if (node.opcode === "CALL" && node.rationale === "+") {
                return "8 (= 5 + 3)";
            }
            return "✓";
        }
    </script>
</body>
</html>
