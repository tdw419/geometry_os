<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legible Brain - Geometry OS Phase 40</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            color: #00d4ff;
            font-family: 'Courier New', Courier, monospace;
        }
        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(5, 5, 5, 0.8);
            padding: 20px;
            border: 1px solid #00d4ff;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .stratum-indicator {
            margin-top: 10px;
            font-size: 12px;
        }
        .active { color: #fff; text-shadow: 0 0 10px #00d4ff; }
        canvas { display: block; }
    </style>
    <!-- Load PIXI.js v8 -->
    <script src="https://pixijs.download/v8.1.0/pixi.min.js"></script>
</head>
<body>
    <div id="ui-overlay">
        <div>Legible Brain v1.0</div>
        <div style="font-size: 10px; opacity: 0.6;">Semantic Morphological Introspection</div>
        <hr style="border: 0; border-top: 1px solid #00d4ff; margin: 10px 0;">
        <div id="sector-head" class="stratum-indicator">EMISSION: [EXPORT] (◈)</div>
        <div id="sector-norm" class="stratum-indicator">SIGNAL: [TYPE] (⌬)</div>
        <div id="sector-ffn" class="stratum-indicator">MEMORY: [LOAD] ([])</div>
        <div id="sector-attn" class="stratum-indicator">SYNAPTIC: [CALL] (λ)</div>
        <div id="sector-embed" class="stratum-indicator">INPUT: [DATA] (·)</div>
        <hr style="border: 0; border-top: 1px solid #00d4ff; margin: 10px 0;">
        <div style="font-size: 10px;">ZOOM: <span id="zoom-val">1.0</span>x</div>
        <div style="font-size: 10px;">FPS: <span id="fps-val">--</span></div>
        <div style="font-size: 10px;">ENTROPY JITTER: <span id="jitter-val">ACTIVE</span></div>
        <hr style="border: 0; border-top: 1px solid #00d4ff; margin: 10px 0;">
        <div style="font-size: 10px; color: #ff00ff;">PHASE 41: OUROBOROS REPAIR</div>
        <div style="font-size: 10px; margin-top: 5px;">
            <button id="scan-btn" style="background: #1a1a2e; color: #00d4ff; border: 1px solid #00d4ff; padding: 3px 8px; cursor: pointer; font-size: 9px;">🔍 SCAN</button>
            <button id="heal-btn" style="background: #1a1a2e; color: #ff00ff; border: 1px solid #ff00ff; padding: 3px 8px; cursor: pointer; font-size: 9px;">🩹 HEAL</button>
            <button id="repair-btn" style="background: #1a1a2e; color: #00ff00; border: 1px solid #00ff00; padding: 3px 8px; cursor: pointer; font-size: 9px;">🔄 REPAIR ALL</button>
        </div>
        <hr style="border: 0; border-top: 1px solid #00d4ff; margin: 10px 0;">
        <div style="font-size: 10px; color: #00ffcc;">PHASE 42: COLONIZATION</div>
        <div style="font-size: 10px; margin-top: 5px;">
            <button id="colonize-btn" style="background: #1a1a2e; color: #00ffcc; border: 1px solid #00ffcc; padding: 3px 8px; cursor: pointer; font-size: 9px;">🏗️ COLONIZE SYNTACTIC</button>
        </div>
        <hr style="border: 0; border-top: 1px solid #00d4ff; margin: 10px 0;">
        <div id="query-panel" style="display:none;">
            <div style="font-size: 10px; color: #fff;">PROBE RESULT: <span id="query-sector"></span></div>
            <pre id="query-dag" style="font-size: 9px; color: #00ff00; background: rgba(0,0,0,0.5); padding: 5px; overflow: hidden;"></pre>
        </div>
    </div>

    <script src="LegibleBrainFilter.js"></script>
    <script src="LegibleBrainRenderer.js"></script>
    <script src="SynapticClient.js"></script>
    <script src="MutationClient.js"></script>
    <script>
        async function start() {
            const app = new PIXI.Application();
            await app.init({ 
                width: window.innerWidth, 
                height: window.innerHeight,
                backgroundColor: 0x050505,
                preference: 'webgpu'
            });
            document.body.appendChild(app.canvas);

            // 1. Create Synthetic Brain Atlas with Functional Districts
            const atlasSize = 1024;
            const canvas = document.createElement('canvas');
            canvas.width = atlasSize;
            canvas.height = atlasSize;
            const ctx = canvas.getContext('2d');
            
            const imageData = ctx.createImageData(atlasSize, atlasSize);
            for (let i = 0; i < imageData.data.length; i += 4) {
                const x = (i/4) % atlasSize;
                const y = Math.floor((i/4) / atlasSize);
                
                // Sector ID (B channel) - Horizontal districts
                const sectorVal = x / atlasSize;
                
                // R: Activation (Noise pulsing in the center of the sector)
                const sectorCenter = (Math.floor(sectorVal * 5) + 0.5) / 5 * atlasSize;
                const distToSectorCenter = Math.abs(x - sectorCenter);
                const activation = Math.max(0, 1.0 - distToSectorCenter/100) * Math.random();
                
                imageData.data[i] = activation * 255;
                imageData.data[i+1] = (Math.sin(y/20) * 0.5 + 0.5) * 255; // Entropy
                imageData.data[i+2] = sectorVal * 255; // Sector ID
                imageData.data[i+3] = 255;
            }
            ctx.putImageData(imageData, 0, 0);
            const brainAtlas = PIXI.Texture.from(canvas);

            // 2. Initialize Legible Brain Renderer
            const renderer = new LegibleBrainRenderer(app, {
                brainAtlasPath: brainAtlas,
                fontAtlasPath: 'https://webgpu.github.io/webgpu-samples/assets/img/font.png'
            });

            const brainContainer = await renderer.initialize();
            app.stage.addChild(brainContainer);

            // 2.5 Initialize Synaptic Client (Python Bridge)
            const synapticClient = new SynapticClient({ url: 'ws://localhost:8765' });
            const mutationClient = new MutationClient({ url: 'ws://localhost:8765' });

            // Try to connect, fall back to simulation if unavailable
            synapticClient.connect().then(() => {
                console.log('🧠 Connected to Synaptic Bridge - Live execution enabled');
                document.getElementById('jitter-val').innerText = 'LIVE';
            }).catch((e) => {
                console.warn('Synaptic Bridge unavailable, using simulation:', e.message);
                document.getElementById('jitter-val').innerText = 'SIMULATION';
            });

            // Connect mutation client for Phase 41
            mutationClient.connect().then(() => {
                console.log('🔧 MutationClient connected - Ouroboros Repair enabled');
                renderer.setMutationClient(mutationClient);
            }).catch((e) => {
                console.warn('MutationClient unavailable:', e.message);
            });

            // Handle execution results from the bridge
            synapticClient.on('execution_result', (result) => {
                console.log('📊 Execution result:', result);

                const panel = document.getElementById('query-panel');
                const existing = panel.querySelector('.exec-result');
                if (existing) existing.remove();

                const outputDiv = document.createElement('div');
                outputDiv.className = 'exec-result';
                outputDiv.style.color = result.success ? '#00ff00' : '#ff0000';
                outputDiv.style.fontSize = '10px';
                outputDiv.style.marginTop = '5px';

                const statusBadge = result.simulated ? 'SIMULATED' : 'LIVE';
                const confidence = result.status?.output?.[0] || 'N/A';

                outputDiv.innerHTML = `
                    EXECUTION OUTPUT [${statusBadge}]:<br>
                    Result: ${result.result || 'None'}<br>
                    Confidence: ${confidence}<br>
                    Glyphs: ${result.registry?.glyph_count || 0}<br>
                    Status: ${result.success ? '✅ VALIDATED' : '❌ FAILED'}
                `;
                panel.appendChild(outputDiv);
            });

            // Handle repair results
            mutationClient.on('write_result', (result) => {
                console.log('🩹 Repair result:', result);
            });

            // 3. Handle Synaptic Query Results
            window.addEventListener('SYNAPTIC_QUERY_RESULT', async (e) => {
                const panel = document.getElementById('query-panel');
                const sectorSpan = document.getElementById('query-sector');
                const dagPre = document.getElementById('query-dag');

                panel.style.display = 'block';
                sectorSpan.innerText = e.detail.sector;
                dagPre.innerText = JSON.stringify(e.detail.dag, null, 2);

                // --- Send to Synaptic Bridge for Real Execution ---
                try {
                    const result = await synapticClient.probe(e.detail.dag, e.detail.coords);
                    // Result is handled by the 'execution_result' event listener above
                    console.log(`🔷 GlyphStratum DAG executed for ${e.detail.sector}`);
                } catch (err) {
                    console.error('Bridge execution failed:', err);

                    // Fallback to local simulation
                    const activation = e.detail.activation;
                    const entropy = e.detail.entropy;
                    const confidence = (activation * (1.0 - entropy * 0.2)).toFixed(6);

                    const existing = panel.querySelector('.exec-result');
                    if (existing) existing.remove();

                    const outputDiv = document.createElement('div');
                    outputDiv.className = 'exec-result';
                    outputDiv.style.color = '#ff00ff';
                    outputDiv.style.fontSize = '10px';
                    outputDiv.style.marginTop = '5px';
                    outputDiv.innerHTML = `EXECUTION OUTPUT [FALLBACK]:<br>Confidence: ${confidence}<br>Status: ${activation > 0.5 ? 'VALIDATED' : 'SPECULATIVE'}`;
                    panel.appendChild(outputDiv);
                }
            });

            // 4. Interaction State
            let zoom = 1.0;
            let cameraPos = [0, 0];
            let isPanning = false;
            let lastMouse = { x: 0, y: 0 };

            window.addEventListener('wheel', (e) => {
                const zoomSpeed = 0.1;
                if (e.deltaY < 0) zoom *= (1 + zoomSpeed);
                else zoom *= (1 - zoomSpeed);
                zoom = Math.max(0.1, Math.min(20, zoom));
                document.getElementById('zoom-val').innerText = zoom.toFixed(1);
            });

            window.addEventListener('mousedown', (e) => {
                isPanning = true;
                lastMouse = { x: e.clientX, y: e.clientY };

                // --- Live Topology Sampling (Replicating synthetic atlas logic) ---
                const rect = app.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const atlasSize = 1024;
                const atlasX = (x / window.innerWidth) * atlasSize;
                const atlasY = (y / window.innerHeight) * atlasSize;
                
                const sectorVal = atlasX / atlasSize;
                const sectorCenter = (Math.floor(sectorVal * 5) + 0.5) / 5 * atlasSize;
                const distToSectorCenter = Math.abs(atlasX - sectorCenter);
                
                // Deterministic sampling for the specific pixel
                const activation = Math.max(0, 1.0 - distToSectorCenter/100);
                const entropy = (Math.sin(atlasY/20) * 0.5 + 0.5);
                
                const sampledData = { r: activation, g: entropy, b: sectorVal };
                
                // Trigger the Live Synaptic Query
                renderer.handleSynapticQuery({ global: { x: x, y: y } }, sampledData);
            });

            window.addEventListener('mouseup', () => isPanning = false);
            window.addEventListener('mousemove', (e) => {
                if (isPanning) {
                    const dx = e.clientX - lastMouse.x;
                    const dy = e.clientY - lastMouse.y;
                    cameraPos[0] -= dx / zoom;
                    cameraPos[1] -= dy / zoom;
                    lastMouse = { x: e.clientX, y: e.clientY };
                }
            });

            // 5. Update Loop
            let frameCount = 0;
            let lastFpsUpdate = 0;
            app.ticker.add((ticker) => {
                const time = ticker.lastTime / 1000;
                renderer.filter.update(time, zoom, cameraPos);
                
                // Update FPS
                frameCount++;
                if (time - lastFpsUpdate > 1.0) {
                    const fps = frameCount / (time - lastFpsUpdate);
                    document.getElementById('fps-val').innerText = fps.toFixed(1);
                    window.__GEOMETRY_OS_FPS = fps; // Set for benchmark_runner.py
                    frameCount = 0;
                    lastFpsUpdate = time;
                }
                
                const centerX = (cameraPos[0] + window.innerWidth/2 / zoom) / (atlasSize);
                const currentSector = Math.floor(clamp(centerX, 0.0, 0.99) * 5);
                
                const sectors = ["embed", "attn", "ffn", "norm", "head"];
                for(let i=0; i<5; i++) {
                    const el = document.getElementById(`sector-${sectors[i]}`);
                    if (i === currentSector) el.classList.add('active');
                    else el.classList.remove('active');
                }
            });

            function clamp(val, min, max) {
                return Math.max(min, Math.min(max, val));
            }

            // Phase 41: Ouroboros Repair Controls
            document.getElementById('scan-btn').addEventListener('click', async () => {
                console.log('🔍 Scanning for fractures...');
                const fractures = await renderer.scanForFractures(0.6);
                console.log(`Found ${fractures.length} fractures:`, fractures);

                // Display in query panel
                const panel = document.getElementById('query-panel');
                panel.style.display = 'block';
                document.getElementById('query-sector').innerText = 'FRACTURE SCAN';
                document.getElementById('query-dag').innerText = JSON.stringify(fractures, null, 2);

                // Add summary
                const existing = panel.querySelector('.scan-result');
                if (existing) existing.remove();

                const summary = document.createElement('div');
                summary.className = 'scan-result';
                summary.style.color = '#ff00ff';
                summary.style.fontSize = '10px';
                summary.style.marginTop = '5px';
                summary.innerHTML = `FRACTURES DETECTED: ${fractures.length}<br>Threshold: 0.6`;
                panel.appendChild(summary);
            });

            document.getElementById('heal-btn').addEventListener('click', async () => {
                console.log('🩹 Initiating Ouroboros Repair...');
                const fractures = await renderer.scanForFractures(0.6);

                if (fractures.length === 0) {
                    console.log('No fractures to heal');
                    return;
                }

                // Heal the most critical fracture
                const critical = fractures.sort((a, b) => b.entropy - a.entropy)[0];
                console.log('Healing critical fracture:', critical);

                const result = await renderer.heal(
                    { x: critical.x, y: critical.y },
                    { r: critical.activation, g: critical.entropy, b: critical.sector / 5 }
                );

                console.log('Heal result:', result);
            });

            document.getElementById('repair-btn').addEventListener('click', async () => {
                console.log('🔄 Running full repair cycle...');
                const result = await renderer.runRepairCycle(0.6);

                const panel = document.getElementById('query-panel');
                panel.style.display = 'block';
                document.getElementById('query-sector').innerText = 'REPAIR CYCLE';
                document.getElementById('query-dag').innerText = JSON.stringify(result, null, 2);
            });

            // Phase 42: Colonization Controls
            document.getElementById('colonize-btn').addEventListener('click', async () => {
                console.log('🏗️ Deploying Syntactic District...');
                const result = await renderer.deployDistrict("Syntactic");

                const panel = document.getElementById('query-panel');
                panel.style.display = 'block';
                document.getElementById('query-sector').innerText = 'NEURAL COLONIZATION';
                document.getElementById('query-dag').innerText = JSON.stringify(result, null, 2);

                // Add summary
                const existing = panel.querySelector('.scan-result');
                if (existing) existing.remove();

                const summary = document.createElement('div');
                summary.className = 'scan-result';
                summary.style.color = '#00ffcc';
                summary.style.fontSize = '10px';
                summary.style.marginTop = '5px';
                summary.innerHTML = `DISTRICT: ${result.district || 'Syntactic'}<br>ZONES SEEDED: ${result.zones_seeded || 4}<br>PIXELS WRITTEN: ${result.total_pixels_modified || 0}`;
                panel.appendChild(summary);
            });

            console.log("🚀 Legible Brain Demo Active");        }

        start();
    </script>
</body>
</html>
