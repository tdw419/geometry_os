<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Geometry OS - Evolution Live</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a;
            --fg: #e0e0e0;
            --accent: #00ffff;
            --green: #00ff88;
            --muted: #404040;
        }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: 'JetBrains Mono', monospace;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 1px solid var(--muted);
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5rem;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent);
            margin-bottom: 10px;
        }
        .subtitle {
            color: var(--muted);
            font-size: 0.9rem;
        }
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .metric {
            background: #151515;
            border: 1px solid var(--muted);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .metric-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
        }
        .metric-label {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 5px;
        }
        .metric-target {
            font-size: 0.7rem;
            color: var(--green);
            margin-top: 5px;
        }
        .chart-container {
            background: #151515;
            border: 1px solid var(--muted);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .chart-title {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 15px;
        }
        #chart {
            width: 100%;
            height: 300px;
            position: relative;
        }
        .bar {
            position: absolute;
            bottom: 0;
            background: linear-gradient(to top, var(--accent), var(--green));
            border-radius: 2px 2px 0 0;
            transition: height 0.3s ease;
        }
        .target-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background: #ff4444;
            opacity: 0.5;
        }
        .target-label {
            position: absolute;
            right: 0;
            font-size: 0.7rem;
            color: #ff4444;
            transform: translateY(-50%);
        }
        .log {
            background: #0a0a0a;
            border: 1px solid var(--muted);
            border-radius: 8px;
            padding: 15px;
            font-size: 0.75rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .log-entry {
            display: flex;
            gap: 15px;
            padding: 5px 0;
            border-bottom: 1px solid #1a1a1a;
        }
        .log-time { color: var(--muted); }
        .log-track { color: var(--accent); }
        .log-value { color: var(--green); }
        .log-status { color: var(--green); }
        .log-status.fail { color: #ff4444; }
        .progress-bar {
            background: #1a1a1a;
            height: 20px;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }
        .progress-fill {
            background: linear-gradient(90deg, var(--accent), var(--green));
            height: 100%;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-size: 0.7rem;
            color: var(--bg);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .live-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧬 GEOMETRY OS EVOLUTION</h1>
            <div class="subtitle"><span class="live-indicator"></span>Autonomous Optimization in Progress</div>
        </header>

        <div class="metrics">
            <div class="metric">
                <div class="metric-value" id="gips">--</div>
                <div class="metric-label">GIPS</div>
                <div class="metric-target">Target: 10,000</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="best">--</div>
                <div class="metric-label">Best GIPS</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="experiments">--</div>
                <div class="metric-label">Experiments</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="fitness">--</div>
                <div class="metric-label">Allocator Fitness</div>
            </div>
            <div class="metric">
                <div class="metric-value" id="kernel">--</div>
                <div class="metric-label">Kernel Size</div>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress" style="width: 0%">0%</div>
        </div>

        <div class="chart-container">
            <div class="chart-title">GIPS History (Last 50 experiments)</div>
            <div id="chart"></div>
            <div class="target-line" style="bottom: 90%"></div>
            <div class="target-label" style="bottom: 90%">10K Target</div>
        </div>

        <div class="chart-container">
            <div class="chart-title">Recent Activity</div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        const API = '/api/status';
        const TSV = '/api/evolution.tsv';
        let history = [];

        async function fetchData() {
            try {
                const [statusRes, tsvRes] = await Promise.all([
                    fetch(API),
                    fetch(TSV)
                ]);

                const status = await statusRes.json();
                const tsv = await tsvRes.text();

                updateMetrics(status);
                updateChart(tsv);
                updateLog(tsv);
            } catch (e) {
                console.error('Fetch error:', e);
            }
        }

        function updateMetrics(data) {
            document.getElementById('gips').textContent = data.gips?.toFixed(1) || '--';
            document.getElementById('best').textContent = data.best_gips?.toFixed(1) || '--';
            document.getElementById('experiments').textContent = data.evolution_experiments?.toLocaleString() || '--';
            document.getElementById('fitness').textContent = (data.allocator_fitness * 100)?.toFixed(1) + '%' || '--';
            document.getElementById('kernel').textContent = (data.kernel_size / 1024)?.toFixed(1) + ' KB' || '--';

            const progress = Math.min((data.gips / 10000) * 100, 100);
            const progressEl = document.getElementById('progress');
            progressEl.style.width = progress + '%';
            progressEl.textContent = progress.toFixed(3) + '%';
        }

        function updateChart(tsv) {
            const lines = tsv.trim().split('\n').slice(-50);
            history = lines.map(line => {
                const parts = line.split('\t');
                return parseFloat(parts[3]) || 0;
            }).filter(v => v > 0);

            const chart = document.getElementById('chart');
            chart.innerHTML = '';

            if (history.length === 0) return;

            const max = Math.max(...history, 10000);
            const barWidth = 100 / history.length;

            history.forEach((value, i) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.left = (i * barWidth) + '%';
                bar.style.width = (barWidth - 0.5) + '%';
                bar.style.height = ((value / max) * 100) + '%';
                bar.title = value.toFixed(1) + ' GIPS';
                chart.appendChild(bar);
            });
        }

        function updateLog(tsv) {
            const lines = tsv.trim().split('\n').slice(-10).reverse();
            const log = document.getElementById('log');
            log.innerHTML = lines.map(line => {
                const parts = line.split('\t');
                if (parts.length < 6) return '';
                const [time, track, metric, value, opt, status] = parts;
                return `
                    <div class="log-entry">
                        <span class="log-time">${time.split('T')[1]?.split('.')[0] || ''}</span>
                        <span class="log-track">${track.substring(0, 20)}</span>
                        <span class="log-value">${parseFloat(value).toFixed(1)} ${metric}</span>
                        <span class="log-status ${status === 'pass' ? '' : 'fail'}">${status}</span>
                    </div>
                `;
            }).join('');
        }

        // Serve TSV data via the status server
        const originalFetch = window.fetch;
        window.fetch = async (url, ...args) => {
            if (url === '/api/evolution.tsv') {
                // Use the API endpoint we added
                return originalFetch('/api/evolution.tsv', ...args);
            }
            return originalFetch(url, ...args);
        };

        setInterval(fetchData, 2000);
        fetchData();
    </script>
</body>
</html>
