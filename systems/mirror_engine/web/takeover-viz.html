<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geometry OS — Takeover Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a14;
      font-family: 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
    }
    #canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    .hud {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #00ffff40;
      font-size: 12px;
      z-index: 100;
    }
    .hud h1 {
      color: #00ffff;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .hud .stat {
      color: #888;
      margin: 5px 0;
    }
    .hud .value {
      color: #0f0;
    }
    .hud .warning {
      color: #ff0;
    }
    .title-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, #0a0a14, transparent);
      padding: 20px;
      text-align: center;
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="hud">
    <h1>🔷 GEOMETRY OS</h1>
    <div class="stat">Windows: <span class="value" id="windowCount">0</span></div>
    <div class="stat">Bytes: <span class="value" id="byteCount">0</span></div>
    <div class="stat">Pixels: <span class="value" id="pixelCount">0</span></div>
    <div class="stat">FPS: <span class="value" id="fps">0</span></div>
    <div class="stat" style="margin-top:10px;color:#00ffff">SOVEREIGNTY: <span class="value">ACHIEVED</span></div>
  </div>

  <div class="title-bar">
    WASD: Move | Scroll: Zoom | The Old OS lives here now
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    // HUD elements
    const windowCountEl = document.getElementById('windowCount');
    const byteCountEl = document.getElementById('byteCount');
    const pixelCountEl = document.getElementById('pixelCount');
    const fpsEl = document.getElementById('fps');

    // Camera
    let cameraX = 0, cameraY = 0;
    let zoom = 1;
    const keys = new Set();

    // Simulated captured windows (from Python takeover)
    const capturedWindows = [
      { title: 'rabbi_yaron...', x: 100, y: 50, w: 400, h: 300, color: '#1a1a2e' },
      { title: 'Ready (projects)', x: 520, y: 50, w: 400, h: 300, color: '#1a1a2e' },
      { title: 'ascii cyber security', x: 940, y: 50, w: 400, h: 300, color: '#1a1a2e' },
      { title: 'Edit localhost:3838', x: 100, y: 380, w: 400, h: 300, color: '#1a1a2e' },
      { title: '~/zion/projects/ascii...', x: 520, y: 380, w: 400, h: 300, color: '#1a1a2e' },
      { title: '~/zion/projects/ai...', x: 940, y: 380, w: 400, h: 300, color: '#1a1a2e' },
      { title: '01_CODES.txt - VS Code', x: 100, y: 710, w: 400, h: 300, color: '#1a1a2e' },
      { title: 'Understanding OpenSpec...', x: 520, y: 710, w: 400, h: 300, color: '#1a1a2e' },
      { title: '- tdw419@gmail.com', x: 940, y: 710, w: 400, h: 300, color: '#1a1a2e' },
      { title: 'GParted', x: 100, y: 1040, w: 400, h: 200, color: '#1a1a2e' },
      { title: '~', x: 520, y: 1040, w: 300, h: 200, color: '#1a1a2e' },
      { title: 'Monitor', x: 840, y: 1040, w: 300, h: 200, color: '#1a1a2e' },
      { title: 'Studio', x: 1160, y: 1040, w: 300, h: 200, color: '#1a1a2e' },
      { title: 'Control - Chromium', x: 100, y: 1280, w: 500, h: 300, color: '#1a1a2e' },
    ];

    let frameCount = 0;
    let lastTime = performance.now();

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    // Input handling
    window.addEventListener('keydown', e => keys.add(e.code));
    window.addEventListener('keyup', e => keys.delete(e.code));
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      zoom *= e.deltaY > 0 ? 0.9 : 1.1;
      zoom = Math.max(0.1, Math.min(5, zoom));
    });

    function hexToRgba(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r}, ${g}, ${b}, 0.9)`;
    }

    function render() {
      // Handle movement
      const speed = 15 / zoom;
      if (keys.has('KeyW')) cameraY -= speed;
      if (keys.has('KeyS')) cameraY += speed;
      if (keys.has('KeyA')) cameraX -= speed;
      if (keys.has('KeyD')) cameraX += speed;

      // Clear
      ctx.fillStyle = '#0a0a14';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid
      ctx.strokeStyle = '#1a1a2e';
      ctx.lineWidth = 1;
      const gridSize = 100 * zoom;
      const offsetX = (-cameraX * zoom) % gridSize;
      const offsetY = (-cameraY * zoom) % gridSize;

      for (let x = offsetX; x < canvas.width; x += gridSize) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = offsetY; y < canvas.height; y += gridSize) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      // Origin marker
      const originX = (0 - cameraX) * zoom + canvas.width / 2;
      const originY = (0 - cameraY) * zoom + canvas.height / 2;
      ctx.strokeStyle = '#00ffff40';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(originX - 20, originY);
      ctx.lineTo(originX + 20, originY);
      ctx.moveTo(originX, originY - 20);
      ctx.lineTo(originX, originY + 20);
      ctx.stroke();

      // Render captured windows
      ctx.save();
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.scale(zoom, zoom);
      ctx.translate(-cameraX, -cameraY);

      capturedWindows.forEach((win, i) => {
        // Window background
        ctx.fillStyle = hexToRgba(win.color);
        ctx.fillRect(win.x, win.y, win.w, win.h);

        // Window border (cyan)
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 2 / zoom;
        ctx.strokeRect(win.x, win.y, win.w, win.h);

        // Title bar
        ctx.fillStyle = '#00ffff20';
        ctx.fillRect(win.x, win.y, win.w, 25 / zoom);

        // Title text
        ctx.fillStyle = '#ffffff';
        ctx.font = `${12 / zoom}px Courier New`;
        ctx.fillText(win.title, win.x + 10, win.y + 17 / zoom);

        // Geometry Bond indicator
        ctx.fillStyle = '#00ff00';
        ctx.beginPath();
        ctx.arc(win.x + win.w - 15, win.y + 12, 5 / zoom, 0, Math.PI * 2);
        ctx.fill();

        // Pulsing effect
        const pulse = Math.sin(Date.now() / 500 + i) * 0.3 + 0.7;
        ctx.strokeStyle = `rgba(0, 255, 255, ${pulse})`;
        ctx.lineWidth = 3 / zoom;
        ctx.strokeRect(win.x - 5, win.y - 5, win.w + 10, win.h + 10);
      });

      ctx.restore();

      // Status text
      ctx.fillStyle = '#00ffff';
      ctx.font = '14px Courier New';
      ctx.fillText('GEOMETRY OS — TAKEOVER VISUALIZATION', 20, canvas.height - 40);

      ctx.fillStyle = '#666';
      ctx.font = '11px Courier New';
      ctx.fillText('14 Old OS windows → 1,193 bytes → Geometry Bonds', 20, canvas.height - 20);

      // Update HUD
      windowCountEl.textContent = capturedWindows.length;
      byteCountEl.textContent = '1,193';
      pixelCountEl.textContent = '920,774';

      frameCount++;
      const now = performance.now();
      if (now - lastTime > 1000) {
        fpsEl.textContent = frameCount;
        frameCount = 0;
        lastTime = now;
      }

      requestAnimationFrame(render);
    }

    render();
  </script>
</body>
</html>
