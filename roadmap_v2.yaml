        '
      files:
      - ROADMAP.md
- id: phase-F
  title: Visual Verification Infrastructure
  status: complete
  goal: Regression test framework for RISC-V guest programs via framebuffer dumps
  description: 'riscv_fb_dump gives us scriptable visual verification. This phase
    builds the regression test harness: boot a guest program, inject a known input
    sequence, dump the framebuffer, assert on pixel values. The paint.c bugs (channel
    bit-leaking, paint-overwrite, fill-mode position) are the first regression tests.
    Prior encode_png claims are audited.

    '
  dependencies:
  - source: phase-D
    target: phase-F
    type: hard
    reason: Need riscv_fb_dump (built during paint.c work) and libgeos
  deliverables:
  - name: paint.c regression test
    description: 'Shell script or Python script that boots paint.elf, injects a known
      sequence of commands (fill mode + movement + color switches), dumps the framebuffer
      via riscv_fb_dump, and asserts on pixel coordinates and colors. Catches the
      three bugs that were fixed: channel leaking, cursor overwrite, fill-mode position.

      '
    status: done
    acceptance_criteria:
    - description: Test asserts 10 red + 10 blue + 10 green + 11 yellow pixels at
        expected coords
      validation: Run test script, exit 0 on correct output, exit 1 on pixel mismatch
      met: true
    - description: Test catches at least one of the three known paint.c bugs if reverted
      validation: Revert a fix, run test, expect failure
      met: true
    tasks:
    - id: f.1.1
      title: Write paint_regression_test.sh
      status: done
      description: 'Boot GeOS (background), launch paint.elf via socket, inject the
        rectangle-drawing sequence (fill on, d*11, color 3, s*10, color 2, a*10, color
        4, w*10, fill off), dump framebuffer, use Python/Pillow to assert pixel values.
        Kill GeOS when done.

        '
      files:
      - tests/paint_regression_test.sh
    - id: f.1.2
      title: Verify test catches regressions
      status: done
      description: 'Revert each of the three paint.c fixes one at a time, confirm
        the test fails. Then re-apply fixes, confirm test passes.

        '
      files: []
  - name: encode_png audit
    description: 'Prior "screenshot verified" claims that went through encode_png
      may have been against invalid PNGs (raw deflate without zlib wrapper). Audit
      which claims used encode_png and which used other paths. Result: MCP vm_screenshot
      (safe path via png crate) was used for all Phase B/C verifications. screenshot_b64
      was broken but only used by Phase 88 (experimental AI vision). No critical claims
      were affected. See tests/encode_png_audit.md.

      '
    status: done
    acceptance_criteria:
    - description: List of prior verified claims and whether they used valid PNGs
      validation: Written audit in tests/encode_png_audit.md
      met: true
    tasks:
    - id: f.2.1
      title: Audit prior visual verification claims
      status: done
      description: 'All Phase B/C verifications used MCP vm_screenshot (png crate,
        safe). screenshot_b64 was broken but only affected Phase 88 AI vision (experimental).
        No critical pixel-value claims were based on broken PNGs. Paint regression
        test now verifies actual decodability.

        '
      files:
      - tests/encode_png_audit.md
  - name: Test harness pattern
    description: 'Document the pattern so any future guest program can plug in: boot
      → inject → dump → assert. Reusable shell/Python scaffolding. geos_test_lib.sh
      extracted: boot, run, inject, dump, kill, assert_pixel, assert_pixel_count.
      paint_regression_test.sh is the first caller.

      '
    status: done
    acceptance_criteria:
    - description: Test harness documented and reusable
      validation: New test for a different program can be written in <5 min
      met: true
    tasks:
    - id: f.3.1
      title: Extract common test harness functions
      status: done
      description: 'geos_boot(), geos_run_elf(), geos_inject_text(), geos_fb_dump(),
        geos_kill(), assert_pixel(), assert_pixel_count(). Shared shell library in
        tests/geos_test_lib.sh. Source it from test scripts.

        '
      files:
      - tests/geos_test_lib.sh
- id: phase-G
  title: In-session Canvas Checkpoint — Save/Load
  status: complete
  goal: Checkpoint and restore pixel state via the VFS surface
  description: 'Persistence means checkpointing pixels, not serializing structs. Add
    geos_save_canvas and geos_load_canvas to libgeos that write/read the framebuffer
    as raw pixel data to the VFS pixel surface at 0x7000_0000. Round-trip verified:
    save → clear → load → pixel-perfect match.

    '
  dependencies:
  - source: phase-F
    target: phase-G
    type: hard
    reason: Need regression test framework to verify round-trip fidelity
  deliverables:
  - name: geos_save_canvas / geos_load_canvas in libgeos
    description: 'Two new functions in libgeos.c. save_canvas copies framebuffer rows
      0-254 to VFS surface rows 1-255 (preserving row 0 directory index). load_canvas
      checks a CANV marker and copies back. Uses MMIO at 0x7000_0000 (VFS Pixel Surface),
      NOT virtio-blk.

      '
    status: done
    acceptance_criteria:
    - description: save_canvas writes to VFS, load_canvas reads it back
      validation: 'Round-trip test: save, clear fb, load, assert all pixels match'
      met: true
    - description: Round-trip preserves exact pixel values
      validation: 62,464 canvas pixels match (tolerance ±3)
      met: true
    tasks:
    - id: g.1.1
      title: Implement geos_save_canvas in libgeos.c
      status: done
      description: 'Copies framebuffer rows 0-254 to VFS rows 1-255 word-by-word.
        Sets CANV marker (0x43414E56) at VFS pixel (0,255). Preserves VFS directory
        index in row 0 pixels 0-254.

        '
      files:
      - examples/riscv-hello/libgeos.c
      - examples/riscv-hello/libgeos.h
    - id: g.1.2
      title: Implement geos_load_canvas in libgeos.c
      status: done
      description: 'Checks CANV marker, copies VFS rows 1-255 back to framebuffer
        rows 0-254, calls geos_fb_present(). Returns -1 if no marker.

        '
      files:
      - examples/riscv-hello/libgeos.c
      - examples/riscv-hello/libgeos.h
    - id: g.1.3
      title: Add save/load commands to paint.c
      status: done
      description: 'P key = save, O key = load (S/L conflict with WASD movement).
        UART status messages on success/failure. Load redraws palette bar and cursor
        on top of restored canvas.

        '
      files:
      - examples/riscv-hello/paint.c
  - name: Round-trip verification test
    description: 'Automated test: boot paint.elf, draw pattern, dump baseline, save,
      clear, load, dump restored, compare canvas area pixel-for-pixel. Single-session
      test (VFS surface is in-memory; cross-session needs future flush-to-disk mechanism).

      '
    status: done
    acceptance_criteria:
    - description: Pixel-perfect round-trip with zero mismatches
      validation: All 62,464 canvas pixels match between baseline and restored
      met: true
    tasks:
    - id: g.2.1
      title: Write persistence_roundtrip_test.sh
      status: done
      description: 'Uses geos_test_lib.sh. Draws colored fill trails, saves, clears,
        loads, compares 244 rows * 256 cols = 62,464 pixels with ±3 tolerance.

        '
      files:
      - tests/persistence_roundtrip_test.sh
- id: phase-H
  title: Cross-session Persistence — VfsSurface Raw-Region Flush
  status: complete
  goal: Canvas state survives VM restart
  description: "Phase G proved in-session checkpoint/restore. Phase H makes it survive\
    \ across VM sessions: save today, kill GeOS, restart tomorrow, load. Two implementation\
    \ paths:\n  A) Raw-region flush in VfsSurface::Drop — detect CANV marker in row\
    \ 0,\n     write the raw pixel region to a fixed host file (e.g., .geometry_os/canvas.raw).\n\
    \     On boot, VfsSurface::new() checks for the file and loads it.\n  B) Virtio-blk\
    \ integration — route geos_save_canvas through the virtio-blk\n     device at\
    \ 0x1000_1000 instead of the VFS surface. Requires implementing\n     virtqueue\
    \ processing in the guest (or a simplified direct-access mode\n     in the host\
    \ virtio-blk emulation).\nPath A is simpler and keeps the \"pixels copying pixels\"\
    \ model. Path B is more general but adds virtqueue complexity to bare-metal guest\
    \ code.\n"
  dependencies:
  - source: phase-G
    target: phase-H
    type: hard
    reason: In-session save/load is the foundation; cross-session adds disk flush
  deliverables:
  - name: Canvas survives VM restart
    description: 'VfsSurface flushes the CANV region to disk on Drop, and loads it
