- id: phase-227
  title: GeOS VM -- Debugging Opcode BREAKPOINT
  status: todo
  goal: Add a hardware breakpoint opcode that triggers the VM debugger
  description: 'The VM has software breakpoints (set via the bp command in terminal),
    but programs cannot set their own breakpoints. A BREAKPOINT opcode (0xCA) that
    halts execution and enters the debugger when hit would let programs implement
    conditional breakpoints (CMP + JNZ + BREAKPOINT), assert macros, and interactive
    debugging from within the running program. The debugger already has single-step
    and register display — BREAKPOINT just needs to set a flag that the step loop checks.'
  deliverables:
  - name: BREAKPOINT opcode
    status: todo
    tasks:
    - id: p227.d1.t1
      title: Implement BREAKPOINT opcode (0xCA)
      description: Sets vm.breakpoint_hit = true and returns false from step(). The
        main loop detects this and enters the debugger (same as F6 single-step behavior).
        Zero words (no arguments).
      scope_files:
      - src/vm/mod.rs
      - src/assembler/system_ops.rs
      - src/vm/disasm.rs
      scope_lines: 40
    - id: p227.d1.t2
      title: Wire breakpoint_hit into execution loops
      description: 'Both GUI (main.rs animation loop) and CLI (cli_main run loop) check vm.breakpoint_hit after each step batch. If true, print "BREAKPOINT hit at PC=0x..." and enter interactive debug mode.'
      scope_files:
      - src/main.rs
      scope_lines: 30
    - id: p227.d1.t3
      title: Add conditional breakpoint test
      description: Program sets r10 = 5, loops incrementing r10, BREAKPOINT when r10
        == 8. Verify debugger triggers at correct PC. Verify r10 == 8.
      scope_files:
      - src/vm/tests.rs
      scope_lines: 30
  test_target: 3
  scope_lines_total: 100
