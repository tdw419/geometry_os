- id: phase-227
  title: GeOS VM -- Debugging Opcode BREAKPOINT
  status: todo
  goal: Add a hardware breakpoint opcode that triggers the VM debugger
  description: The VM has software breakpoints (set via the bp command in terminal),
    but programs cannot set their own breakpoints. A BREAKPOINT opcode (0xCA) that
    halts execution and enters the debugger when hit would let programs implement
    conditional breakpoints (CMP + JNZ + BREAKPOINT), assert macros, and interactive
    debugging from within the running program. The debugger already has single-step
    and register display — BREAKPOINT just needs to set a flag that the step loop
    checks.
  deliverables:
  - name: BREAKPOINT opcode
    status: todo
    tasks:
