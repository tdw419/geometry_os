- id: phase-211
  title: GeOS Performance -- Instruction Cache for Hot Loops
  status: planned
  goal: Add a decoded instruction cache to speed up tight loops by 3-5x
  description: 'The VM currently decodes every instruction on every step() call, even
    in tight loops that execute the same instructions millions of times. At 88 MIPS,
    this decode overhead is the bottleneck. Add a small direct-mapped cache (256 entries)
    that maps PC to decoded instruction. On cache hit, skip decode and execute directly.
    Cache is invalidated on self-modifying code (STORE to code region). Expected speedup:
    3-5x on loop-heavy programs like plasma, infinite_map, and the fuzzer.'
  deliverables:
  - name: Decoded instruction cache
    status: todo
    tasks:
    - id: p211.d1.t1
      title: Implement PC-indexed instruction cache in Vm
      description: Add HashMap<u32, CachedInstruction> to Vm. On step(), check cache
        before decoding. On cache miss, decode and insert. Invalidate on writes to
        code pages.
      scope_files:
      - src/vm/mod.rs
      scope_lines: 80
    - id: p211.d1.t2
      title: Add cache invalidation on self-modifying code
      description: When STORE writes to the code region (0x1000-0x1FFF), invalidate
        the cache entry for that address. When ASM/ASMSELF writes bytecode, invalidate
        entire cache.
      scope_files:
      - src/vm/mod.rs
      scope_lines: 30
    - id: p211.d1.t3
      title: 'Benchmark: measure speedup on plasma and infinite_map'
      description: 'Run plasma and infinite_map with and without cache. Measure instructions/second.
        Target: 3x speedup on plasma (heavy loop), no regression on branchy code.'
      scope_files:
      - src/vm/tests.rs
      scope_lines: 30
  test_target: 3
  scope_lines_total: 140
