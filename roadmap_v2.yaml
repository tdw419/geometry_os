    - id: p222.d1.t2
      title: Add TIMER_SET_ALARM and TIMER_CHECK opcodes
      description: TIMER_SET_ALARM stores target_time = now + delay_ms. TIMER_CHECK
        returns 1 if now >= target_time, 0 if not. One alarm at a time (new alarm
        replaces old). Opcodes 0xC7, 0xC8.
      scope_files:
      - src/vm/mod.rs
