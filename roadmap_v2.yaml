- id: phase-I
  title: Layer 2 Foundation — Cooperative Multi-Program Kernel
  status: complete
  goal: Two RISC-V guest programs execute concurrently in the same VM, mediated by
    a tiny supervisor that owns scheduling and pixel-region arbitration
  description: 'SPEC.md says "Layer 2 does not exist yet" -- today Layer 3 programs
    run on M-mode bare-metal with no kernel between them. Phase I builds the smallest
    Layer 2 that justifies its own existence: a cooperative scheduler that runs two
    ELF programs in the same VM, plus pixel-region ownership so they cannot clobber
    each other''s framebuffer area. Capstone: split-screen sh + life64 running side
    by side, both updating live. The design rule from SPEC ("ask whether it grows
    the shim or shrinks it") gates every addition -- if a feature can be a libgeos
    helper, it stays in libgeos; only the things that genuinely cannot be done from
    a single program (multi-tenancy, region arbitration, focus routing) live in the
    kernel.

    '
  dependencies:
  - source: phase-H
    target: phase-I
    type: hard
    reason: Persistence is the foundation for future multi-program checkpointing;
      kernel arrives on top of a stable Layer 1 + Layer 3 stack
  deliverables:
  - name: Cooperative scheduler (geos_kern.elf)
    description: 'Tiny M-mode supervisor that loads two ELF programs side by side,
      sets up per-program stacks, and time-slices between them via mtimecmp interrupts.
      Programs cooperate via geos_yield() in libgeos. No preemption beyond the timer
      tick. No memory protection (single VM, programs trust each other -- kernel only
      arbitrates pixel regions and input focus).

      '
    status: done
    tasks:
    - id: i.1.1
      title: Design supervisor memory layout
      status: done
      description: Decide stack/heap regions per program. Kernel reserves first 64KB,
        each program gets a 256KB slot. Document in docs/LAYER2_KERNEL.md.
      files:
      - docs/LAYER2_KERNEL.md
    - id: i.1.2
      title: Implement context-switch in M-mode trap handler
      status: done
      description: 'On mtimecmp interrupt, save callee-saved regs of running program,
        restore the other program''s regs, set new mtimecmp deadline, mret. Cooperative
        path: geos_yield() ecalls into kernel which does the same save/restore.

        Bootstrap done (2026-04-27): minimal geos_kern.elf links via crt0.S+libgeos,
        installs mtvec, programs mtimecmp, takes 5 timer interrupts using GCC interrupt("machine")
        attribute for save/restore, SBI-shutdowns cleanly. Verified end-to-end via
        examples/kern_run.rs (5,000,815 instructions, prints "[geos] kernel boot"
        + 5 ticks). Still pending: hand-written save/restore across two distinct program
        contexts, mscratch-based context pointer, and the geos_yield() ecall path.'
      files:
      - examples/riscv-hello/geos_kern.c
      - examples/kern_run.rs
    - id: i.1.3
      title: Two-program load + run smoke test
      status: done
      description: Build geos_kern.elf with two embedded ELF blobs (hello_a.elf, hello_b.elf).
        Boot via sh_run, observe interleaved UART output. Single-thread host VM is
        fine.
      files:
      - examples/riscv-hello/build.sh
      - tests/multi_program_smoke_test.sh
  - name: Pixel-region ownership
    description: 'Programs request a framebuffer region at startup via geos_request_region(x,
      y, w, h). The kernel tracks ownership and clips fb_present writes so program
      A cannot overwrite program B''s pixels. Out-of-region writes are silently masked
      (no fault -- programs trust the kernel, kernel does not trust the program).

      '
    status: done
    tasks:
    - id: i.2.1
      title: Add geos_request_region() to libgeos
      status: done
      description: SBI extension call that registers a rect with the kernel. Kernel
        stores per-program rect in a small table. Returns offset into framebuffer
        (program-local origin).
      files:
      - examples/riscv-hello/libgeos.c
      - examples/riscv-hello/libgeos.h
    - id: i.2.2
      title: Region clipping in fb_present path
      status: done
      description: 'When kernel handles fb_present (or the present interrupt), iterate
        only over the calling program''s rect. Pixels outside the rect are not touched
        in vm.screen.

        Implemented (2026-04-30): PresentCallback now passes the current clip rect
        alongside pixel data. Frame struct carries clip_rect: Option<(u32,u32,u32,u32)>.
        The GUI composite step in main.rs only blits pixels within the clip rect,
        leaving other programs'' regions untouched. Pixel-level write clipping was
        already implemented via inside_clip().

        Added 3 unit tests in framebuf.rs: test_present_callback_receives_clip_rect,
        test_two_programs_present_with_clip_rects, test_clip_rect_changes_between_presents.

        Also fixed 8-bit encoding overflow: w/h=256 now encodes as 0 (0-means-256
        convention), since 256 doesn''t fit in an 8-bit field. Updated libgeos.h geos_request_region()
        to use the same convention.'
      files:
      - src/riscv/framebuf.rs
      - src/riscv/live.rs
      - src/main.rs
      - examples/riscv-hello/libgeos.h
  - name: Capstone -- split-screen sh + life64
    description: 'The Layer 2 thesis demo. Left half (128x256) runs sh.c. Right half
      (128x256) runs a 32x32 life simulation (smaller variant of life64.c). Both visible
      simultaneously. Tab key cycles input focus between them; the focused program''s
      region gets a thin border. Proves: (1) two programs share a VM, (2) regions
      are enforced, (3) input is multiplexed by focus.

      '
    status: done
    acceptance_criteria:
    - description: Both sh prompt and life animation visible simultaneously on the
        Geometry OS display
      validation: Manual visual check + fb_dump showing both regions populated
      met: true
    - description: Keyboard typed in shell does not perturb life simulation
      validation: 'Test: type "echo hello" in shell, life32 cell count delta over
        same window matches unfocused-baseline'
      met: true
    tasks:
    - id: i.3.1
      title: life32.c -- smaller life variant for split-screen
      status: done
      description: 32x32 grid in 128x256 region, 4-pixel cell blocks, identical rules
        to life64. Built and running in geos_kern.elf split-screen.
      files:
      - examples/riscv-hello/life32.c
    - id: i.3.2
      title: Input focus routing in kernel
      status: done
      description: Tab key intercepted by kernel (does not pass to either program).
        Kernel maintains focused_id. geos_getchar() returns -1 for unfocused program.
        geos_sbi_get_focus() returns 1 if caller is focused.
      files:
      - examples/riscv-hello/geos_kern.c
    - id: i.3.3
      title: Border indicator for focused region
      status: done
      description: Kernel draws a 1-pixel white border around the focused region after
        each timer tick. kern_apply_clip() disables clipping temporarily to draw border
        lines on the region boundary.
      files:
      - examples/riscv-hello/geos_kern.c
    - id: i.3.4
      title: Split-screen smoke test
      status: done
      description: 'tests/split_screen_test.sh: boot kern.elf, inject "echo a\n",
        wait 2s, fb_dump, assert (a) shell region contains "a" pixels, (b) life region
        has nonzero cell count, (c) focused border visible.'
      files:
      - tests/split_screen_test.sh
  risks:
  - 'Cooperative scheduling is fragile: a program that never yields hangs the system.
    Mitigation: timer interrupt forces switch even if program does not call yield.'
  - 'Region clipping at fb_present granularity may flicker if programs present at
    different rates. Mitigation: kernel composites both regions into a single vm.screen
    update per host-render tick.'
  - 'Scope creep into "real OS" territory. Mitigation: every kernel feature must answer
    "could a libgeos helper do this?" -- if yes, it stays in libgeos.'
  technical_notes: 'The principle from SPEC.md governs every decision in this phase:
    only build what genuinely cannot live in a single program. Multi-tenancy on the
    framebuffer and input focus arbitration are the two things that qualify. Process
    isolation, memory protection, file descriptors, and signals do NOT qualify and
    must be rejected if they appear in scope discussions.

    '
  _claimed_by: worker-0
