    LOAD in this range to read vm.screen[y*256+x] so programs can implement screenshot
    save, collision detection against rendered output, and pixel pick operations.
    The existing PEEK opcode (0x4F) reads screen pixels but only one at a time; LOAD+STORE
    lets programs bulk-copy screen regions.
