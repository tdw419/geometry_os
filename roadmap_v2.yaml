- id: phase-219
  title: GeOS VM -- Memory-Mapped Screen Buffer Readback
  status: todo
  goal: Let VM programs read the screen buffer via LOAD from 0x10000-0x1FFFF
  description: The screen buffer at 0x10000-0x1FFFF (256x256 pixels, mapped to vm.screen)
    already supports writes for SETPIXEL-style rendering, but LOAD from this region
