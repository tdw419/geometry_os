- id: phase-222
  title: GeOS VM -- Timer and Alarm Opcodes
  status: todo
  goal: Add wall-clock timer opcodes so programs can schedule actions by real time,
    not just frame count
  description: Programs currently use the TICKS register (RAM[0xFFE], incremented
    by FRAME) for timing, but TICKS are instruction-count-based, not wall-clock. For
    games (countdown timers), UI (auto-save reminders), and networking (timeouts),
    programs need real time. Add TIMER_GET (milliseconds since VM start to register),
    TIMER_SET_ALARM (register = milliseconds from now), and TIMER_CHECK (returns 1
    if alarm fired, 0 if not). Uses std::time::Instant on the host.
  deliverables:
  - name: Wall-clock timer opcodes
    status: todo
    tasks:
    - id: p222.d1.t1
