- id: phase-222
  title: GeOS VM -- Timer and Alarm Opcodes
  status: todo
  goal: Add wall-clock timer opcodes so programs can schedule actions by real time,
    not just frame count
  description: 'Programs currently use the TICKS register (RAM[0xFFE], incremented
    by FRAME) for timing, but TICKS are instruction-count-based, not wall-clock. For
    games (countdown timers), UI (auto-save reminders), and networking (timeouts),
    programs need real time. Add TIMER_GET (milliseconds since VM start to register),
    TIMER_SET_ALARM (register = milliseconds from now), and TIMER_CHECK (returns 1
    if alarm fired, 0 if not). Uses std::time::Instant on the host.'
  deliverables:
  - name: Wall-clock timer opcodes
    status: todo
    tasks:
    - id: p222.d1.t1
      title: Add TIMER_GET opcode
      description: 'Reads host Instant::now() - vm.start_time, writes milliseconds to register. 32-bit value wraps at ~49 days. Opcode 0xC6.'
      scope_files:
      - src/vm/mod.rs
      - src/assembler/system_ops.rs
      scope_lines: 30
    - id: p222.d1.t2
      title: Add TIMER_SET_ALARM and TIMER_CHECK opcodes
      description: TIMER_SET_ALARM stores target_time = now + delay_ms. TIMER_CHECK
        returns 1 if now >= target_time, 0 if not. One alarm at a time (new alarm
        replaces old). Opcodes 0xC7, 0xC8.
      scope_files:
      - src/vm/mod.rs
      - src/assembler/system_ops.rs
      scope_lines: 40
    - id: p222.d1.t3
      title: 'Demo: countdown timer program'
      description: 10-second countdown displayed on screen. Uses TIMER_SET_ALARM +
        TIMER_CHECK each frame. Shows remaining seconds in large text. Beeps on completion.
        Proves wall-clock timing works.
      scope_files:
      - programs/countdown.asm
      scope_lines: 50
  test_target: 3
  scope_lines_total: 120
