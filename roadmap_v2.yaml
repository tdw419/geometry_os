- id: phase-209
  title: RISC-V Multi-Process -- Cooperative Context Switching
  status: todo
  goal: Run multiple bare-metal C programs concurrently in the RISC-V interpreter
    with cooperative yielding
  description: 'The GeOS VM has SPAWN/KILL for multi-process but the RISC-V guest runs
    a single ELF. Add a lightweight context switcher: the guest calls a yield SBI extension,
    the host saves all registers and switches to a second guest context (separate register
    file, separate PC, shared MMIO). This proves multi-programming on the RISC-V layer
    without a full kernel -- just register save/restore and PC swap.'
  deliverables:
  - name: Cooperative multi-process for RISC-V guests
    status: todo
    tasks:
    - id: p209.d1.t1
      title: Add SBI_YIELD extension to sbi.rs
      description: New SBI extension (0x4759 = "GY"). Guest calls ecall with a7=0x4759,
        a0=context_id. Host saves current context, switches to target context. Return
        to caller on next yield.
      scope_files:
      - src/riscv/sbi.rs
      - src/riscv/mod.rs
      scope_lines: 80
    - id: p209.d1.t2
      title: Add context management (create, switch, destroy)
      description: RiscvVm holds a Vec of GuestContext (registers, PC, privilege).
        SBI_YIELD with new context_id creates it. SBI_YIELD with existing ID switches.
        SBI_KILL terminates a context.
      scope_files:
      - src/riscv/mod.rs
      scope_lines: 60
    - id: p209.d1.t3
