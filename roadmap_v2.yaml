- id: phase-225
  title: GeOS VM -- Network HTTP Client Opcode
  status: todo
  goal: Add a simple HTTP GET opcode that fetches a URL and stores the response in
    RAM
  description: 'The VM has TCP opcodes (CONNECT, SOCKSEND, SOCKRECV) but no HTTP-level
    abstraction. Programs that want to fetch data from the web must manually construct
    HTTP requests, parse responses, and handle chunked encoding. An HTTPGET opcode
    encapsulates the common case: HTTPGET url_addr_reg, buf_reg, max_len_reg, actual_len_reg
    sends a GET request to the URL at url_addr, writes the response body to buf, and
    returns the actual length. Uses the existing TCP networking in src/vm/net.rs.'
  deliverables:
