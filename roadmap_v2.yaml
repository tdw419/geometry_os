  title: GeOS VM -- Hash Table Opcodes (HASHINIT, HASHSET, HASHGET)
  status: complete
  goal: Add VM-level hash table for efficient key-value lookups from assembly
  description: Assembly programs currently implement hash tables manually (hash function
    + collision chains) which costs 50+ instructions per lookup. Native hash table
    opcodes enable O(1) average lookups, useful for symbol tables, entity lookup,
    and caching.
