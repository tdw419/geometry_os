      scope_lines: 40
    - id: p227.d1.t2
      title: Wire breakpoint_hit into execution loops
      description: Both GUI (main.rs animation loop) and CLI (cli_main run loop) check
        vm.breakpoint_hit after each step batch. If true, print "BREAKPOINT hit at
        PC=0x..." and enter interactive debug mode.
      scope_files:
      - src/main.rs
      scope_lines: 30
    - id: p227.d1.t3
      title: Add conditional breakpoint test
      description: Program sets r10 = 5, loops incrementing r10, BREAKPOINT when r10
