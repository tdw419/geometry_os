      title: Add canvas raw-region flush to VfsSurface
      status: done
      description: 'Implemented in vfs_surface.rs. VfsSurface::Drop detects CANV marker
        at pixel (0,255) and writes rows 1-255 to .geometry_os/fs/canvas.raw (261,120
        bytes). VfsSurface::restore_canvas() loads it back, called after load_files()
