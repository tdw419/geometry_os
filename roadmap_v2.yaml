- id: phase-200
  title: Pixelpack Seamless Authoring Loop
  status: planned
  goal: Make the edit-run-visualize cycle for pixel programs seamless. Edit in neovim,
    save, watch GeOS assemble and execute the program as colored pixels on the grid.
  description: 'GeOS is a place you go to, not a place you live in. The editing happens
    externally (neovim with real LSP, real keybindings), and the visualization/execution
    happens natively in GeOS. This phase implements the bridge: a file watcher that
    monitors .asm files, triggers assemble -> encode to pixels -> load into screen
    memory -> execute on save. The user sees source in their editor, the encoded PNG,
    and live execution state simultaneously. No canvas-as-editor needed -- the text
    editor is a solved problem. The thing native to GeOS is execution and visualization.
    Dependency: multi-program kernel (so the watcher and VM run simultaneously).'
  deliverables:
  - name: File watcher + assemble + execute pipeline
    status: planned
    tasks:
