  title: ANSI Parser -- Scroll Region (CSI r) and Origin Mode
  status: done
  goal: Add scroll region support so full-screen apps (htop, nano, vim) can lock scrolling
    to a subset of rows
  description: CSI r (DECSTBM) sets the scroll region top and bottom margins. Within
    this region, scrolling only affects rows between top and bottom. Cursor movement
    outside the region is clamped. prompt_toolkit does NOT use scroll regions, but
    full-screen terminal apps (nano, htop) do. The qemu/ansi.rs Rust parser already
    handles this -- port the logic to host_term.asm. Also add CSI S and CSI T for
    scroll up/down by N lines.
  deliverables:
  - name: CSI r -- set scroll region (DECSTBM)
    status: done
    note: Implemented in src/qemu/ansi.rs (Rust ANSI parser). CSI r parsed with scroll_top/scroll_bottom
      fields. scroll_up/scroll_down respect region bounds. CUU/CUD clamped to region.
      ESC M (RI) scrolls down at scroll_top. RIS resets to full screen.
    tasks:
    - id: p185.d1.t1
      title: Add SCROLL_TOP and SCROLL_BOTTOM memory locations
      description: Define SCROLL_TOP (default 0) and SCROLL_BOTTOM (default ROWS-1)
        at known RAM addresses. Initialize to full screen on startup and on CSI r
        with no params.
      scope_files:
      - programs/host_term.asm
      scope_lines: 15
    - id: p185.d1.t2
      title: Parse CSI r in handle_sgr_final
      description: When final byte is 'r', read CSI_PARAM as top and CSI_PARAM2 as
        bottom (1-indexed). Clamp to valid range. Update SCROLL_TOP/SCROLL_BOTTOM.
        Move cursor to home position.
      scope_files:
      - programs/host_term.asm
      scope_lines: 35
    - id: p185.d1.t3
      title: Modify scroll_up and scroll_down to respect scroll region
      description: When cursor is on SCROLL_BOTTOM row and newline triggers scroll,
        only shift rows between SCROLL_TOP and SCROLL_BOTTOM. Clear SCROLL_BOTTOM
        row. Same for reverse scroll at SCROLL_TOP.
      scope_files:
      - programs/host_term.asm
