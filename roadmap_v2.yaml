      title: Implement HTTPGET opcode (0xC9)
      description: 'Read null-terminated URL from RAM. Parse host:port. Connect via TCP. Send "GET /path HTTP/1.0\r\nHost: host\r\n\r\n". Read response until connection closes or max_len reached. Strip HTTP headers. Write body to buf. Return body length. Error codes in r0 on failure.'
      scope_files:
