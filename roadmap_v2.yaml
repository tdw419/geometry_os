- id: phase-255
  title: GeOS VM -- Conditional Move and Select Opcodes (CMOV, CSEL)
  status: todo
  goal: Add branchless conditional move opcodes for performance-critical inner loops
  description: Conditional moves eliminate branch misprediction stalls in hot loops
    (pixel rendering, collision detection). CMOV rd, rs moves rs to rd if r0 != 0
    (after CMP). CSEL rd, rs1, rs2 selects rs1 if r0 != 0 else rs2. These are common
    in GPU architectures and enable branchless min/max, clamping, and multiplexing
    patterns.
  deliverables:
  - name: Conditional move opcodes
    status: todo
    tasks:
    - id: p255.d1.t1
      title: Implement CMOV rd, rs (0xDA) and CSEL rd, rs_true, rs_false (0xDB)
      description: 'CMOV: if r0 != 0 then rd = rs. CSEL: if r0 != 0 then rd = rs_true
        else rd = rs_false. Both read CMP result from r0.'
      scope_files:
