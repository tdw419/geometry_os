# Meta-Circular Glyph Scheduler Team - Phase 4+
# Continuing self-hosting: API Migration, BrainBridge, Full Self-Modification

team:
  name: meta-circular-scheduler-phase4-team
  description: |
    Continues the meta-circular scheduler implementation:
    - Phase 4: API Migration (HTTP parser in glyph)
    - Phase 5: BrainBridge Migration (LM Studio in glyph)
    - Phase 6: Full Self-Hosting (scheduler rewrites itself)

    Prerequisites: Phase 1-3 complete (trap interface, scheduler.glyph as VM 0)

  project_root: /home/jericho/zion/projects/geometry_os/geometry_os

  agents:
    - name: http-parser-engineer
      role: Implements HTTP parser in glyph for native API handling
      focus:
        - Parse GET/POST requests in glyph
        - Route to /peek, /poke, /exec, /status endpoints
        - Write responses to substrate for shim to send
        - Replace Rust HTTP handler with glyph delegation
      files:
        - systems/glyph_stratum/programs/daemon.glyph
        - systems/glyph_stratum/programs/http_parser.glyph
        - systems/infinite_map_rs/src/bin/gpu_dev_daemon.rs

    - name: brain-bridge-migrator
      role: Migrates BrainBridge (LM Studio) communication to glyph
      focus:
        - Implement intent injection from glyph
        - Read/write GPU memory for brain state
        - Coordinate with Sisyphus brain via substrate
        - Replace Rust BrainBridge with glyph-native version
      files:
        - systems/glyph_stratum/programs/brain_bridge.glyph
        - systems/infinite_map_rs/src/brain_bridge.rs
        - systems/infinite_map_rs/src/bin/gpu_dev_daemon.rs

    - name: self-modification-architect
      role: Enables scheduler.glyph to rewrite itself
      focus:
        - Implement GLYPH_WRITE opcode usage
        - Load scheduler source from substrate
        - Patch and reload scheduler at runtime
        - Maintain scheduler continuity during self-modification
      files:
        - systems/glyph_stratum/programs/scheduler.glyph
        - systems/infinite_map_rs/src/glyph_vm_scheduler.rs

    - name: shim-minimizer
      role: Reduces Rust shim to absolute minimum
      focus:
        - Remove HTTP handling (delegate to glyph)
        - Remove BrainBridge (delegate to glyph)
        - Keep only GPU init and trap dispatch
        - Document remaining shim responsibilities
      files:
        - systems/infinite_map_rs/src/bin/gpu_dev_daemon.rs

    - name: e2e-self-hosting-validator
      role: Validates complete self-hosting capability
      focus:
        - Test scheduler modifies itself successfully
        - Test HTTP API works through glyph
        - Test brain bridge works through glyph
        - Verify shim is minimal (under 200 lines)
      files:
        - systems/infinite_map_rs/src/tests/self_hosting_test.rs
        - systems/glyph_stratum/programs/test_self_modify.glyph

  tasks:
    - id: task-4.1
      title: Create HTTP parser glyph module
      assignee: http-parser-engineer
      dependencies: []
      description: |
        Create systems/glyph_stratum/programs/http_parser.glyph:
        - Parse "GET /peek?addr=0x100" format
        - Parse "POST /poke" with body
        - Return parsed request struct to caller
        - Error handling for malformed requests
      acceptance_criteria:
        - Parses GET requests correctly
        - Parses POST requests with body
        - Returns structured request data

    - id: task-4.2
      title: Integrate HTTP parser into daemon.glyph
      assignee: http-parser-engineer
      dependencies: [task-4.1]
      description: |
        Modify systems/glyph_stratum/programs/daemon.glyph:
        - Include http_parser module
        - Route requests to appropriate handlers
        - Implement /peek, /poke, /exec, /status in glyph
        - Write response to RES_BUFFER
      acceptance_criteria:
        - HTTP routing works in glyph
        - All 4 endpoints implemented
        - Responses written correctly

    - id: task-4.3
      title: Delegate HTTP from shim to glyph
      assignee: shim-minimizer
      dependencies: [task-4.2]
      description: |
        Modify systems/infinite_map_rs/src/bin/gpu_dev_daemon.rs:
        - Read incoming HTTP request
        - Write to REQ_BUFFER in substrate
        - Signal daemon.glyph via CTRL_PORT
        - Wait for response in RES_BUFFER
        - Send response back to client
      acceptance_criteria:
        - HTTP requests delegated to glyph
        - Responses returned correctly
        - Existing MCP tools still work

    - id: task-5.1
      title: Create brain_bridge.glyph
      assignee: brain-bridge-migrator
      dependencies: []
      description: |
        Create systems/glyph_stratum/programs/brain_bridge.glyph:
        - Read brain state from substrate (entropy, cycles)
        - Write intent to brain region (0x0300-0x320)
        - Poll for brain response
        - Coordinate with Sisyphus brain
      acceptance_criteria:
        - Reads brain state correctly
        - Writes intent successfully
        - Coordinates with existing brain

    - id: task-5.2
      title: Delegate BrainBridge from shim to glyph
      assignee: brain-bridge-migrator
      dependencies: [task-5.1]
      description: |
        Modify systems/infinite_map_rs/src/bin/gpu_dev_daemon.rs:
        - Remove direct BrainBridge calls
        - Delegate to brain_bridge.glyph via substrate
        - Keep only LM Studio connection setup in shim
      acceptance_criteria:
        - BrainBridge delegated to glyph
        - LM Studio communication works
        - Intent injection functions

    - id: task-6.1
      title: Implement scheduler self-modification
      assignee: self-modification-architect
      dependencies: [task-4.3, task-5.2]
      description: |
        Modify systems/glyph_stratum/programs/scheduler.glyph:
        - Add self-modify mode triggered by trap
        - Use GLYPH_WRITE to patch own code
        - Verify modification before commit
        - Jump to modified code safely
      acceptance_criteria:
        - Scheduler can modify itself
        - Modifications persist correctly
        - No crash on self-modification

    - id: task-6.2
      title: Create self-modification test glyph
      assignee: e2e-self-hosting-validator
      dependencies: [task-6.1]
      description: |
        Create systems/glyph_stratum/programs/test_self_modify.glyph:
        - Request scheduler modification via trap
        - Verify modification took effect
        - Report success/failure
      acceptance_criteria:
        - Test triggers self-modification
        - Verifies modification succeeded

    - id: task-6.3
      title: Minimize shim to under 200 lines
      assignee: shim-minimizer
      dependencies: [task-4.3, task-5.2, task-6.1]
      description: |
        Modify systems/infinite_map_rs/src/bin/gpu_dev_daemon.rs:
        - Remove all HTTP handling code
        - Remove all BrainBridge code
        - Keep only: GPU init, trap dispatch, socket I/O
        - Target: under 200 lines of actual code
      acceptance_criteria:
        - Shim under 200 lines
        - All functionality still works
        - Clear documentation of remaining role

    - id: task-6.4
      title: E2E self-hosting validation
      assignee: e2e-self-hosting-validator
      dependencies: [task-6.3]
      description: |
        Create systems/infinite_map_rs/src/tests/self_hosting_test.rs:
        - Test HTTP API through glyph
        - Test brain bridge through glyph
        - Test scheduler self-modification
        - Test shim is minimal
      acceptance_criteria:
        - All 4 tests pass
        - Self-hosting verified

  success_criteria:
    - HTTP API handled entirely in glyph
    - BrainBridge handled entirely in glyph
    - Scheduler can modify itself at runtime
    - Rust shim under 200 lines
    - All existing MCP tools still work
    - Daemon boots and runs autonomously

  reference_docs:
    - docs/plans/2026-03-15-meta-circular-scheduler-design.md
    - docs/plans/2026-03-15-meta-circular-scheduler-impl.md
    - systems/glyph_stratum/programs/daemon.glyph
    - systems/glyph_stratum/programs/scheduler.glyph
    - apps/mcp2cli/src/geos_cli.py
