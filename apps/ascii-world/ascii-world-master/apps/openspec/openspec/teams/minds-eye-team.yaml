# Mind's Eye Team
# Implements semantic proximity lines for "Chain of Thought" visualization

team:
  name: minds-eye-team
  description: |
    Implements the Mind's Eye visualization system that transforms isolated tokens
    into a connected "Chain of Thought" geometric graph.

    Pipeline: Token stream → Chain tracking → Link emission → WGSL rendering

    This implements the "Geometric Graph of Thought" from the Geometry OS v1.2 vision:
    - Consecutive tokens are connected with faint lines
    - Links fade over time with age-based decay
    - The reasoning chain becomes visible in Hilbert space

  project_root: /home/jericho/zion/projects/geometry_os/geometry_os

  agents:
    - name: wgsl-shader-engineer
      role: Implements TOKEN_LINK opcode in WGSL
      focus:
        - Add GLYPH_TOKEN_LINK constant
        - Implement render_token_link() function
        - Add case to main() switch
        - Verify shader compiles
      files:
        - systems/hypervisor/src/glyph_renderer.wgsl

    - name: chain-tracking-engineer
      role: Updates TokenRasterizer for chain tracking
      focus:
        - Add _prev_token_x, _prev_token_y tracking
        - Add _emit_token_link() method
        - Call link emission on subsequent tokens
        - Implement reset_chain() for new chains
      files:
        - systems/sisyphus/token_rasterizer.py
        - tests/test_token_rasterizer_links.py

    - name: serializer-updater
      role: Updates ThoughtSerializer for TOKEN_LINK
      focus:
        - Add _serialize_token_link() method
        - Handle prev_x, prev_y from thought data
        - Return ThoughtGlyph with TOKEN_LINK type
      files:
        - systems/sisyphus/thought_serializer.py
        - tests/test_thought_serializer_links.py

    - name: e2e-integration-engineer
      role: Creates end-to-end integration tests
      focus:
        - Test complete token chain visualization
        - Test chain reset functionality
        - Verify reasoning chain visualization
      files:
        - tests/test_minds_eye_e2e.py

  tasks:
    - id: task-1.1
      title: Add TOKEN_LINK opcode to WGSL shader
      assignee: wgsl-shader-engineer
      dependencies: []
      description: |
        Modify systems/hypervisor/src/glyph_renderer.wgsl:
        - Add GLYPH_TOKEN_LINK = 0x0A constant
        - Add render_token_link(glyph) function
        - Add case 0x0Au to main() switch
      acceptance_criteria:
        - GLYPH_TOKEN_LINK constant defined
        - render_token_link function implemented
        - WGSL compiles without errors

    - id: task-1.2
      title: Add chain tracking to TokenRasterizer
      assignee: chain-tracking-engineer
      dependencies: [task-1.1]
      description: |
        Modify systems/sisyphus/token_rasterizer.py:
        - Add _prev_token_x, _prev_token_y instance variables
        - Initialize to None in __init__
        - Update process_token to track previous position
        - Add _emit_token_link() method
        - Call _emit_token_link before processing new token
        - Add reset_chain() method
      acceptance_criteria:
        - test_rasterizer_tracks_previous_token passes
        - test_rasterizer_emits_link_on_second_token passes
        - test_link_uses_source_token_color passes

    - id: task-1.3
      title: Add TOKEN_LINK serialization
      assignee: serializer-updater
      dependencies: [task-1.2]
      description: |
        Modify systems/sisyphus/thought_serializer.py:
        - Add _serialize_token_link() method
        - Handle prev_x, prev_y from thought data
        - Return ThoughtGlyph with TOKEN_LINK type
        - Update to_glyph_command() for TOKEN_LINK
      acceptance_criteria:
        - _serialize_token_link handles TOKEN_LINK type
        - to_glyph_command returns correct bytes for TOKEN_LINK

    - id: task-1.4
      title: Create E2E integration tests
      assignee: e2e-integration-engineer
      dependencies: [task-1.2, task-1.3]
      description: |
        Create tests/test_minds_eye_e2e.py:
        - Test complete token stream produces chain
        - Test chain reset starts new chain
        - Test reasoning chain visualization
      acceptance_criteria:
        - test_token_stream_produces_chain passes
        - test_reset_chain_starts_new_chain passes
        - test_reasoning_chain_visualization passes

  success_criteria:
    - TOKEN_LINK opcode renders faint lines between tokens
    - TokenRasterizer tracks and emits chain links
    - ThoughtSerializer serializes TOKEN_LINK correctly
    - E2E tests verify complete pipeline
    - Mind's Eye displays "Geometric Graph of Thought"

  reference_docs:
    - docs/plans/2026-03-09-semantic-proximity-lines.md
    - systems/hypervisor/src/glyph_renderer.wgsl
    - systems/sisyphus/token_rasterizer.py
