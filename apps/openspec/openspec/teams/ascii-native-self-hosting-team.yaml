# ASCII-Native Self-Hosting Team
# Integrates self-hosting assembler with ASCII-First architecture

team:
  name: ascii-native-self-hosting-team
  description: |
    Creates an ASCII-First visual interface for the existing self-hosting assembler,
    enabling users to edit source code and compile it visually on the Glyph VM.
    The self-hosting assembler (self_hosting_assembler.glyph) already exists - this
    team builds the template, mapping, and integration layers.

  project_root: /home/jericho/zion/projects/geometry_os/geometry_os

  agents:
    - name: template-architect
      role: Creates ASCII template and mapping configuration
      focus:
        - Design 80x24 ASCII template with [A] Edit, [B] Assemble, [C] Run buttons
        - Create mapping.json with button/state definitions
        - Use Mustache-style {{variable}} syntax for dynamic content
      files:
        - apps/ascii-world/ascii-world-master/apps/geos-ascii/examples/self_hosting.ascii
        - apps/ascii-world/ascii-world-master/apps/geos-ascii/examples/self_hosting.mapping.json

    - name: rust-integrator
      role: Creates Rust modules for template loading and cartridge generation
      focus:
        - Create SelfHostingTemplate loader with include_str! for compile-time verification
        - Create generate_self_hosting_cartridge function
        - Integrate with existing GlyphAssembler and CartridgeWriter
      files:
        - systems/infinite_map_rs/src/ascii_native/self_hosting_template.rs
        - systems/infinite_map_rs/src/ascii_native/self_hosting_cartridge.rs
        - systems/infinite_map_rs/src/ascii_native/mod.rs

    - name: cli-engineer
      role: Adds --self-hosting mode to geos-compile CLI
      focus:
        - Add --self-hosting flag to Args struct
        - Wire to self_hosting_cartridge::generate_self_hosting_cartridge
        - Test CLI with example files
      files:
        - systems/infinite_map_rs/src/bin/geos-compile.rs
        - tests/cli_self_hosting_test.rs

    - name: integration-tester
      role: Creates comprehensive integration tests
      focus:
        - Test template loading and rendering
        - Test cartridge generation and PNG dimensions
        - Test cartridge execution in synthetic VRAM
        - Verify complete pipeline
      files:
        - systems/infinite_map_rs/tests/ascii_native_integration_test.rs
        - systems/infinite_map_rs/tests/self_hosting_template_test.rs

    - name: doc-curator
      role: Updates memory and documentation
      focus:
        - Create memory/ascii-native-self-hosting.md
        - Update memory/MEMORY.md with new system
        - Document usage examples
      files:
        - memory/ascii-native-self-hosting.md
        - memory/MEMORY.md

  tasks:
    - id: task-1.1
      title: Create ASCII Template
      assignee: template-architect
      dependencies: []
      description: |
        Create apps/ascii-world/ascii-world-master/apps/geos-ascii/examples/self_hosting.ascii

        Template should:
        - Be 80x24 grid
        - Show [A] Edit, [B] Assemble, [C] Run, [X] Quit buttons
        - Have SOURCE section with {{#each source_lines}}
        - Have STATUS section with {{status}}
        - Follow ASCII-First pattern from docs/ASCII-FIRST-REFACTORING-GUIDE.md

    - id: task-1.2
      title: Create Mapping Configuration
      assignee: template-architect
      dependencies: [task-1.1]
      description: |
        Create apps/ascii-world/ascii-world-master/apps/geos-ascii/examples/self_hosting.mapping.json

        Mapping should define:
        - Button actions: A=editor_mode, B=assemble, C=run_program, X=exit
        - State vars: version, status, source_lines
        - Handlers: assemble spawns VM at 0x2000, run spawns at 0x5000

    - id: task-2.1
      title: Create Template Loader
      assignee: rust-integrator
      dependencies: [task-1.1]
      description: |
        Create systems/infinite_map_rs/src/ascii_native/self_hosting_template.rs

        Implement SelfHostingTemplate with:
        - load() -> Result<Self, String>
        - source() -> &str
        - render(status, source_lines) -> String
        - Use include_str! for compile-time embedding

        Write lib tests in module.

    - id: task-2.2
      title: Create Cartridge Generator
      assignee: rust-integrator
      dependencies: [task-2.1]
      description: |
        Create systems/infinite_map_rs/src/ascii_native/self_hosting_cartridge.rs

        Implement generate_self_hosting_cartridge(source, output_path) that:
        - Renders ASCII template with source
        - Assembles program with GlyphAssembler
        - Creates CartridgeWriter with glyph text + program
        - Applies action mapping for buttons
        - Writes PNG to output path

    - id: task-3.1
      title: Add CLI --self-hosting Flag
      assignee: cli-engineer
      dependencies: [task-2.2]
      description: |
        Modify systems/infinite_map_rs/src/bin/geos-compile.rs

        Add --self-hosting flag that:
        - Calls self_hosting_cartridge::generate_self_hosting_cartridge
        - Prints "Using ASCII-First self-hosting template" in verbose mode
        - Falls back to normal compilation without flag

    - id: task-4.1
      title: Create Integration Tests
      assignee: integration-tester
      dependencies: [task-2.2]
      description: |
        Create systems/infinite_map_rs/tests/ascii_native_integration_test.rs

        Tests:
        - test_self_hosting_cartridge_loads: Verify PNG is 80x1576
        - test_self_hosting_cartridge_executes: Run in synthetic VRAM
        - test_self_hosting_template_displays_correctly: Check buttons/status

    - id: task-4.2
      title: Create CLI Tests
      assignee: integration-tester
      dependencies: [task-3.1]
      description: |
        Create tests/cli_self_hosting_test.rs

        Test:
        - test_cli_self_hosting_mode: Run geos-compile --self-hosting
        - Verify output file exists and is valid PNG

    - id: task-5.1
      title: Update Documentation
      assignee: doc-curator
      dependencies: [task-4.2]
      description: |
        Create memory/ascii-native-self-hosting.md with:
        - Component table
        - Why/How to Use sections
        - Test coverage table

        Update memory/MEMORY.md Active Systems table.

  success_criteria:
    - ASCII template displays [A] Edit, [B] Assemble, [C] Run buttons
    - geos-compile --self-hosting generates valid .rts.png
    - PNG is 80x1576 pixels (5-segment format)
    - Cartridge executes in synthetic VRAM
    - All 8 tests passing
    - Memory documentation updated

  reference_docs:
    - /home/jericho/zion/projects/geometry_os/geometry_os/docs/plans/2026-03-18-ascii-native-self-hosting.md
    - /home/jericho/zion/projects/geometry_os/geometry_os/docs/ASCII-FIRST-REFACTORING-GUIDE.md
    - /home/jericho/zion/projects/geometry_os/geometry_os/systems/glyph_stratum/programs/self_hosting_assembler.glyph
