<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry OS -- Browser VM</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        h1 {
            color: #e94560;
            margin-bottom: 4px;
            font-size: 1.5rem;
        }
        .subtitle {
            color: #888;
            margin-bottom: 16px;
            font-size: 0.85rem;
        }
        .main {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .canvas-wrap {
            background: #0f0f23;
            border: 2px solid #e94560;
            border-radius: 4px;
            padding: 4px;
        }
        #geo-canvas {
            image-rendering: pixelated;
            width: 512px;
            height: 512px;
            display: block;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 280px;
        }
        .program-select {
            background: #16213e;
            color: #e0e0e0;
            border: 1px solid #e94560;
            padding: 8px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.85rem;
        }
        textarea {
            background: #16213e;
            color: #e0e0e0;
            border: 1px solid #333;
            padding: 8px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.75rem;
            resize: vertical;
            min-height: 200px;
            width: 100%;
        }
        button {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        button:hover { background: #c73a52; }
        button:disabled { background: #555; cursor: not-allowed; }
        .btn-row { display: flex; gap: 8px; }
        .status {
            font-size: 0.75rem;
            color: #888;
            padding: 4px 0;
        }
        .status.error { color: #e94560; }
        .info {
            font-size: 0.7rem;
            color: #666;
            margin-top: 12px;
            text-align: center;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <h1>Geometry OS</h1>
    <div class="subtitle">Pixel-art VM in your browser -- 41 opcodes, 256x256 canvas</div>

    <div class="main">
        <div class="canvas-wrap">
            <canvas id="geo-canvas"></canvas>
        </div>

        <div class="controls">
            <select id="program-select" class="program-select">
                <option value="hello">Hello World</option>
                <option value="gradient">Gradient</option>
                <option value="checkerboard">Checkerboard</option>
                <option value="nested_rects">Nested Rects</option>
                <option value="colors">Color Palette</option>
                <option value="rings">Concentric Rings</option>
                <option value="circles">Circles</option>
                <option value="lines">Star Burst</option>
                <option value="fire">Fire Animation</option>
                <option value="snake">Snake</option>
                <option value="ball">Bouncing Ball</option>
                <option value="custom">Custom (edit below)</option>
            </select>

            <textarea id="source-editor" spellcheck="false"></textarea>

            <div class="btn-row">
                <button id="btn-run">▶ Run</button>
                <button id="btn-stop" disabled>■ Stop</button>
                <button id="btn-step">⏭ Step</button>
            </div>

            <div id="status" class="status">Ready. Select a program and click Run.</div>

            <div id="regs" class="status" style="font-size:0.65rem; max-height:80px; overflow-y:auto;"></div>
        </div>
    </div>

    <div class="info">
        Programs run entirely in your browser via WebAssembly.
        Keyboard input works for interactive programs (click canvas first to focus).
        Built-in programs are embedded in this page.
    </div>

    <script type="module">
        import init, { GeometryOS } from './pkg/geometry_os_wasm.js';

        const PROGRAMS = {
            hello: `; Hello World -- render text on the VM screen using TEXT opcode
; Writes "Hello, World!" to RAM at 0x2000, then calls TEXT to draw it.

; --- build the string at 0x2000 ---
LDI r9, 0x2000
LDI r0, 72
STORE r9, r0
LDI r9, 0x2001
LDI r0, 101
STORE r9, r0
LDI r9, 0x2002
LDI r0, 108
STORE r9, r0
LDI r9, 0x2003
LDI r0, 108
STORE r9, r0
LDI r9, 0x2004
LDI r0, 111
STORE r9, r0
LDI r9, 0x2005
LDI r0, 44
STORE r9, r0
LDI r9, 0x2006
LDI r0, 32
STORE r9, r0
LDI r9, 0x2007
LDI r0, 87
STORE r9, r0
LDI r9, 0x2008
LDI r0, 111
STORE r9, r0
LDI r9, 0x2009
LDI r0, 114
STORE r9, r0
LDI r9, 0x200A
LDI r0, 108
STORE r9, r0
LDI r9, 0x200B
LDI r0, 100
STORE r9, r0
LDI r9, 0x200C
LDI r0, 33
STORE r9, r0
LDI r9, 0x200D
LDI r0, 0
STORE r9, r0
; --- draw it ---
LDI r1, 90
LDI r2, 120
LDI r3, 0x2000
TEXT r1, r2, r3
HALT`,
            gradient: `; GRADIENT -- Draw a horizontal blue gradient across the screen
; Each column x gets color = x (blue channel only)
; Uses PSET (register-based) for dynamic coordinates
; Test: column 0 = 0x00, column 255 = 0xFF

LDI r0, 0            ; r0 = x counter
LDI r1, 1            ; increment
LDI r3, 256          ; limit

x_loop:
  LDI r4, 0          ; r4 = y counter

y_loop:
  PSET r0, r4, r0    ; pixel at (x, y) with color = x (r0 serves as both x and color)
  ADD r4, r1          ; y++
  LDI r5, 0
  ADD r5, r4
  SUB r5, r3
  JZ r5, next_x
  JMP y_loop

next_x:
  ADD r0, r1          ; x++
  LDI r5, 0
  ADD r5, r0
  SUB r5, r3
  JZ r5, done
  JMP x_loop

done:
HALT`,
            checkerboard: `; CHECKERBOARD -- 8x8 pixel squares, alternating black and white
; cell_row = y/8, cell_col = x/8, tracked with counters
; Color: white if (cell_row+cell_col) is even, black if odd

LDI r0, 0            ; r0 = y
LDI r2, 256          ; r2 = limit
LDI r3, 8            ; r3 = cell size
LDI r10, 0x000000    ; r10 = black
LDI r11, 0xFFFFFF    ; r11 = white
LDI r12, 0           ; r12 = cell_row
LDI r13, 0           ; r13 = y-in-cell counter (0..7)

y_loop:
  LDI r14, 0         ; r14 = cell_col (reset each row)
  LDI r15, 0         ; r15 = x-in-cell counter (0..7)
  LDI r1, 0          ; r1 = x

x_loop:
  ; Color = (cell_row + cell_col) & 1
  LDI r6, 0
  ADD r6, r12
  ADD r6, r14        ; r6 = cell_row + cell_col
  LDI r7, 1
  AND r6, r7         ; r6 = parity (0 or 1)

  ; Draw pixel
  JZ r6, draw_white
  LDI r6, 0
  ADD r6, r10
  PSET r1, r0, r6
  JMP advance_x

draw_white:
  LDI r6, 0
  ADD r6, r11
  PSET r1, r0, r6

advance_x:
  ; x++
  LDI r7, 1
  ADD r1, r7
  ; x-in-cell++
  ADD r15, r7

  ; If x-in-cell == 8, advance cell_col, reset counter
  LDI r6, 0
  ADD r6, r15
  SUB r6, r3
  JNZ r6, check_x_done
  ADD r14, r7         ; cell_col++ (r7=1)
  LDI r15, 0          ; reset x-in-cell

check_x_done:
  ; If x == 256, next row
  LDI r6, 0
  ADD r6, r1
  SUB r6, r2
  JZ r6, advance_y
  JMP x_loop

advance_y:
  ; y++
  LDI r7, 1
  ADD r0, r7
  ; y-in-cell++
  ADD r13, r7

  ; If y-in-cell == 8, advance cell_row, reset counter
  LDI r6, 0
  ADD r6, r13
  SUB r6, r3
  JNZ r6, check_y_done
  ADD r12, r7         ; cell_row++ (r7=1)
  LDI r13, 0          ; reset y-in-cell

check_y_done:
  ; If y == 256, done
  LDI r6, 0
  ADD r6, r0
  SUB r6, r2
  JZ r6, done
  JMP y_loop

done:
HALT`,
            colors: `; Colors -- fill screen with horizontal color bands
; Uses FILL in a loop to draw 4 color bands across the screen

LDI r0, 0xFF0000
FILL r0
LDI r0, 0x00FF00
FILL r0
LDI r0, 0x0000FF
FILL r0
LDI r0, 0xFFFF00
FILL r0
HALT`,
            nested_rects: `; NESTED_RECTS -- Draw concentric rectangles from outside in
; Outer = red, inner = green, innermost = blue
; Each rectangle shrinks by 20 pixels on each side
; Test: visible nested colored rectangles

; Outer red rectangle
LDI r0, 0
LDI r1, 0
LDI r2, 256
LDI r3, 256
LDI r4, 0xFF0000
RECTF r0, r1, r2, r3, r4

; Green rectangle (20px inset)
LDI r0, 20
LDI r1, 20
LDI r2, 216
LDI r3, 216
LDI r4, 0x00FF00
RECTF r0, r1, r2, r3, r4

; Blue rectangle (40px inset)
LDI r0, 40
LDI r1, 40
LDI r2, 176
LDI r3, 176
LDI r4, 0x0000FF
RECTF r0, r1, r2, r3, r4

; Yellow rectangle (60px inset)
LDI r0, 60
LDI r1, 60
LDI r2, 136
LDI r3, 136
LDI r4, 0xFFFF00
RECTF r0, r1, r2, r3, r4

; Magenta rectangle (80px inset)
LDI r0, 80
LDI r1, 80
LDI r2, 96
LDI r3, 96
LDI r4, 0xFF00FF
RECTF r0, r1, r2, r3, r4

; Cyan rectangle (100px inset)
LDI r0, 100
LDI r1, 100
LDI r2, 56
LDI r3, 56
LDI r4, 0x00FFFF
RECTF r0, r1, r2, r3, r4

; White center (120px inset)
LDI r0, 120
LDI r1, 120
LDI r2, 16
LDI r3, 16
LDI r4, 0xFFFFFF
RECTF r0, r1, r2, r3, r4

HALT`,
            rings: `; RINGS -- Concentric colored rings emanating from center (128,128)
; For each pixel, compute distance from center, map to color
; Distance approximated with Manhattan distance (|dx|+|dy|)
; Ring color cycles through: red, yellow, green, cyan, blue, magenta

LDI r21, 0           ; r21 = y
LDI r1, 1            ; r1 = increment
LDI r2, 256          ; r2 = limit
LDI r3, 128          ; r3 = center (128)

y_loop:
  LDI r4, 0          ; r4 = x

x_loop:
  ; Compute |x - 128|
  LDI r5, 0
  ADD r5, r4         ; r5 = x
  SUB r5, r3         ; r5 = x - 128
  ; If negative (wrapped), negate: 0 - r5
  LDI r6, 0
  CMP r5, r6         ; r0 = sign comparison
  ; r0 > 0 means r5 < r6 (negative)
  ; We can't branch on sign of r0 directly... 
  ; Use BLT: if r5 < 0, negate
  LDI r20, 0
  CMP r5, r20
  BLT r0, abs_x_neg
  JMP abs_x_done
abs_x_neg:
  LDI r6, 0
  SUB r6, r5         ; r6 = -r5 = |x-128|
  LDI r5, 0
  ADD r5, r6         ; r5 = |x-128|
abs_x_done:
  ; r5 = |x - 128|

  ; Compute |y - 128|
  LDI r7, 0
  ADD r7, r21        ; r7 = y
  SUB r7, r3         ; r7 = y - 128
  LDI r6, 0
  CMP r7, r6
  LDI r20, 0
  CMP r7, r20
  BLT r0, abs_y_neg
  JMP abs_y_done
abs_y_neg:
  LDI r6, 0
  SUB r6, r7
  LDI r7, 0
  ADD r7, r6
abs_y_done:
  ; r7 = |y - 128|

  ; distance = |x-128| + |y-128| (Manhattan)
  ADD r5, r7         ; r5 = distance

  ; Ring index = distance / 16 (integer division by repeated subtraction)
  LDI r8, 0          ; r8 = ring index
  LDI r9, 16         ; r9 = ring width
div_loop:
  SUB r5, r9
  LDI r6, 0
  CMP r5, r6
  ; If r5 >= 0, increment ring index and continue
  ; BLT r5 < 0 means we overshot
  BLT r0, div_done
  LDI r10, 1
  ADD r8, r10
  JMP div_loop
div_done:
  ; r8 = ring index (0, 1, 2, ...)

  ; Map ring index to color using mod 6
  ; 0=red, 1=yellow, 2=green, 3=cyan, 4=blue, 5=magenta
  LDI r9, 6
mod_loop:
  SUB r8, r9
  LDI r6, 0
  CMP r8, r6
  BLT r0, mod_done
  JMP mod_loop
mod_done:
  ADD r8, r9         ; undo last subtraction
  ; r8 = color index (0..5)

  ; Look up color
  JNZ r8, not_red
  LDI r5, 0xFF0000   ; red
  PSET r4, r21, r5
  JMP next_pixel
not_red:
  LDI r6, 1
  SUB r8, r6
  JNZ r8, not_yellow
  LDI r5, 0xFFFF00   ; yellow
  PSET r4, r21, r5
  JMP next_pixel
not_yellow:
  LDI r6, 1
  SUB r8, r6
  JNZ r8, not_green
  LDI r5, 0x00FF00   ; green
  PSET r4, r21, r5
  JMP next_pixel
not_green:
  LDI r6, 1
  SUB r8, r6
  JNZ r8, not_cyan
  LDI r5, 0x00FFFF   ; cyan
  PSET r4, r21, r5
  JMP next_pixel
not_cyan:
  LDI r6, 1
  SUB r8, r6
  JNZ r8, not_blue
  LDI r5, 0x0000FF   ; blue
  PSET r4, r21, r5
  JMP next_pixel
not_blue:
  LDI r5, 0xFF00FF   ; magenta (default)
  PSET r4, r21, r5

next_pixel:
  ; x++
  LDI r6, 1
  ADD r4, r6
  ; If x == 256, next row
  LDI r6, 0
  ADD r6, r4
  SUB r6, r2
  JZ r6, next_row
  JMP x_loop

next_row:
  ; y++
  LDI r6, 1
  ADD r21, r6
  ; If y == 256, done
  LDI r6, 0
  ADD r6, r21
  SUB r6, r2
  JZ r6, done
  JMP y_loop

done:
HALT`,
            circles: `; circles.asm -- concentric circles with cycling colors

; center
LDI r0, 128
LDI r1, 128

; radius counter
LDI r2, 10

; loop count
LDI r6, 12

loop:
  ; color = radius * 20 (cycles through hues roughly)
  LDI r5, 20
  MUL r5, r2

  ; shift into blue channel for variation
  LDI r7, 0x000100
  MUL r7, r2
  LDI r8, 0xFF
  AND r8, r5
  OR r7, r8

  CIRCLE r0, r1, r2, r7

  ; radius += 20
  LDI r9, 20
  ADD r2, r9

  ; loop
  LDI r9, 1
  SUB r6, r9
  JNZ r6, loop

HALT`,
            lines: `; lines.asm -- draw a star burst of lines from center
; Uses LINE opcode (0x45)

; color: white
LDI r5, 0xFFFFFF

; center
LDI r0, 128
LDI r1, 128

; corners and edges to draw lines to
LDI r2, 0
LDI r3, 0
LINE r0, r1, r2, r3, r5

LDI r2, 255
LDI r3, 0
LINE r0, r1, r2, r3, r5

LDI r2, 255
LDI r3, 255
LINE r0, r1, r2, r3, r5

LDI r2, 0
LDI r3, 255
LINE r0, r1, r2, r3, r5

LDI r2, 128
LDI r3, 0
LINE r0, r1, r2, r3, r5

LDI r2, 255
LDI r3, 128
LINE r0, r1, r2, r3, r5

LDI r2, 128
LDI r3, 255
LINE r0, r1, r2, r3, r5

LDI r2, 0
LDI r3, 128
LINE r0, r1, r2, r3, r5

HALT`,
            fire: `; fire.asm -- scrolling fire animation using SCROLL + FRAME
;
; Each frame:
;   1. SCROLL screen up 1 pixel
;   2. Draw a new ember row at y=254 with position-varied orange/red
;   3. FRAME -- display this state and continue
;
; r1 = x counter  r2 = y (254)  r4 = frame counter
; r5 = scroll amt  r6 = 256

LDI r2, 254
LDI r5, 1
LDI r6, 256

frame_loop:
  SCROLL r5

  LDI r1, 0

ember_loop:
  ; brightness = (x * 7 + frame) & 0xFF
  LDI r3, 7
  MUL r3, r1
  ADD r3, r4
  LDI r9, 0xFF
  AND r3, r9

  ; threshold: skip if brightness < 64
  LDI r9, 64
  CMP r3, r9
  BLT r0, next_x

  ; green = brightness >> 1, red = 0xFF
  LDI r9, 2
  DIV r3, r9
  LDI r9, 8
  SHL r3, r9
  LDI r9, 0xFF0000
  OR r3, r9

  PSET r1, r2, r3

next_x:
  LDI r9, 1
  ADD r1, r9
  CMP r1, r6
  JZ r0, end_row
  JMP ember_loop

end_row:
  LDI r9, 1
  ADD r4, r9
  FRAME
  JMP frame_loop`,
            snake: `; snake.asm -- Snake game on a 32x32 cell grid (8px per cell = 256x256)
;
; Memory layout (all RAM addresses):
;   0x2000..0x21FF  body ring buffer: each cell = (x<<8)|y, 512 slots
;   0x2200          head index (into ring buffer)
;   0x2201          tail index
;   0x2202          length
;   0x2203          apple_x (cell coords, 0-31)
;   0x2204          apple_y
;   0x2205          direction (0=up 1=right 2=down 3=left)
;   0x2206          game_over flag
;
; Stack: r30 = SP, initialized to 0x8000 (grows down into safe RAM)
;
; Controls: WASD (also lowercase)

; ── restart / init ──────────────────────────────────────────────
restart:
  LDI r30, 0x8000     ; stack pointer

  ; write initial snake: (14,16) (15,16) (16,16) at indices 0,1,2
  LDI r4, 0x2000
  LDI r9, 8

  LDI r1, 14
  SHL r1, r9
  LDI r2, 16
  OR r1, r2
  STORE r4, r1        ; body[0] = (14,16)

  LDI r1, 15
  SHL r1, r9
  OR r1, r2
  LDI r4, 0x2001
  STORE r4, r1        ; body[1] = (15,16)

  LDI r1, 16
  SHL r1, r9
  OR r1, r2
  LDI r4, 0x2002
  STORE r4, r1        ; body[2] = (16,16)

  LDI r1, 2
  LDI r4, 0x2200
  STORE r4, r1        ; head = 2
  LDI r1, 0
  LDI r4, 0x2201
  STORE r4, r1        ; tail = 0
  LDI r1, 3
  LDI r4, 0x2202
  STORE r4, r1        ; length = 3

  LDI r1, 1           ; direction = right
  LDI r4, 0x2205
  STORE r4, r1

  LDI r1, 0           ; game_over = 0
  LDI r4, 0x2206
  STORE r4, r1

  CALL place_apple

; ── main loop ────────────────────────────────────────────────────
game_loop:
  ; check game over
  LDI r4, 0x2206
  LOAD r1, r4
  JNZ r1, game_over_screen

  ; read key and update direction (cannot reverse)
  IKEY r7

  LDI r6, 87          ; W / w = up
  CMP r7, r6
  JZ r0, try_up
  LDI r6, 119
  CMP r7, r6
  JZ r0, try_up

  LDI r6, 68          ; D / d = right
  CMP r7, r6
  JZ r0, try_right
  LDI r6, 100
  CMP r7, r6
  JZ r0, try_right

  LDI r6, 83          ; S / s = down
  CMP r7, r6
  JZ r0, try_down
  LDI r6, 115
  CMP r7, r6
  JZ r0, try_down

  LDI r6, 65          ; A / a = left
  CMP r7, r6
  JZ r0, try_left
  LDI r6, 97
  CMP r7, r6
  JZ r0, try_left

after_input:
  ; throttle: only move snake every 8 frames (~7.5 moves/sec at 60fps)
  LDI r4, 0xFFE
  LOAD r8, r4           ; r8 = TICKS
  LDI r9, 7
  AND r8, r9            ; r8 = TICKS & 7
  JZ r8, do_move        ; move on frame 0, 8, 16, ...
  CALL draw_frame
  FRAME
  JMP game_loop

do_move:
  CALL move_snake
  CALL draw_frame
  FRAME
  JMP game_loop

try_up:
  LDI r4, 0x2205
  LOAD r6, r4
  LDI r9, 2
  CMP r6, r9
  JZ r0, after_input  ; refuse if going down
  LDI r1, 0
  STORE r4, r1
  JMP after_input

try_right:
  LDI r4, 0x2205
  LOAD r6, r4
  LDI r9, 3
  CMP r6, r9
  JZ r0, after_input  ; refuse if going left
  LDI r1, 1
  STORE r4, r1
  JMP after_input

try_down:
  LDI r4, 0x2205
  LOAD r6, r4
  LDI r9, 0
  CMP r6, r9
  JZ r0, after_input  ; refuse if going up
  LDI r1, 2
  STORE r4, r1
  JMP after_input

try_left:
  LDI r4, 0x2205
  LOAD r6, r4
  LDI r9, 1
  CMP r6, r9
  JZ r0, after_input  ; refuse if going right
  LDI r1, 3
  STORE r4, r1
  JMP after_input

; ── game over screen ─────────────────────────────────────────────
game_over_screen:
  LDI r1, 0x550000
  FILL r1
  FRAME
  IKEY r7
  JZ r7, game_over_screen
  JMP restart

; ─────────────────────────────────────────────────────────────────
; SUBROUTINE: move_snake
;   Reads direction, computes new head, checks walls + apple.
;   PUSH/POP r31 because we may nested-call place_apple.
; ─────────────────────────────────────────────────────────────────
move_snake:
  PUSH r31

  ; load head cell
  LDI r4, 0x2200
  LOAD r10, r4         ; r10 = head index
  LDI r4, 0x2000
  ADD r4, r10
  LOAD r11, r4         ; r11 = head cell = (x<<8)|y

  ; decode head x (r12), y (r13)
  LDI r9, 8
  LDI r12, 0
  ADD r12, r11
  SHR r12, r9          ; r12 = x
  LDI r9, 0xFF
  LDI r13, 0
  ADD r13, r11
  AND r13, r9          ; r13 = y

  ; load direction
  LDI r4, 0x2205
  LOAD r15, r4

  LDI r9, 0
  CMP r15, r9
  JZ r0, dir_up
  LDI r9, 1
  CMP r15, r9
  JZ r0, dir_right
  LDI r9, 2
  CMP r15, r9
  JZ r0, dir_down
  ; left: x -= 1
  LDI r9, 1
  SUB r12, r9
  JMP wall_check

dir_up:
  LDI r9, 1
  SUB r13, r9
  JMP wall_check

dir_right:
  LDI r9, 1
  ADD r12, r9
  JMP wall_check

dir_down:
  LDI r9, 1
  ADD r13, r9

wall_check:
  ; x >= 32 -> hit
  LDI r9, 32
  CMP r12, r9
  BGE r0, do_wall_hit
  ; x < 0 (signed underflow -> large u32) -> hit
  LDI r9, 0
  CMP r12, r9
  BLT r0, do_wall_hit
  ; y < 0
  CMP r13, r9
  BLT r0, do_wall_hit
  ; y >= 32
  LDI r9, 32
  CMP r13, r9
  BGE r0, do_wall_hit

  ; encode new head: (x<<8)|y
  LDI r9, 8
  LDI r11, 0
  ADD r11, r12
  SHL r11, r9
  OR r11, r13

  ; advance head index (mod 512)
  LDI r4, 0x2200
  LOAD r10, r4
  LDI r9, 1
  ADD r10, r9
  LDI r9, 0x1FF
  AND r10, r9
  STORE r4, r10

  ; store new head cell
  LDI r4, 0x2000
  ADD r4, r10
  STORE r4, r11

  ; check apple: compare new head_x with apple_x
  LDI r4, 0x2203
  LOAD r20, r4          ; apple_x
  LDI r4, 0x2204
  LOAD r21, r4          ; apple_y
  CMP r12, r20
  JZ r0, check_apple_y
  JMP advance_tail

check_apple_y:
  CMP r13, r21
  JZ r0, do_eat_apple

advance_tail:
  ; not eating: advance tail
  LDI r4, 0x2201
  LOAD r22, r4
  LDI r9, 1
  ADD r22, r9
  LDI r9, 0x1FF
  AND r22, r9
  LDI r4, 0x2201
  STORE r4, r22
  POP r31
  RET

do_eat_apple:
  ; grow: increment length
  LDI r4, 0x2202
  LOAD r9, r4
  LDI r20, 1
  ADD r9, r20
  STORE r4, r9
  CALL place_apple
  ; eat sound: 880 Hz, 60 ms
  LDI r5, 880
  LDI r6, 60
  BEEP r5, r6
  POP r31
  RET

do_wall_hit:
  LDI r1, 1
  LDI r4, 0x2206
  STORE r4, r1
  ; death sound: 110 Hz, 300 ms
  LDI r5, 110
  LDI r6, 300
  BEEP r5, r6
  POP r31
  RET

; ─────────────────────────────────────────────────────────────────
; SUBROUTINE: place_apple -- pick random cell (0-31, 0-31)
; ─────────────────────────────────────────────────────────────────
place_apple:
  RAND r1
  LDI r2, 31
  AND r1, r2
  LDI r4, 0x2203
  STORE r4, r1
  RAND r1
  AND r1, r2
  LDI r4, 0x2204
  STORE r4, r1
  RET

; ─────────────────────────────────────────────────────────────────
; SUBROUTINE: draw_frame -- clear, draw apple, draw snake body
;   No nested calls, r31 safe.
; ─────────────────────────────────────────────────────────────────
draw_frame:
  ; clear dark background
  LDI r1, 0x001008
  FILL r1

  ; draw apple (red 8x8 block)
  LDI r4, 0x2203
  LOAD r2, r4           ; apple_x
  LDI r4, 0x2204
  LOAD r3, r4           ; apple_y
  LDI r9, 8
  MUL r2, r9            ; px_x
  MUL r3, r9            ; px_y
  LDI r22, 8
  LDI r23, 8
  LDI r24, 0xFF2200
  RECTF r2, r3, r22, r23, r24

  ; draw snake body: iterate ring buffer from tail, length times
  LDI r4, 0x2201
  LOAD r10, r4           ; r10 = tail index
  LDI r4, 0x2202
  LOAD r25, r4           ; r25 = length (loop counter)

draw_loop:
  LDI r4, 0x2000
  ADD r4, r10
  LOAD r1, r4            ; r1 = cell = (x<<8)|y

  ; x = r1 >> 8
  LDI r9, 8
  LDI r2, 0
  ADD r2, r1
  SHR r2, r9             ; r2 = x

  ; y = r1 & 0xFF
  LDI r3, 0xFF
  AND r3, r1             ; r3 = y

  ; pixel coords
  LDI r9, 8
  MUL r2, r9
  MUL r3, r9

  ; draw 7x7 green cell (1px gap gives grid look)
  LDI r22, 7
  LDI r23, 7
  LDI r24, 0x00CC44
  RECTF r2, r3, r22, r23, r24

  ; advance ring buffer index
  LDI r9, 1
  ADD r10, r9
  LDI r9, 0x1FF
  AND r10, r9

  ; decrement counter and loop
  LDI r9, 1
  SUB r25, r9
  JZ r25, draw_done
  JMP draw_loop

draw_done:
  RET`,
            ball: `; ball.asm -- bouncing ball with keyboard control
;
; Left arrow (ASCII 68 = not available... use WASD or arrow keys)
; The VM keyboard port sends ASCII codes for printable keys.
; IKEY reads and clears the port each frame.
;
; Controls (WASD):
;   A (65) = push ball left    D (68) = push ball right
;   W (87) = push ball up      S (83) = push ball down
;   R (82) = reset ball to center
;
; Registers:
;   r1 = ball_x (fixed point: actual x = r1, but treated as signed)
;   r2 = ball_y
;   r3 = dx (velocity x, signed two's complement)
;   r4 = dy (velocity y)
;   r5 = ball color (white)
;   r6 = scratch
;   r7 = key code
;   r8 = ball radius (for CIRCLE)
;   r9 = 0 (black, for clearing)

; ── init ────────────────────────────────────────────────────────
LDI r1, 128     ; ball_x = center
LDI r2, 128     ; ball_y = center
LDI r3, 2       ; dx = 2
LDI r4, 3       ; dy = 3
LDI r5, 0xFFFFFF ; white
LDI r8, 8       ; radius 8
LDI r9, 0       ; black
LDI r20, 330    ; bounce freq (Hz)
LDI r21, 40     ; bounce dur  (ms)

; ── main loop ────────────────────────────────────────────────────
loop:
  ; clear screen
  FILL r9

  ; read keyboard
  IKEY r7

  ; A (97 lowercase or 65 uppercase) = kick left
  LDI r6, 65
  CMP r7, r6
  JZ r0, kick_left
  LDI r6, 97
  CMP r7, r6
  JZ r0, kick_left

  ; D (100 or 68) = kick right
  LDI r6, 68
  CMP r7, r6
  JZ r0, kick_right
  LDI r6, 100
  CMP r7, r6
  JZ r0, kick_right

  ; W (119 or 87) = kick up
  LDI r6, 87
  CMP r7, r6
  JZ r0, kick_up
  LDI r6, 119
  CMP r7, r6
  JZ r0, kick_up

  ; S (115 or 83) = kick down
  LDI r6, 83
  CMP r7, r6
  JZ r0, kick_down
  LDI r6, 115
  CMP r7, r6
  JZ r0, kick_down

  ; R (82 or 114) = reset
  LDI r6, 82
  CMP r7, r6
  JZ r0, do_reset
  LDI r6, 114
  CMP r7, r6
  JZ r0, do_reset

after_input:
  ; move ball
  ADD r1, r3
  ADD r2, r4

  ; ── bounce x walls ──────────────────────────────────────────
  ; if x >= 248 (255 - radius), negate dx
  LDI r6, 248
  CMP r1, r6
  BLT r0, check_x_low
  LDI r1, 248
  NEG r3
  BEEP r20, r21
  JMP check_y

check_x_low:
  ; if x <= 8 (radius), negate dx
  LDI r6, 8
  CMP r1, r6
  BGE r0, check_y
  LDI r1, 8
  NEG r3
  BEEP r20, r21

  ; ── bounce y walls ──────────────────────────────────────────
check_y:
  LDI r6, 248
  CMP r2, r6
  BLT r0, check_y_low
  LDI r2, 248
  NEG r4
  BEEP r20, r21
  JMP draw_ball

check_y_low:
  LDI r6, 8
  CMP r2, r6
  BGE r0, draw_ball
  LDI r2, 8
  NEG r4
  BEEP r20, r21

  ; ── draw ball ───────────────────────────────────────────────
draw_ball:
  CIRCLE r1, r2, r8, r5
  FRAME
  JMP loop

  ; ── kick handlers ───────────────────────────────────────────
kick_left:
  LDI r6, 3
  NEG r6
  LDI r3, 0
  ADD r3, r6
  JMP after_input

kick_right:
  LDI r3, 3
  JMP after_input

kick_up:
  LDI r6, 3
  NEG r6
  LDI r4, 0
  ADD r4, r6
  JMP after_input

kick_down:
  LDI r4, 3
  JMP after_input

do_reset:
  LDI r1, 128
  LDI r2, 128
  LDI r3, 2
  LDI r4, 3
  JMP after_input`,
        };        };

        // ── State ─────────────────────────────────────────────────────
        let geo = null;
        let running = false;
        let animFrameId = null;

        const canvas = document.getElementById('geo-canvas');
        const select = document.getElementById('program-select');
        const editor = document.getElementById('source-editor');
        const btnRun = document.getElementById('btn-run');
        const btnStop = document.getElementById('btn-stop');
        const btnStep = document.getElementById('btn-step');
        const statusEl = document.getElementById('status');
        const regsEl = document.getElementById('regs');

        // ── Init ───────────────────────────────────────────────────────
        async function main() {
            await init();
            geo = new GeometryOS('geo-canvas');
            selectProgram(select.value);
        }

        function selectProgram(name) {
            if (name === 'custom') {
                editor.readOnly = false;
            } else {
                editor.value = PROGRAMS[name] || '';
                editor.readOnly = true;
            }
        }

        function setStatus(msg, isError = false) {
            statusEl.textContent = msg;
            statusEl.className = 'status' + (isError ? ' error' : '');
        }

        function updateRegs() {
            if (!geo) return;
            let lines = [];
            for (let i = 0; i < 16; i++) {
                lines.push(`r${i.toString().padStart(2,'0')}=${geo.get_reg(i).toString(16).padStart(8,'0').toUpperCase()}`);
            }
            lines.push(`PC=${geo.get_pc().toString(16).padStart(8,'0').toUpperCase()}`);
            lines.push(` halted=${geo.is_halted()} frames=${geo.get_frame_count()}`);
            regsEl.textContent = lines.join('  ');
        }

        // ── Run loop ───────────────────────────────────────────────────
        function runLoop() {
            if (!running) return;
            try {
                const stillRunning = geo.tick();
                updateRegs();

                // Handle beeps via AudioContext
                const beep = geo.get_beep();
                if (beep !== null) {
                    playBeep(beep[0], beep[1]);
                }

                if (stillRunning) {
                    animFrameId = requestAnimationFrame(runLoop);
                } else {
                    stopRunning();
                    setStatus('Program halted.');
                }
            } catch (e) {
                stopRunning();
                setStatus('Error: ' + e.message, true);
            }
        }

        function playBeep(freq, dur) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = freq;
                osc.type = 'sine';
                gain.gain.value = 0.1;
                osc.start();
                osc.stop(ctx.currentTime + dur / 1000);
            } catch (e) {
                // Audio not available, ignore
            }
        }

        function startRunning() {
            const source = editor.value;
            try {
                const len = geo.load(source);
                setStatus(`Loaded ${len} words. Running...`);
                running = true;
                btnRun.disabled = true;
                btnStop.disabled = false;
                btnStep.disabled = true;
                animFrameId = requestAnimationFrame(runLoop);
            } catch (e) {
                setStatus('Assembly error: ' + e, true);
            }
        }

        function stopRunning() {
            running = false;
            if (animFrameId) {
                cancelAnimationFrame(animFrameId);
                animFrameId = null;
            }
            btnRun.disabled = false;
            btnStop.disabled = true;
            btnStep.disabled = false;
        }

        // ── Events ─────────────────────────────────────────────────────
        select.addEventListener('change', () => selectProgram(select.value));

        btnRun.addEventListener('click', () => {
            stopRunning();
            geo.reset();
            startRunning();
        });

        btnStop.addEventListener('click', () => {
            stopRunning();
            setStatus('Stopped.');
        });

        btnStep.addEventListener('click', () => {
            if (!geo || geo.is_halted()) {
                // Load first
                try {
                    geo.reset();
                    geo.load(editor.value);
                    setStatus('Loaded. Stepping...');
                } catch (e) {
                    setStatus('Assembly error: ' + e, true);
                    return;
                }
            }
            geo.step();
            updateRegs();
            if (geo.is_halted()) {
                setStatus('Program halted.');
            }
        });

        // Keyboard input for interactive programs
        canvas.setAttribute('tabindex', '0');
        canvas.addEventListener('keydown', (e) => {
            if (!geo) return;
            geo.key_press(e.keyCode);
            e.preventDefault();
        });
        canvas.addEventListener('keyup', (e) => {
            if (!geo) return;
            geo.key_clear();
            e.preventDefault();
        });

        // ── Go ─────────────────────────────────────────────────────────
        main().catch(e => setStatus('Failed to init WASM: ' + e, true));
    </script>
