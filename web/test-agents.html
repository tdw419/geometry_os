<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry OS - Area Agent Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: #00ff88;
            margin-bottom: 10px;
            font-size: 1.8em;
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            padding: 12px 24px;
            font-family: inherit;
            font-size: 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-start {
            background: #00ff88;
            color: #000;
        }

        .btn-start:hover:not(:disabled) {
            background: #00cc6a;
        }

        .btn-stop {
            background: #ff4444;
            color: #fff;
        }

        .btn-stop:hover:not(:disabled) {
            background: #cc3333;
        }

        .btn-step {
            background: #4488ff;
            color: #fff;
        }

        .btn-step:hover:not(:disabled) {
            background: #3366cc;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .agent-card {
            background: #1a1a24;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #333;
        }

        .agent-card.running {
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
        }

        .agent-card.error {
            border-color: #ff4444;
        }

        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .agent-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #fff;
        }

        .agent-pid {
            color: #888;
            font-size: 0.9em;
        }

        .agent-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .stat {
            background: #0a0a0f;
            padding: 10px;
            border-radius: 6px;
        }

        .stat-label {
            color: #888;
            font-size: 0.8em;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.1em;
            color: #00ff88;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-idle { background: #888; }
        .status-running { background: #00ff88; animation: pulse 1s infinite; }
        .status-waiting { background: #ffaa00; }
        .status-error { background: #ff4444; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .log-container {
            background: #1a1a24;
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #333;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .log-title {
            font-size: 1.1em;
            color: #fff;
        }

        .log-entries {
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.85em;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid #2a2a34;
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-time {
            color: #666;
            margin-right: 10px;
        }

        .log-info { color: #4488ff; }
        .log-success { color: #00ff88; }
        .log-error { color: #ff4444; }
        .log-warn { color: #ffaa00; }

        .system-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #1a1a24;
            border-radius: 10px;
        }

        .system-stat {
            text-align: center;
        }

        .system-stat-value {
            font-size: 2em;
            color: #00ff88;
        }

        .system-stat-label {
            color: #888;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Geometry OS Area Agents</h1>
        <p class="subtitle">7 Isolated Kernel Processes with Shared Memory IPC</p>

        <div class="controls">
            <button id="btnInit" class="btn-start">Initialize Kernel</button>
            <button id="btnSpawn" class="btn-start" disabled>Spawn Agents</button>
            <button id="btnStart" class="btn-start" disabled>Start Execution</button>
            <button id="btnStop" class="btn-stop" disabled>Stop</button>
            <button id="btnStep" class="btn-step" disabled>Single Step</button>
        </div>

        <div class="system-stats">
            <div class="system-stat">
                <div class="system-stat-value" id="stepCount">0</div>
                <div class="system-stat-label">Steps</div>
            </div>
            <div class="system-stat">
                <div class="system-stat-value" id="activeAgents">0</div>
                <div class="system-stat-label">Active Agents</div>
            </div>
            <div class="system-stat">
                <div class="system-stat-value" id="kernelStatus">Idle</div>
                <div class="system-stat-label">Kernel Status</div>
            </div>
        </div>

        <div class="dashboard" id="agentDashboard">
            <!-- Agent cards will be generated here -->
        </div>

        <div class="log-container">
            <div class="log-header">
                <span class="log-title">Execution Log</span>
                <button id="btnClearLog">Clear</button>
            </div>
            <div class="log-entries" id="logEntries">
                <div class="log-entry">
                    <span class="log-time">--:--:--</span>
                    <span class="log-info">System ready. Click "Initialize Kernel" to begin.</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { AgentDeployment, AGENTS, PROC_STATE, deployAgents } from './agents/AgentDeployment.js';

        // Agent names for display
        const AGENT_NAMES = ['Compositor', 'Shell', 'Cognitive', 'Memory', 'I/O', 'Scheduler', 'Network'];

        let deployment = null;

        // UI Elements
        const btnInit = document.getElementById('btnInit');
        const btnSpawn = document.getElementById('btnSpawn');
        const btnStart = document.getElementById('btnStart');
        const btnStop = document.getElementById('btnStop');
        const btnStep = document.getElementById('btnStep');
        const btnClearLog = document.getElementById('btnClearLog');
        const stepCountEl = document.getElementById('stepCount');
        const activeAgentsEl = document.getElementById('activeAgents');
        const kernelStatusEl = document.getElementById('kernelStatus');
        const logEntries = document.getElementById('logEntries');
        const dashboard = document.getElementById('agentDashboard');

        // Initialize agent cards
        function initDashboard() {
            dashboard.innerHTML = AGENT_NAMES.map((name, i) => `
                <div class="agent-card" id="agent-${i}">
                    <div class="agent-header">
                        <span class="agent-name">
                            <span class="status-indicator status-idle" id="status-${i}"></span>
                            ${name}
                        </span>
                        <span class="agent-pid">PID ${i}</span>
                    </div>
                    <div class="agent-stats">
                        <div class="stat">
                            <div class="stat-label">Heartbeat</div>
                            <div class="stat-value" id="heartbeat-${i}">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">PC</div>
                            <div class="stat-value" id="pc-${i}">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">State</div>
                            <div class="stat-value" id="state-${i}">Idle</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">Status Addr</div>
                            <div class="stat-value" id="addr-${i}">${10 + i}</div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Log message
        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `
                <span class="log-time">${time}</span>
                <span class="log-${type}">${message}</span>
            `;
            logEntries.appendChild(entry);
            logEntries.scrollTop = logEntries.scrollHeight;
        }

        // Update agent card
        function updateAgentCard(index, data) {
            const card = document.getElementById(`agent-${index}`);
            const statusIndicator = document.getElementById(`status-${index}`);
            const heartbeatEl = document.getElementById(`heartbeat-${index}`);
            const pcEl = document.getElementById(`pc-${index}`);
            const stateEl = document.getElementById(`state-${index}`);

            if (data) {
                heartbeatEl.textContent = data.heartbeat || 0;
                pcEl.textContent = data.pc || 0;

                const stateNames = ['Idle', 'Running', 'Waiting', 'Error'];
                stateEl.textContent = stateNames[data.status] || 'Unknown';

                // Update status indicator
                statusIndicator.className = 'status-indicator';
                switch (data.status) {
                    case PROC_STATE.RUNNING:
                        statusIndicator.classList.add('status-running');
                        card.classList.add('running');
                        card.classList.remove('error');
                        break;
                    case PROC_STATE.WAITING:
                        statusIndicator.classList.add('status-waiting');
                        card.classList.remove('running', 'error');
                        break;
                    case PROC_STATE.ERROR:
                        statusIndicator.classList.add('status-error');
                        card.classList.add('error');
                        card.classList.remove('running');
                        break;
                    default:
                        statusIndicator.classList.add('status-idle');
                        card.classList.remove('running', 'error');
                }
            }
        }

        // Update all displays
        async function updateDisplay() {
            if (!deployment) return;

            stepCountEl.textContent = deployment.stepCount;
            kernelStatusEl.textContent = deployment.running ? 'Running' : 'Paused';

            const status = await deployment.getStatus();
            let activeCount = 0;

            for (const [name, data] of Object.entries(status.agents)) {
                if (data.status === PROC_STATE.RUNNING) activeCount++;
                updateAgentCard(data.pid, data);
            }

            activeAgentsEl.textContent = activeCount;
        }

        // Initialize kernel
        btnInit.addEventListener('click', async () => {
            log('Initializing kernel...', 'info');
            btnInit.disabled = true;

            try {
                deployment = new AgentDeployment();
                await deployment.init();
                log('Kernel initialized successfully', 'success');
                btnSpawn.disabled = false;
                kernelStatusEl.textContent = 'Ready';
            } catch (error) {
                log(`Failed to initialize: ${error.message}`, 'error');
                btnInit.disabled = false;
            }
        });

        // Spawn agents
        btnSpawn.addEventListener('click', async () => {
            log('Spawning 7 Area Agents...', 'info');
            btnSpawn.disabled = true;

            try {
                await deployment.spawnAll();
                log('All agents spawned successfully', 'success');
                btnStart.disabled = false;
                btnStep.disabled = false;
                kernelStatusEl.textContent = 'Agents Ready';
                updateDisplay();
            } catch (error) {
                log(`Failed to spawn agents: ${error.message}`, 'error');
                btnSpawn.disabled = false;
            }
        });

        // Start execution
        btnStart.addEventListener('click', () => {
            log('Starting execution loop...', 'info');
            deployment.start(60);
            btnStart.disabled = true;
            btnStop.disabled = false;
            btnStep.disabled = true;

            // Update display periodically
            const updateInterval = setInterval(() => {
                updateDisplay();
                if (!deployment.running) {
                    clearInterval(updateInterval);
                }
            }, 100);
        });

        // Stop execution
        btnStop.addEventListener('click', () => {
            log('Stopping execution...', 'warn');
            deployment.stop();
            btnStop.disabled = true;
            btnStart.disabled = false;
            btnStep.disabled = false;
            updateDisplay();
        });

        // Single step
        btnStep.addEventListener('click', async () => {
            try {
                await deployment.kernel.step();
                deployment.stepCount++;
                updateDisplay();
                log(`Step ${deployment.stepCount} completed`, 'info');
            } catch (error) {
                log(`Step failed: ${error.message}`, 'error');
            }
        });

        // Clear log
        btnClearLog.addEventListener('click', () => {
            logEntries.innerHTML = '';
            log('Log cleared', 'info');
        });

        // Initialize dashboard on load
        initDashboard();
    </script>
</body>
</html>
