<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry OS | Visual Shell</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: #050505;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Header Bar */
        #header-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(0, 20, 20, 0.95);
            border-bottom: 1px solid #00ffcc;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        #header-bar h1 {
            font-size: 16px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        /* Panels */
        .panel {
            background: rgba(0, 20, 20, 0.9);
            border: 1px solid #00ffcc;
            padding: 15px;
            color: #00ffcc;
            font-family: monospace;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.15);
        }

        .panel-header {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0, 255, 204, 0.3);
        }

        /* Spawner Panel (Left Sidebar) */
        #spawner-panel {
            position: absolute;
            top: 80px;
            left: 20px;
            width: 250px;
        }

        .drop-zone {
            border: 2px dashed #00ffcc;
            padding: 20px;
            text-align: center;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            background: rgba(0, 255, 204, 0.1);
            border-color: #fff;
        }

        .drop-zone span {
            font-size: 11px;
            opacity: 0.7;
        }

        .process-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .process-item {
            display: flex;
            align-items: center;
            padding: 8px;
            margin: 4px 0;
            background: rgba(0, 50, 50, 0.5);
            cursor: pointer;
            transition: background 0.2s;
        }

        .process-item:hover {
            background: rgba(0, 100, 100, 0.5);
        }

        .process-item .pid {
            color: #ff00ff;
            font-weight: bold;
            width: 40px;
        }

        .process-item .pname {
            flex: 1;
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .process-item .pstate {
            font-size: 10px;
            padding: 2px 6px;
            background: rgba(0, 0, 0, 0.3);
        }

        /* Dashboard Panel (Right Sidebar) */
        #dashboard-panel {
            position: absolute;
            top: 80px;
            right: 20px;
            width: 250px;
        }

        .stat-row {
            display: flex;
            align-items: center;
            margin: 8px 0;
            font-size: 12px;
        }

        .stat-row > span:first-child {
            width: 100px;
            opacity: 0.7;
        }

        .bar-container {
            flex: 1;
            height: 12px;
            background: rgba(0, 50, 50, 0.5);
            margin: 0 10px;
            position: relative;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: #00ff88;
            transition: width 0.3s, background 0.3s;
        }

        .divider {
            height: 1px;
            background: rgba(0, 255, 204, 0.3);
            margin: 15px 0;
        }

        /* Buttons */
        .btn {
            background: transparent;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 8px 12px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
            width: 100%;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #00ffcc;
            color: #000;
        }

        /* Brain Picker Modal */
        .brain-picker {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .brain-picker .panel {
            max-width: 400px;
            max-height: 500px;
        }

        .picker-header {
            font-size: 14px;
            margin-bottom: 15px;
        }

        .picker-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .picker-item {
            padding: 10px;
            margin: 5px 0;
            background: rgba(0, 50, 50, 0.5);
            cursor: pointer;
            transition: background 0.2s;
        }

        .picker-item:hover {
            background: rgba(0, 100, 100, 0.5);
        }

        /* PCB Overlay */
        .pcb-overlay {
            position: absolute;
            background: rgba(0, 20, 20, 0.95);
            border: 1px solid #00ffcc;
            padding: 8px 12px;
            font-size: 10px;
            pointer-events: none;
            z-index: 50;
            white-space: nowrap;
        }

        .pcb-overlay .pcb-pid {
            color: #ff00ff;
            font-weight: bold;
        }

        .pcb-overlay .pcb-stat {
            color: #888;
            margin-left: 8px;
        }

        /* Loading Screen */
        #loading-screen {
            position: absolute;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 300;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #00ffcc;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Checkbox styling */
        input[type="checkbox"] {
            accent-color: #00ffcc;
        }

        label {
            cursor: pointer;
            font-size: 11px;
        }

        /* IPC Monitor */
        .panel-subheader {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 10px 0 8px 0;
            opacity: 0.7;
        }

        .ipc-monitor {
            max-height: 150px;
            overflow-y: auto;
            background: rgba(0, 30, 30, 0.5);
            padding: 8px;
            border-radius: 4px;
        }

        .ipc-empty {
            font-size: 10px;
            opacity: 0.5;
            text-align: center;
            padding: 10px;
        }

        .ipc-channel {
            display: flex;
            align-items: center;
            font-size: 10px;
            padding: 4px 6px;
            margin: 2px 0;
            background: rgba(0, 50, 50, 0.5);
            border-radius: 3px;
        }

        .ipc-from {
            color: #00ff88;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ipc-arrow {
            color: #ff00ff;
            margin: 0 6px;
        }

        .ipc-to {
            color: #0088ff;
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .ipc-count {
            margin-left: auto;
            color: #ffaa00;
            font-weight: bold;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 50, 50, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: #00ffcc;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <p>Igniting Geometry Kernel...</p>
    </div>

    <div id="header-bar">
        <h1>Geometry OS Visual Shell</h1>
        <div class="header-actions">
            <span style="font-size: 11px; opacity: 0.6;">WebGPU Process Manager</span>
        </div>
    </div>

    <canvas id="gpu-canvas"></canvas>

    <!-- Spawner Panel (dynamically created by VisualShell.js) -->
    <!-- Dashboard Panel (dynamically created by VisualShell.js) -->

    <script type="module">
        import { VisualShell } from './VisualShell.js';
        import { GeometryKernel } from './GeometryKernel.js';

        async function init() {
            const canvas = document.getElementById('gpu-canvas');

            // Create kernel first
            const kernel = new GeometryKernel();

            // Create visual shell with kernel
            const shell = new VisualShell(canvas, { kernel });

            try {
                await shell.init();
                document.getElementById('loading-screen').style.display = 'none';

                console.log('[VisualShell] OS Interface ready');
            } catch (err) {
                console.error('Failed to ignite shell:', err);
                document.getElementById('loading-screen').innerHTML =
                    `<p style="color: red;">ERROR: ${err.message}</p>
                     <p style="font-size: 12px; color: #888;">Check console for details</p>`;
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
