<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Geometry OS - A GPU-native operating system with visual computation">
    <title>Geometry OS | Boot Loader</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #000;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Skip link styles */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: #00ffcc;
            color: #000;
            padding: 8px 16px;
            z-index: 10000;
            text-decoration: none;
            font-weight: bold;
            transition: top 0.2s;
        }

        .skip-link:focus {
            top: 0;
        }

        /* High contrast mode */
        .high-contrast body {
            background: #000;
            color: #fff;
        }

        .high-contrast .task-btn,
        .high-contrast .boot-progress-bar {
            border-color: #fff;
        }

        /* Reduced motion */
        .reduced-motion * {
            animation-duration: 0ms !important;
            transition-duration: 0ms !important;
        }

        /* Focus indicators for keyboard users */
        .keyboard-navigation *:focus {
            outline: 3px solid #00ffcc !important;
            outline-offset: 2px;
        }

        .keyboard-navigation button:focus,
        .keyboard-navigation .task-btn:focus {
            outline: 3px solid #ff00ff !important;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        /* Screen reader only class */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Boot Screen */
        #boot-screen {
            position: absolute;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        #boot-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .boot-logo {
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 8px;
            margin-bottom: 30px;
            color: #00ffcc;
            text-shadow: 0 0 20px #00ffcc;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .boot-progress {
            width: 300px;
            height: 4px;
            background: #1a1a1a;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .boot-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00ffcc, #00ff88);
            width: 0%;
            transition: width 0.3s;
        }

        .boot-status {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .boot-log {
            position: absolute;
            bottom: 50px;
            left: 50px;
            right: 50px;
            font-size: 10px;
            color: #444;
            max-height: 200px;
            overflow-y: auto;
        }

        .boot-log-entry {
            margin: 2px 0;
        }

        .boot-log-entry.ok { color: #00ff88; }
        .boot-log-entry.warn { color: #ffaa00; }
        .boot-log-entry.error { color: #ff4444; }

        /* Desktop Header */
        #desktop-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40px;
            background: rgba(0, 20, 20, 0.9);
            border-bottom: 1px solid #00ffcc44;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #desktop-header.visible {
            opacity: 1;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-title {
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .header-stat {
            font-size: 11px;
            color: #888;
        }

        .header-stat span {
            color: #00ff88;
        }

        /* Task Bar */
        #task-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: rgba(0, 20, 20, 0.9);
            border-top: 1px solid #00ffcc44;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #task-bar.visible {
            opacity: 1;
        }

        .task-buttons {
            display: flex;
            gap: 10px;
        }

        .task-btn {
            background: rgba(0, 100, 100, 0.3);
            border: 1px solid #00ffcc44;
            color: #00ffcc;
            padding: 8px 16px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .task-btn:hover {
            background: rgba(0, 150, 150, 0.4);
        }

        .task-btn.active {
            background: #00ffcc;
            color: #000;
        }

        .system-tray {
            display: flex;
            gap: 15px;
            font-size: 11px;
            color: #888;
        }

        /* Hilbert Minimap */
        #hilbert-minimap {
            position: absolute;
            bottom: 60px;
            right: 20px;
            width: 150px;
            height: 150px;
            background: rgba(0, 20, 20, 0.8);
            border: 1px solid #00ffcc44;
            border-radius: 4px;
            z-index: 90;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #hilbert-minimap.visible {
            opacity: 1;
        }

        .minimap-title {
            font-size: 9px;
            padding: 5px;
            border-bottom: 1px solid #00ffcc22;
            color: #888;
        }

        .minimap-canvas {
            width: 100%;
            height: calc(100% - 20px);
        }

        /* Window Templates (CSS for 3D windows) */
        .window-template {
            display: none;
        }

        /* Agent Indicators */
        #agent-indicators {
            position: absolute;
            top: 50px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 90;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #agent-indicators.visible {
            opacity: 1;
        }

        .agent-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff00ff;
            animation: agentPulse 1s infinite;
        }

        @keyframes agentPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.3); opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Skip to main content link for keyboard users -->
    <a href="#gpu-canvas" class="skip-link" id="skip-main">Skip to main content</a>

    <!-- Boot Screen -->
    <div id="boot-screen" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Geometry OS boot progress">
        <div class="boot-logo" aria-hidden="true">GEOMETRY OS</div>
        <div class="boot-progress">
            <div class="boot-progress-bar" id="boot-progress" role="presentation"></div>
        </div>
        <div class="boot-status" id="boot-status" aria-live="polite">Initializing...</div>
        <div class="boot-log" id="boot-log" role="log" aria-label="Boot log" aria-live="polite"></div>
    </div>

    <!-- Main Canvas -->
    <canvas id="gpu-canvas" role="img" aria-label="Geometry OS visual computing canvas - Use arrow keys to pan, plus/minus to zoom"></canvas>

    <!-- Desktop Header -->
    <header id="desktop-header" role="banner" aria-label="Desktop header">
        <div class="header-left">
            <h1 class="header-title">GEOMETRY OS</h1>
            <span class="header-stat">FPS: <span id="stat-fps" aria-live="polite">0</span></span>
            <span class="header-stat">Processes: <span id="stat-procs" aria-live="polite">0</span></span>
        </div>
        <div class="header-right">
            <span class="header-stat">IPC: <span id="stat-ipc" aria-live="polite">0</span> events</span>
            <span class="header-stat">Camera: <span id="stat-cam" aria-live="polite">0, 0</span></span>
        </div>
    </header>

    <!-- Task Bar -->
    <nav id="task-bar" role="navigation" aria-label="Task bar">
        <div class="task-buttons" role="tablist" aria-label="Window switcher">
            <button class="task-btn active" data-window="shell" role="tab" aria-selected="true" aria-controls="shell-window" id="tab-shell">Shell</button>
            <button class="task-btn" data-window="files" role="tab" aria-selected="false" aria-controls="files-window" id="tab-files">Files</button>
            <button class="task-btn" data-window="memory" role="tab" aria-selected="false" aria-controls="memory-window" id="tab-memory">Memory</button>
            <button class="task-btn" data-window="ipc" role="tab" aria-selected="false" aria-controls="ipc-window" id="tab-ipc">IPC</button>
        </div>
        <div class="system-tray" role="status" aria-label="System status">
            <span>Zoom: <span id="stat-zoom" aria-live="polite">50</span></span>
            <time id="stat-time" aria-live="polite">00:00:00</time>
        </div>
    </nav>

    <!-- Hilbert Minimap -->
    <aside id="hilbert-minimap" role="complementary" aria-label="Hilbert space minimap">
        <div class="minimap-title">Hilbert Space</div>
        <canvas class="minimap-canvas" id="minimap-canvas" aria-hidden="true"></canvas>
    </aside>

    <!-- Agent Indicators -->
    <div id="agent-indicators" role="status" aria-label="Active agents">
        <!-- Dynamically populated -->
    </div>

    <script type="module">
        import { GeometryOS } from './GeometryOS.js';
        import { AccessibilityManager } from './AccessibilityManager.js';

        const bootLog = document.getElementById('boot-log');
        const bootProgress = document.getElementById('boot-progress');
        const bootStatus = document.getElementById('boot-status');
        const bootScreen = document.getElementById('boot-screen');

        function logBoot(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `boot-log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            bootLog.appendChild(entry);
            bootLog.scrollTop = bootLog.scrollHeight;
        }

        async function boot() {
            logBoot('Starting boot sequence...');

            try {
                // Phase 1: WebGPU
                bootStatus.textContent = 'Initializing WebGPU...';
                bootProgress.style.width = '20%';
                bootScreen.setAttribute('aria-valuenow', '20');
                logBoot('WebGPU adapter request...', 'ok');
                await new Promise(r => setTimeout(r, 200));

                // Phase 2: GeometryOS
                bootStatus.textContent = 'Loading GeometryOS kernel...';
                bootProgress.style.width = '40%';
                bootScreen.setAttribute('aria-valuenow', '40');
                logBoot('GeometryOS kernel loading...', 'ok');
                await new Promise(r => setTimeout(r, 200));

                const canvas = document.getElementById('gpu-canvas');
                const os = new GeometryOS(canvas);

                // Phase 3: Kernel
                bootStatus.textContent = 'Initializing kernel buffers...';
                bootProgress.style.width = '60%';
                bootScreen.setAttribute('aria-valuenow', '60');
                logBoot('Kernel buffers allocated', 'ok');
                await new Promise(r => setTimeout(r, 200));

                // Phase 4: Desktop
                bootStatus.textContent = 'Creating desktop windows...';
                bootProgress.style.width = '80%';
                bootScreen.setAttribute('aria-valuenow', '80');
                logBoot('Desktop windows created', 'ok');
                await new Promise(r => setTimeout(r, 200));

                // Initialize OS
                await os.init();

                // Phase 5: Accessibility
                bootStatus.textContent = 'Enabling accessibility features...';
                bootProgress.style.width = '90%';
                bootScreen.setAttribute('aria-valuenow', '90');
                logBoot('Accessibility features enabled', 'ok');

                // Initialize accessibility manager
                const a11y = new AccessibilityManager(os);
                await a11y.init();
                os.accessibility = a11y;

                // Phase 6: Complete
                bootStatus.textContent = 'Boot complete!';
                bootProgress.style.width = '100%';
                bootScreen.setAttribute('aria-valuenow', '100');
                logBoot('GeometryOS ready', 'ok');
                await new Promise(r => setTimeout(r, 500));

                // Hide boot screen
                bootScreen.classList.add('hidden');
                bootScreen.setAttribute('aria-hidden', 'true');
                document.getElementById('desktop-header').classList.add('visible');
                document.getElementById('task-bar').classList.add('visible');
                document.getElementById('hilbert-minimap').classList.add('visible');
                document.getElementById('agent-indicators').classList.add('visible');

                // Announce to screen readers
                a11y.announce('Geometry OS loaded successfully. Press F6 to navigate between areas.', 'assertive');

                // Wire task bar buttons
                const taskButtons = document.querySelectorAll('.task-btn');
                taskButtons.forEach(btn => {
                    btn.addEventListener('click', () => {
                        const windowId = btn.dataset.window;
                        os.focusWindow(windowId);

                        // Update ARIA selected state
                        taskButtons.forEach(b => {
                            b.classList.remove('active');
                            b.setAttribute('aria-selected', 'false');
                        });
                        btn.classList.add('active');
                        btn.setAttribute('aria-selected', 'true');

                        // Announce window change
                        a11y.announce(`${btn.textContent} window focused`);
                    });

                    // Keyboard navigation for task bar
                    btn.addEventListener('keydown', (e) => {
                        if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
                            e.preventDefault();
                            const buttons = Array.from(taskButtons);
                            const currentIndex = buttons.indexOf(btn);
                            const nextIndex = e.key === 'ArrowRight'
                                ? (currentIndex + 1) % buttons.length
                                : (currentIndex - 1 + buttons.length) % buttons.length;
                            buttons[nextIndex].focus();
                        }
                    });
                });

                // Stats update loop
                setInterval(() => {
                    const stats = os.getStats();
                    document.getElementById('stat-fps').textContent = Math.round(stats.fps);
                    document.getElementById('stat-procs').textContent = stats.processCount;
                    document.getElementById('stat-ipc').textContent = stats.ipcEventCount;
                    document.getElementById('stat-cam').textContent =
                        `${Math.round(stats.cameraPosition.x)}, ${Math.round(stats.cameraPosition.y)}`;
                    document.getElementById('stat-zoom').textContent = Math.round(stats.cameraPosition.z);

                    // Time
                    const now = new Date();
                    document.getElementById('stat-time').textContent =
                        now.toTimeString().split(' ')[0];
                }, 100);

                // Expose for debugging
                window.geometryOS = os;
                window.a11y = a11y;

                logBoot('Desktop environment active', 'ok');

            } catch (err) {
                logBoot(`Boot failed: ${err.message}`, 'error');
                bootStatus.textContent = `Error: ${err.message}`;
                console.error(err);
            }
        }

        window.addEventListener('load', boot);
    </script>
</body>
</html>
