<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry OS | Kernel Demo</title>
    <style>
        body { background: #050505; color: #00ffcc; font-family: monospace; padding: 20px; }
        .log { background: #001111; border: 1px solid #00ffcc; padding: 10px; height: 300px; overflow-y: auto; margin-bottom: 20px; }
        .process-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .process-card { border: 1px solid #00ffcc; padding: 10px; background: rgba(0, 255, 204, 0.05); }
        .status-running { color: #00ff00; }
        .status-exit { color: #ff0000; }
    </style>
</head>
<body>
    <h1>Geometry OS Kernel</h1>
    <div class="log" id="kernel-log"></div>
    
    <h2>Active Processes</h2>
    <div class="process-list" id="process-list"></div>

    <script type="module">
        import { GeometryKernel } from './GeometryKernel.js';
        import { VisualCompiler } from './VisualCompiler.js';

        const logEl = document.getElementById('kernel-log');
        function log(msg) {
            const line = document.createElement('div');
            line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function init() {
            log('Initializing Geometry Kernel...');
            const kernel = new GeometryKernel();
            await kernel.init();
            log('Kernel initialized on GPU.');

            // Create two test programs
            // Program 1: Add 10 + 20 and store in index 0
            const p1_binary = await compileProgram(10, 20);
            kernel.spawn(0, p1_binary, 1024, 100);
            log('Spawned Process 0: Calculator (10+20)');

            // Program 2: Multiply 5 * 5 and store in index 0 (of its own segment)
            const p2_binary = await compileProgramMult(5, 5);
            kernel.spawn(1, p2_binary, 2048, 100);
            log('Spawned Process 1: Multiplier (5*5)');

            updateProcessUI(kernel);

            // Run scheduler
            setInterval(async () => {
                await kernel.step();
                updateProcessUI(kernel);
            }, 1000);
        }

        async function compileProgram(a, b) {
            // Simplified SPIR-V for: PUSH a, PUSH b, ADD, STORE 0, RETURN
            // In a real scenario, we'd use VisualCompiler.js
            // For demo purposes, returning a mock Uint32Array matching the stride
            const mock = new Uint32Array(512);
            mock.set([
                0x07230203, 0x00010000, 0, 10, 0, // Header
                (4 << 16) | 43, 1, 2, a,         // PUSH a
                (4 << 16) | 43, 1, 3, b,         // PUSH b
                (4 << 16) | 129, 1, 4, 2, 3,     // ADD
                (3 << 16) | 62, 0, 4,            // STORE 0, res
                (1 << 16) | 253                  // RETURN
            ]);
            return mock.buffer;
        }

        async function compileProgramMult(a, b) {
            const mock = new Uint32Array(512);
            mock.set([
                0x07230203, 0x00010000, 0, 10, 0, // Header
                (4 << 16) | 43, 1, 2, a,         // PUSH a
                (4 << 16) | 43, 1, 3, b,         // PUSH b
                (4 << 16) | 133, 1, 4, 2, 3,     // MUL
                (3 << 16) | 62, 0, 4,            // STORE 0, res
                (1 << 16) | 253                  // RETURN
            ]);
            return mock.buffer;
        }

        function updateProcessUI(kernel) {
            const container = document.getElementById('process-list');
            container.innerHTML = '';
            kernel.processes.forEach(p => {
                const card = document.createElement('div');
                card.className = 'process-card';
                card.innerHTML = `
                    <div>PID: ${p.pid}</div>
                    <div class="status-${p.status}">Status: ${p.status}</div>
                `;
                container.appendChild(card);
            });
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
